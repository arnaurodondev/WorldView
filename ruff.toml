# Ruff configuration — single source of truth for the entire monorepo.
# Services and libs inherit this via `extend = "../../ruff.toml"` or rely on
# ruff's config-file discovery (walks up to repo root).

target-version = "py311"
line-length = 120
fix = true

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "S",    # flake8-bandit (security)
    "A",    # flake8-builtins
    "C4",   # flake8-comprehensions
    "DTZ",  # flake8-datetimez (enforce UTC)
    "T20",  # flake8-print (no stray prints)
    "SIM",  # flake8-simplify
    "TCH",  # flake8-type-checking
    "RUF",  # ruff-specific
]
ignore = [
    "S101",  # assert is fine in tests
    "B008",  # Depends() in FastAPI signatures
    # TCH003: Pydantic models, SQLAlchemy ORM models, and Python dataclasses
    # all call get_type_hints() at runtime. Moving stdlib types (UUID, datetime, Decimal,
    # etc.) into TYPE_CHECKING blocks causes PydanticUndefinedAnnotation at startup.
    # Rule name in ruff ≤0.5 (pinned pre-commit v0.4.0): TCH003 (renamed TC003 in ruff ≥0.6).
    "TCH003",
]
unfixable = ["F841"]  # don't auto-remove unused variables

[lint.per-file-ignores]
"**/tests/**/*.py" = ["S101", "S106", "S603", "S607", "T20", "N802", "N815", "N806", "B023", "SIM", "F821", "TCH003", "E402"]
"services/*/src/*/config.py" = ["S104", "S105"]
"libs/*/src/*/settings.py" = ["S105"]
"**/alembic/**/*.py" = ["E501", "TCH003"]
"scripts/**/*.py" = ["T20", "N802", "N815", "N806", "B023", "SIM", "DTZ"]
# FastAPI, Pydantic, and SQLAlchemy call get_type_hints() at runtime, so
# runtime-annotated imports cannot be moved into TYPE_CHECKING blocks.
"services/*/src/*/app.py" = ["TCH001", "TCH002", "TCH003"]
"services/*/src/*/api/*.py" = ["TCH001", "TCH002", "TCH003"]
"services/*/src/*/api/**/*.py" = ["TCH001", "TCH002", "TCH003"]
"services/*/src/*/infrastructure/db/models/*.py" = ["TCH003"]
"services/*/src/*/infrastructure/*/models.py" = ["TCH003"]
# Domain entity/enum files re-export shared enums (contracts.enums) at runtime;
# they appear type-only due to `from __future__ import annotations`.
"services/*/src/*/domain/entities.py" = ["TCH001"]
"services/*/src/*/domain/enums.py" = ["TCH001"]
# Dynamic SQL construction via text(f"...WHERE {where_sql}...") pattern is safe
# because where_sql is built from trusted string literals (not user input).
"services/*/src/*/infrastructure/**/repositories/*.py" = ["S608"]
# Lazy re-exports in pg/__init__.py use __getattr__ + TYPE_CHECKING pattern
"libs/messaging/src/messaging/pg/__init__.py" = ["TCH004"]

[lint.isort]
known-first-party = [
    "common",
    "contracts",
    "messaging",
    "storage",
    "observability",
]
