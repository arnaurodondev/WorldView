[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "api-gateway"
version = "2025.6.0"
description = "BFF API gateway — auth, rate limiting, caching, request composition"
requires-python = ">=3.11,<3.13"
dependencies = [
    "messaging",
    "observability",
    "fastapi==0.111",
    "uvicorn[standard]==0.29",
    "pydantic==2.5",
    "pydantic-settings==2.1",
    "httpx==0.27",
    "sse-starlette==2.0",
    "pyjwt==2.8",
]

[project.optional-dependencies]
dev = [
    "pytest==8.0",
    "pytest-asyncio==0.23",
    "pytest-httpx==0.30",
    "respx==0.21",
    "ruff==0.4",
    "mypy==1.10",
]

[tool.hatch.build.targets.wheel]
packages = ["src/api_gateway"]
