# Curated TAM / market-size reference table for chat projection grounding.
#
# PURPOSE (Area-2 P3, chat-enhancement-roadmap): projection / what-if questions
# ("if AMD captures X% of the AI accelerator TAM, what is the revenue impact?")
# need a SCENARIO PARAMETER — a total addressable market, served-market size, or
# segment share — that the live platform does NOT ingest. This file makes that
# number RETRIEVABLE + CITABLE so the synthesis turn can GROUND its scenario on a
# sourced analyst estimate instead of a bare parametric assumption.
#
# NOT A LIVE FEED. Every row is a hand-curated, DATED analyst estimate. It is
# reference data, not real-time market data. The `get_market_sizing` tool and its
# description state this explicitly so the chat frames each figure as an estimate
# with an as-of date, never as a current spot figure.
#
# Row schema:
#   id            stable slug (never reused; append-only)
#   segment       human-readable market/segment name
#   category      one of: semiconductor | smartphone | cloud
#   aliases       extra keywords used for free-text matching (lowercase)
#   market_size_usd  headline size string WITH its measurement year baked in
#   size_year     the year the market_size_usd figure refers to
#   cagr          forward compound annual growth rate (analyst consensus range)
#   forecast      optional forward size point ("$X by YEAR")
#   vendor_shares list of "Vendor ~NN%" approximate revenue/volume shares
#   source        analyst house / report the estimate is paraphrased from
#   as_of_date    when this row was curated / the estimate was published
#
# Figures are ROUNDED consensus midpoints across public analyst commentary
# (Gartner, IDC, TrendForce, Grand View, Precedence, Mordor, company disclosures).
# They are intended as order-of-magnitude scenario anchors, not precise quotes.

