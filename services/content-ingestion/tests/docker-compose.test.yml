---
# S4 Content Ingestion — Standalone Integration Test Infrastructure
#
# PREFERRED: Use infra/compose/docker-compose.yml (shared platform compose).
# This file is a fallback for isolated S4 testing on non-conflicting ports.
#
# Profiles:
#   s4-test   — Postgres + Kafka (KRaft) + Schema Registry + MinIO + Valkey
#   db-only   — Postgres only (for admin API tests)
#
# Usage (standalone):
#   docker compose -f tests/docker-compose.test.yml --profile s4-test up -d
#   S4_TEST_DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:54320/content_ingestion_test_db \
#     python -m pytest tests/integration -v -m integration
#   docker compose -f tests/docker-compose.test.yml down -v
#
# Usage (shared infra — preferred):
#   docker compose -f infra/compose/docker-compose.yml --profile infra up -d
#   python -m pytest tests/integration -v -m integration

name: s4-integration-test

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    profiles: [s4-test, db-only]
    ports:
      - "54320:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres  # noqa: S105
      POSTGRES_DB: content_ingestion_test_db
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Kafka (KRaft mode — no ZooKeeper) ──────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    profiles: [s4-test]
    ports:
      - "9093:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9093,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── Schema Registry ────────────────────────────────────────────────────────
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    profiles: [s4-test]
    ports:
      - "8082:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/subjects >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ── MinIO (S3-compatible object storage) ───────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    profiles: [s4-test]
    command: server /data --console-address ":9001"
    ports:
      - "7490:9000"
      - "7491:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin  # noqa: S105
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ── Valkey (Redis-compatible) ──────────────────────────────────────────────
  valkey:
    image: valkey/valkey:7.2-alpine
    profiles: [s4-test]
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
