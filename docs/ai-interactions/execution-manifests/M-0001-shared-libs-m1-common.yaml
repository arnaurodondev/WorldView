        - "worldview/libs/common/src/common/__init__.py"
      forbidden_write_paths:
        - "worldview/services/**"
    branch: "agent/T-001-wire-ids-types-exports"
    implementation:
      steps:
        - "Add ids/types re-exports in common.__init__"
        - "Update __all__"
      commands:
        - "cd worldview && ./scripts/lint.sh"
      expected_changed_files:
        - "libs/common/src/common/__init__.py"
    tests:
      required:
        - layer: "unit"
          command: "cd worldview/libs/common && pytest -m unit"
          pass_criteria: "exit_code=0"
    docs:
      must_review:
        - "worldview/AGENTS.md"
        - "worldview/CLAUDE.md"
      must_update_if_changed:
        - "worldview/docs/libs/common.md"
      expected_doc_changes: []
