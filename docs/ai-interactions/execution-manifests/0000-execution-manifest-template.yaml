manifest_id: "M-0000"
prompt_id: "0000"
response_file: "docs/ai-interactions/agent-responses/0000-response-template.md"
created_at: "YYYY-MM-DD"
owner: "orchestrator"
default_branch_base: "main"
state_model:
  allowed: [planned, ready, in-progress, review, blocked, done, cancelled]
  terminal: [done, cancelled]
quality_gates:
  require_response_artifact: true
  require_docs_update_if_behavior_changes: true
  require_review_checklist: true
  max_worker_retries: 2
  block_merge_on_failed_required_tests: true
workers:
  max_parallel: 3
  conflict_strategy: "file-lock"
  allowed_subagent_mode: "read-only"

tasks:
  - task_id: "T-000"
    title: "Example task"
    status: "planned"
    owner: "worker-1"
    depends_on: []
    can_run_with: ["T-001"]
    blocked_by_questions: []
    scope:
      read_paths:
        - "worldview/libs/**"
      write_paths:
        - "worldview/libs/common/**"
      forbidden_write_paths:
        - "worldview/services/**"
    branch: "agent/T-000-example-task"
    implementation:
      steps:
        - "Step 1"
        - "Step 2"
      commands:
        - "./scripts/lint.sh"
      expected_changed_files:
        - "libs/common/src/common/__init__.py"
    tests:
      required:
        - layer: "unit"
          command: "cd libs/common && pytest -m unit"
          pass_criteria: "exit_code=0"
      optional:
        - layer: "container"
          command: "cd worldview && ./scripts/test-libs.sh"
    docs:
      must_review:
        - "worldview/AGENTS.md"
        - "worldview/CLAUDE.md"
      must_update_if_changed:
        - "worldview/docs/libs/common.md"
      expected_doc_changes: []
    evidence:
      required:
        - "test-output-snippet"
        - "changed-files-list"
        - "response-section-link"
        - "checklist-verification"
    completion:
      definition_of_done:
        - "All required tests pass"
        - "Docs updated when required"
        - "Response artifact updated"
      rollback:
        - "git restore --source=HEAD --staged --worktree ."
        - "git clean -fd"
      escalation:
        - "If retries > 2, mark blocked and assign to orchestrator"
