# ─────────────────────────────────────────────────────────────
# worldview — Docker Compose
# Profiles: infra | init | runtime | tools
# ─────────────────────────────────────────────────────────────

services:

  # ── Infrastructure ───────────────────────────────────────

  postgres:
    image: timescale/timescaledb:latest-pg16
    profiles: [infra]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: apache/kafka:4.1.1
    profiles: [infra]
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: "worldview-local-cluster-001"
    volumes:
      - kafka_data:/tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.3
    profiles: [infra]
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    depends_on:
      kafka:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    profiles: [infra]
    ports:
      - "7480:9000"
      - "7481:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  valkey:
    image: valkey/valkey:8-alpine
    profiles: [infra]
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    profiles: [infra]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  # ── Init Jobs ────────────────────────────────────────────

  init-databases:
    image: timescale/timescaledb:latest-pg16
    profiles: [init]
    entrypoint: ["bash", "/scripts/init-databases.sh"]
    volumes:
      - ./infra/postgres/init:/scripts
    environment:
      PGHOST: postgres
      PGUSER: postgres
      PGPASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy

  init-topics:
    image: apache/kafka:4.1.1
    profiles: [init]
    entrypoint: ["bash", "/scripts/create-topics.sh"]
    volumes:
      - ./infra/kafka/init:/scripts
    depends_on:
      kafka:
        condition: service_healthy

  init-minio:
    image: minio/mc:latest
    profiles: [init]
    entrypoint: ["bash", "/scripts/init-buckets.sh"]
    volumes:
      - ./infra/minio/init:/scripts
    depends_on:
      minio:
        condition: service_healthy

  migrate-market-ingestion:
    build:
      context: .
      dockerfile: services/market-ingestion/Dockerfile
    profiles: [init]
    command: ["alembic", "-c", "alembic.ini", "upgrade", "head"]
    env_file:
      - services/market-ingestion/configs/.env
    depends_on:
      init-databases:
        condition: service_completed_successfully

  # ── Dev Tools ────────────────────────────────────────────

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    profiles: [tools]
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: worldview-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
    depends_on:
      kafka:
        condition: service_healthy

  pgweb:
    image: sosedoff/pgweb:latest
    profiles: [tools]
    ports:
      - "8091:8081"
    environment:
      PGWEB_DATABASE_URL: postgres://postgres:postgres@postgres:5432/postgres?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  # ── Runtime Services ─────────────────────────────────────

  svc-portfolio:
    build:
      context: .
      dockerfile: services/portfolio/Dockerfile
    profiles: [runtime]
    ports:
      - "8001:8001"
    env_file:
      - services/portfolio/configs/.env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  svc-market-ingestion:
    build:
      context: .
      dockerfile: services/market-ingestion/Dockerfile
    profiles: [runtime]
    ports:
      - "8002:8002"
    env_file:
      - services/market-ingestion/configs/.env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/healthz')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  svc-market-ingestion-scheduler:
    build:
      context: .
      dockerfile: services/market-ingestion/Dockerfile
    profiles: [runtime]
    command: ["python", "-m", "market_ingestion.scheduler.main"]
    env_file:
      - services/market-ingestion/configs/.env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  svc-market-ingestion-worker:
    build:
      context: .
      dockerfile: services/market-ingestion/Dockerfile
    profiles: [runtime]
    command: ["python", "-m", "market_ingestion.worker.main"]
    env_file:
      - services/market-ingestion/configs/.env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  svc-market-ingestion-dispatcher:
    build:
      context: .
      dockerfile: services/market-ingestion/Dockerfile
    profiles: [runtime]
    command: ["python", "-m", "market_ingestion.messaging.dispatcher_main"]
    env_file:
      - services/market-ingestion/configs/.env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  svc-market-data:
    build:
      context: .
      dockerfile: services/market-data/Dockerfile
    profiles: [runtime]
    ports:
      - "8003:8003"
    env_file:
      - services/market-data/configs/.env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  svc-content-ingestion:
    build:
      context: .
      dockerfile: services/content-ingestion/Dockerfile
    profiles: [runtime]
    ports:
      - "8004:8004"
    env_file:
      - services/content-ingestion/configs/.env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  svc-content-store:
    build:
      context: .
      dockerfile: services/content-store/Dockerfile
    profiles: [runtime]
    ports:
      - "8005:8005"
    env_file:
      - services/content-store/configs/.env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  svc-nlp-pipeline:
    build:
      context: .
      dockerfile: services/nlp-pipeline/Dockerfile
    profiles: [runtime]
    ports:
      - "8006:8006"
    env_file:
      - services/nlp-pipeline/configs/.env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  svc-knowledge-graph:
    build:
      context: .
      dockerfile: services/knowledge-graph/Dockerfile
    profiles: [runtime]
    ports:
      - "8007:8007"
    env_file:
      - services/knowledge-graph/configs/.env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  svc-rag-chat:
    build:
      context: .
      dockerfile: services/rag-chat/Dockerfile
    profiles: [runtime]
    ports:
      - "8008:8008"
    env_file:
      - services/rag-chat/configs/.env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      ollama:
        condition: service_started

  svc-api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    profiles: [runtime]
    ports:
      - "8000:8000"
    env_file:
      - services/api-gateway/configs/.env
    depends_on:
      svc-portfolio:
        condition: service_started
      svc-market-data:
        condition: service_started
      valkey:
        condition: service_healthy

  frontend:
    build:
      context: apps/frontend
      dockerfile: Dockerfile
    profiles: [runtime]
    ports:
      - "5173:80"
    depends_on:
      svc-api-gateway:
        condition: service_started

volumes:
  postgres_data:
  kafka_data:
  minio_data:
  valkey_data:
  ollama_data:
