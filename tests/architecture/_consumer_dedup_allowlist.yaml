  # ── nlp-pipeline ──────────────────────────────────────────────────────────
  - class_name: WatchlistEventConsumer
    module_path: services.nlp-pipeline.src.nlp_pipeline.infrastructure.messaging.consumers.watchlist_consumer
    justification: >
      Natural idempotency: the underlying cache operations are Redis SADD (item_added)
      and SREM (item_deleted), both of which are idempotent under re-delivery.
      A Valkey dedup store would add per-message overhead without correctness benefit.
      is_duplicate() returns False unconditionally with explicit comment documenting
      the reasoning (PRD §6.7 Block 5 watchlist signal sourcing).
    granted_at: "2026-05-07"

  # ── portfolio ─────────────────────────────────────────────────────────────
  - class_name: InstrumentEventConsumer
    module_path: services.portfolio.src.portfolio.infrastructure.messaging.consumers.instrument_consumer
    justification: >
      BP-035 pattern: event_id dedup is handled atomically inside process_message
      via PostgreSQL upsert (ON CONFLICT DO UPDATE / upsert semantics), within the
      same transaction as the write. is_duplicate() returns False unconditionally;
      mark_processed() is a no-op. The atomic upsert is the idempotency gate.
      ValkeyDedupMixin would be redundant overhead for this consumer.
    granted_at: "2026-05-07"
