# Consumer dedup mixin allowlist
# ─────────────────────────────────────────────────────────────────────────────
# Schema: each entry must have:
#   class_name:    str   — exact Python class name
#   module_path:   str   — dotted module path from repo root
#   justification: str   — why ValkeyDedupMixin is not used
#   granted_at:    str   — ISO-8601 date the exemption was approved
#
# Consumers fall into three exemption categories:
#
#   BP-035 (atomic upsert)   — event_id dedup is handled atomically inside
#                              process_message via create_if_not_exists / ON CONFLICT;
#                              ValkeyDedupMixin would be redundant overhead.
#
#   Hand-rolled Valkey       — pre-dates ValkeyDedupMixin; implements the same
#                              pattern inline (_dedup_prefix + exists/setex).
#                              Migration to the mixin was outside PLAN-0084 B-2/B-3 scope;
#                              tracked as a follow-up cleanup wave.
#
#   Natural idempotency      — the underlying operation (SADD/SREM, DB upsert) is
#                              inherently safe under re-delivery; a dedup store
#                              would add latency without correctness benefit.
#
# Entries here must have a covering JIRA / PLAN reference if known.

allowlist:

  # ── content-store ─────────────────────────────────────────────────────────
  - class_name: ArticleConsumer
    module_path: services.content-store.src.content_store.infrastructure.messaging.consumers.article_consumer
    justification: >
      Uses PostgreSQL-backed dedup via ProcessedEventsRepository.is_duplicate() and
      mark_processed() — a separate dedup table within the same transaction as the
      write. This provides exactly-once guarantees stronger than Valkey TTL-based
      dedup; adding ValkeyDedupMixin here would be redundant. Exempt under the
      "DB dedup" category (not hand-rolled Valkey; different mechanism entirely).
    granted_at: "2026-05-07"

  # ── market-data ───────────────────────────────────────────────────────────
  - class_name: PredictionMarketConsumer
    module_path: services.market-data.src.market_data.infrastructure.messaging.consumers.prediction_market_consumer
    justification: >
      BP-035 pattern: event_id dedup is handled atomically inside process_message
      via create_if_not_exists (INSERT … ON CONFLICT DO NOTHING … RETURNING).
      is_duplicate() returns False unconditionally; the atomic insert is the gate.
      Migration to ValkeyDedupMixin is outside PLAN-0084 B-2/B-3 scope.
    granted_at: "2026-05-07"

  # ── knowledge-graph ───────────────────────────────────────────────────────
