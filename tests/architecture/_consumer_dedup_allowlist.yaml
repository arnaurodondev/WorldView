  # ── nlp-pipeline ──────────────────────────────────────────────────────────
  - class_name: WatchlistEventConsumer
    module_path: services.nlp-pipeline.src.nlp_pipeline.infrastructure.messaging.consumers.watchlist_consumer
    justification: >
      Natural idempotency: the underlying cache operations are Redis SADD (item_added)
      and SREM (item_deleted), both of which are idempotent under re-delivery.
      A Valkey dedup store would add per-message overhead without correctness benefit.
      is_duplicate() returns False unconditionally with explicit comment documenting
      the reasoning (PRD §6.7 Block 5 watchlist signal sourcing).
    granted_at: "2026-05-07"

  # ── portfolio ─────────────────────────────────────────────────────────────
  - class_name: InstrumentEventConsumer
    module_path: services.portfolio.src.portfolio.infrastructure.messaging.consumers.instrument_consumer
    justification: >
      BP-035 pattern: event_id dedup is handled atomically inside process_message
      via PostgreSQL upsert (ON CONFLICT DO UPDATE / upsert semantics), within the
      same transaction as the write. is_duplicate() returns False unconditionally;
      mark_processed() is a no-op. The atomic upsert is the idempotency gate.
      ValkeyDedupMixin would be redundant overhead for this consumer.
    granted_at: "2026-05-07"

  # ── PLAN-0104 merge of origin/main (2026-06-05) ──────────────────────────
  - class_name: EntityRefreshConsumer
    module_path: services.nlp-pipeline.src.nlp_pipeline.infrastructure.messaging.consumers.entity_refresh_consumer
    justification: >
      Architecture violation surfaced during the PLAN-0104 / origin-main merge.
      The EntityRefreshConsumer was introduced on main after PLAN-0084 Wave B-2/B-3
      added the ValkeyDedupMixin requirement. Mixing in dedup is the right
      eventual fix (PRD-0098 W3), but in the short term this consumer relies on
      the underlying `entity_refresh` upsert which is naturally idempotent under
      re-delivery. Granted pending the formal mixin retrofit.
    granted_at: "2026-06-05"

  # ── PLAN-0114 W1 (2026-06-20) ─────────────────────────────────────────────
  - class_name: ManualHoldingsRecomputeConsumer
    module_path: services.portfolio.src.portfolio.infrastructure.messaging.consumers.manual_holdings_consumer
    justification: >
      BP-035 pattern (atomic DB dedup): event_id dedup is handled atomically inside
      process_message via uow.idempotency.create_if_not_exists(event_uid) — an
      INSERT … ON CONFLICT DO NOTHING … RETURNING that runs within the same DB
      transaction as the holdings upsert. This provides stronger exactly-once
      guarantees than Valkey TTL-based dedup: the idempotency record and the
      holdings snapshot are committed atomically, so a crash between the two
      operations is impossible. is_duplicate() returns False unconditionally
      because the pre-UoW Valkey check would race with the atomic DB check
      (double-check anti-pattern). UpsertHoldingsFromSnapshotUseCase additionally
      performs an idempotent diff-and-upsert, providing a second layer of natural
      idempotency under re-delivery. ValkeyDedupMixin would be redundant overhead.
      PLAN-0114 W1 / T-W1-07.
    granted_at: "2026-06-20"
