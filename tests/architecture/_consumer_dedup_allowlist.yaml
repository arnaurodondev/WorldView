  - class_name: InstrumentDiscoveredConsumer
    module_path: services.knowledge-graph.src.knowledge_graph.infrastructure.messaging.consumers.instrument_discovered_consumer
    justification: >
      Hand-rolled Valkey dedup with fail-open semantics (PLAN-0057 QA DS-003 fix):
      implements _dedup_prefix + exists()/setex() with explicit Valkey error handling.
      Pre-dates ValkeyDedupMixin; migration is outside PLAN-0084 B-2/B-3 scope.
      Canonical/alias inserts are also protected by ON CONFLICT DO NOTHING (defence-in-depth).
    granted_at: "2026-05-07"

