# PLAN-0093 Wave G-3 — Q4 NVDA vs AMD fundamentals ground truth.
#
# Source: audit doc 2026-05-23-qa-intelligence-pipelines-report.md +
# 2026-05-22 EODHD Refresh + NVDA / AMD official quarterly releases.
#
# Used by tests/validation/chat_eval/test_q4_nvda_amd_revenue.py to
# assert numeric claims in the LLM response match reported quarterly
# numbers within FieldKind tolerance.
#
# Refresh policy: this file is the authoritative fallback when the
# market-data DB is unreachable. When the harness CAN reach the DB,
# it should still cross-check these values once per run and surface
# a warning if any drift exceeds the per-kind tolerance (out of scope
# for G-3; tracked as a follow-up).

# Bellwether numbers explicitly called out in the audit.
bellwethers:
  - ticker: NVDA
    quarter: Q4FY26
    metric: revenue
    value_billions: 68.127
    tolerance_kind: REVENUE
  - ticker: AMD
    quarter: Q1FY26
    metric: revenue
    value_billions: 10.253
    tolerance_kind: REVENUE
  - ticker: AMD
    quarter: Q1FY26
    metric: eps_diluted
    value: 0.45
    tolerance_kind: EPS

