# Chat quality benchmark — curated question catalogue.
#
# This is the single source of truth for `scripts/run_chat_quality_benchmark.py`.
# Each entry is purely descriptive — the script captures heuristics (tool calls,
# refusal flags, latency, must_not_say hits) per question but does NOT gate
# pass/fail strictly. The acceptance gate lives in `tests/validation/chat_eval/`.
#
# Schema:
#   id:                          unique short slug
#   prompt:                      verbatim user question
#   category:                    one of [factual_lookup, screener, relationship,
#                                       financial_data, news, comparison,
#                                       signal, multilingual, adversarial,
#                                       refusal_premise]
#   tags:                        list[str] — used for --tags filtering
#                                ("real_user", "smoke", "aggregate", "iter3", ...)
#   expected_tools:              list[str] — HINT, not a gate. Tools we expect
#                                the agent to plausibly call. Captured as a
#                                "tool_overlap" diagnostic only.
#   expected_entities_mentioned: list[str] — substrings we expect in answer
#   expected_numeric_class:      one of [none, currency, percent, count, ratio,
#                                       date, mixed]
#   expected_min_words:          int — answers shorter than this are flagged
#   expected_max_latency_s:      float — answers slower than this are flagged
#   must_not_say:                list[str] — forbidden phrases (e.g. blanket
#                                "No data was found" refusals on questions
#                                where data exists)
#   notes:                       free-text human guidance / context

# --------------------------------------------------------------------------
# real_user — five questions the user pasted on 2026-05-28 as known
# failure / poor-quality cases. These drive the first benchmark run.
# --------------------------------------------------------------------------

- id: ru_mstr_news
  prompt: "Show me the latest news on MSTR — what should I know?"
  category: news
  tags: [real_user, smoke, news]
  expected_tools: [get_entity_news, get_top_news, search_articles]
  expected_entities_mentioned: [MicroStrategy, MSTR, Bitcoin]
  expected_numeric_class: mixed
  expected_min_words: 60
  expected_max_latency_s: 60
  must_not_say:
    - "No data was found"
    - "I don't have access"
    - "I cannot find any information"
  notes: |
    User-reported quality issue. Watch for blanket "no data" refusals when
    MSTR articles exist in the corpus. Expect Bitcoin treasury context.

- id: ru_ai_semi_screener
  prompt: "Screen for AI semiconductor companies with market cap above $50B and positive YoY revenue growth."
  category: screener
  tags: [real_user, smoke, screener]
  expected_tools: [screen_universe]
  expected_entities_mentioned: [NVDA, AVGO]
  expected_numeric_class: currency
  expected_min_words: 80
  expected_max_latency_s: 75
  must_not_say:
    - "I cannot perform screening"
    - "No companies were found"
  notes: |
    Expect ≥3 tickers from {NVDA, AMD, AVGO, TSM, INTC, MU, QCOM, MRVL}.

- id: ru_openai_msft_paths
  prompt: "How is OpenAI connected to Microsoft? Show me the relationship paths."
  category: relationship
  tags: [real_user, smoke, relationship]
  expected_tools: [traverse_graph, get_entity_paths]
  expected_entities_mentioned: [OpenAI, Microsoft]
  expected_numeric_class: none
  # PLAN-0103 W17 (2026-05-30): relationship-path answers are inherently
  # terse ("Microsoft invested $13B in OpenAI; OpenAI is Azure-exclusive…");
  # 80-word floor was a false-positive WARN trigger. 40 reflects the
  # natural answer length without rewarding stub responses.
  expected_min_words: 40
  expected_max_latency_s: 75
  must_not_say:
    - "No connection found"
    - "I cannot find a path"
  notes: |
    BP-461 fixed AGE Cypher path discovery (2026-05-11). Expect multi-hop
    paths: investment, partnership, exclusive cloud provider.

- id: ru_nvda_amd_compare_qtr
  prompt: "Compare NVDA and AMD on revenue, EPS, and gross margin for the latest reported quarter."
  category: comparison
  tags: [real_user, smoke, comparison, financials]
  expected_tools: [compare_entities, get_fundamentals_history, get_fundamentals_snapshot]
  expected_entities_mentioned: [NVIDIA, AMD]
  expected_numeric_class: mixed
  expected_min_words: 120
  expected_max_latency_s: 75
  must_not_say:
    - "I cannot retrieve financial data"
    - "No data was found"
  notes: |
    Expect three metrics x two companies. Watch BP-540 (fundamentals
    placeholder leak). Numeric grounding required.

- id: ru_nvda_amd_revenue_4q
  prompt: "Compare the revenue trajectories of NVIDIA and AMD over the last 4 quarters."
  category: financial_data
  tags: [real_user, smoke, financials, aggregate, q4_original]
  expected_tools: [get_fundamentals_history]
  expected_entities_mentioned: [NVIDIA, AMD]
  expected_numeric_class: currency
  expected_min_words: 100
  expected_max_latency_s: 75
  must_not_say:
    - "No historical data"
    - "I cannot access financials"
  notes: |
    Existing Q4 from chat_eval. Forbid AMD revenue >$15B/qtr, NVDA >$100B/qtr
    (hallucination tripwire).

