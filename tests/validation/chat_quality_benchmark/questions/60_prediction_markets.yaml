# Prediction-market stratum (EMNLP demo, added 2026-07-11).
# Data confirmed live in market_data_db.prediction_markets: 526 markets
# (politics 182, sports 277, crypto 7). Retrieval = keyword ILIKE on question text
# via get_prediction_markets. Questions key off entities CONFIRMED present in the data
# (Bitcoin, Trump, Musk, 2026 midterms) — Polymarket coverage is general-topic, so
# there are no single-company markets; this stratum reflects that honestly.
- id: pm_bitcoin_150k
  prompt: Are there any prediction markets on Bitcoin hitting $150k, and what odds do they imply?
  category: prediction
  tags: [prediction_markets, get_prediction_markets, crypto]
  rubric:
    expected_tools: [get_prediction_markets]
    required_facts: [bitcoin_market_found, implied_probability_stated, resolution_date]
    forbidden_facts: [no_such_market_refusal, fabricated_price_target]
    expected_depth: shallow
    appropriate_refusal_ok: false
  notes: Confirmed markets "Will Bitcoin hit $150k by June 30 / Dec 31, 2026?".

