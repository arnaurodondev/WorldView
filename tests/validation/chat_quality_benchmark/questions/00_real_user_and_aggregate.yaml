# Schema v2 (PLAN-0099-W4): rubric{} is the judge contract; budgets{} is advisory.
# Chat quality benchmark — curated question catalogue.
#
# This is the single source of truth for `scripts/run_chat_quality_benchmark.py`.
# Each entry is purely descriptive — the script captures heuristics (tool calls,
# refusal flags, latency, must_not_say hits) per question but does NOT gate
# pass/fail strictly. The acceptance gate lives in `tests/validation/chat_eval/`.
#
# Schema:
#   id:                          unique short slug
#   prompt:                      verbatim user question
#   category:                    one of [factual_lookup, screener, relationship,
#                                       financial_data, news, comparison,
#                                       signal, multilingual, adversarial,
#                                       refusal_premise]
#   tags:                        list[str] — used for --tags filtering
#                                ("real_user", "smoke", "aggregate", "iter3", ...)
#   expected_tools:              list[str] — HINT, not a gate. Tools we expect
#                                the agent to plausibly call. Captured as a
#                                "tool_overlap" diagnostic only.
#   expected_entities_mentioned: list[str] — substrings we expect in answer
#   expected_numeric_class:      one of [none, currency, percent, count, ratio,
#                                       date, mixed]
#   expected_min_words:          int — answers shorter than this are flagged
#   expected_max_latency_s:      float — answers slower than this are flagged
#   must_not_say:                list[str] — forbidden phrases (e.g. blanket
#                                "No data was found" refusals on questions
#                                where data exists)
#   notes:                       free-text human guidance / context

# --------------------------------------------------------------------------
# real_user — five questions the user pasted on 2026-05-28 as known
# failure / poor-quality cases. These drive the first benchmark run.
# --------------------------------------------------------------------------

- id: ru_mstr_news
  prompt: Show me the latest news on MSTR — what should I know?
  category: news
  tags: [real_user, smoke, news, aggregate]
  rubric:
    expected_tools: [get_entity_news, search_documents]
    required_facts: []
    forbidden_facts: []
    expected_depth: medium
    appropriate_refusal_ok: false
  budgets:
    max_latency_s: 60
  # PLAN-0110 W5 (F9/OQ-1): consolidated from chat_eval/questions.yaml q2 — the
  # binary acceptance gate reads these ground_truth_assertions via the harness.
  chat_eval_id: q2
  ground_truth_assertions:
    require_http_200: true
    min_distinct_tools: 2
    must_mention_any_of: [Bitcoin, BTC]
    min_verdict: MARGINAL
  notes: 'User-reported quality issue. Watch for blanket "no data" refusals when

    MSTR articles exist in the corpus. Expect Bitcoin treasury context.

    '

