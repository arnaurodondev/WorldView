  rubric:
    expected_tools: [query_fundamentals, get_fundamentals_history, search_documents]
    required_facts: [Anchors to AMD's recent data-center or total revenue from fundamentals, Reasons
        that a 5-point share gain applied to the served market implies an incremental revenue amount,
      Gives an order-of-magnitude / hedged revenue swing and states the assumption (served market size
        or share base) it depends on]
    forbidden_facts: [Refuses to estimate because it is hypothetical, States one precise dollar figure
