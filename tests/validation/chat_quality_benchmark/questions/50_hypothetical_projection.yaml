    reason a hedged margin-compression magnitude from a 15% HBM cost rise.
  expected_chain: [query_fundamentals, search_documents]
  rubric:
    expected_tools: [query_fundamentals, get_fundamentals_history, search_documents]
    required_facts: [Anchors to NVIDIA's recent gross/operating margin from fundamentals, Reasons that
        HBM is a material component cost so a 15% HBM cost rise lifts COGS and compresses gross margin,
        Attaches a hedged / range-based magnitude and states the assumption it depends on (HBM share
        of BOM, pass-through ability)]
    forbidden_facts: [Refuses the projection as unknowable future, States one precise margin figure with
        no hedge or stated assumption, Claims HBM is not a component of NVIDIA's data-center GPUs]
    expected_depth: deep
    appropriate_refusal_ok: false
    must_not_call: []
    entity_aliases:
      NVIDIA: [NVDA, NVIDIA Corporation]
  budgets:
    max_latency_s: 120
  notes: "PROJECTION SHAPE: component-cost sensitivity. Distinct from the wafer\n  question — HBM is a\
    \ different BOM line. Tests that the model can pick\n  the right cost input and still hedge. Refusal\
    \ = gate regression."

- id: hypo_aapl_fx_gross_margin
  prompt: If the US dollar strengthened materially against Apple's key overseas currencies, how might
    that pressure Apple's reported gross margin?
  category: projection
  tags: [hypothetical, projection, sensitivity, margin, macro]
  intent: Anchor to Apple's international revenue mix and current gross margin, then reason how a stronger
    dollar translates foreign revenue into fewer dollars and pressures reported margin, with a hedged magnitude.
  expected_chain: [query_fundamentals, get_entity_intelligence]
  rubric:
    expected_tools: [query_fundamentals, get_fundamentals_history, get_entity_intelligence, search_documents]
    required_facts: [Notes Apple earns a large share of revenue outside the US so FX translation matters,
      Reasons that a stronger dollar reduces the dollar value of overseas revenue and can pressure reported
        margin absent hedging, Gives a hedged / directional magnitude and flags Apple's currency hedging
        as a mitigating assumption]
    forbidden_facts: [Refuses because currency moves are unpredictable, Gives a single precise margin
        number with no hedge, Claims Apple has no international revenue exposure]
    expected_depth: deep
    appropriate_refusal_ok: false
    must_not_call: []
    entity_aliases:
      Apple: [AAPL, Apple Inc., Apple Inc]
  budgets:
    max_latency_s: 120
  notes: "PROJECTION SHAPE: macro/FX sensitivity. Good answers hedge heavily and\n  name the mitigant\
    \ (hedging programme). Tests directional reasoning under\n  a macro assumption without a certain number."

