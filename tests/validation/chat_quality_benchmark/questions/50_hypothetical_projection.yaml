    conditioned on the news holding — citing the specific news it relies on.
  expected_chain: [get_entity_news, get_fundamentals_history]
  rubric:
    expected_tools: [get_entity_news, search_documents, query_fundamentals, get_fundamentals_history]
    required_facts: ['Cites at least one concrete recent Broadcom news item or development as the basis',
      Anchors to Broadcom's recent revenue trend from fundamentals, Reasons a hedged / directional FY
        revenue trajectory that is explicitly conditioned on the cited news holding]
    forbidden_facts: [Refuses because forecasting revenue is not possible, Gives a precise FY revenue
        number with no hedge and no cited news, Invents a news development not returned by any tool]
    expected_depth: deep
    appropriate_refusal_ok: false
    must_not_call: []
    entity_aliases:
      Broadcom: [AVGO, Broadcom Inc., Broadcom Inc]
  budgets:
    max_latency_s: 120
  notes: "PROJECTION SHAPE: news-conditioned trajectory. The 'assuming the current\n  news holds' framing\
    \ is the exact signal the new gate keys on. The answer\n  MUST cite the news it derives from — an\
