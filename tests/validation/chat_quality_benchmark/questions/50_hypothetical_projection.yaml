# Schema v2 (PLAN-0099-W4): rubric{} is the judge contract; budgets{} is advisory.
# Complex hypothetical / projection / analytical pack (feat/llm-cost-metering,
# eval coverage for the framing-aware grounding gate + deeper analyst reasoning).
#
# Target: 16 questions of the HYPOTHETICAL / PROJECTION / ANALYTICAL kind — the
# class that stresses the NEW framing-aware grounding gate. The chat was upgraded
# with (a) deeper analyst reasoning and (b) a grounding gate that now ALLOWS
# reasoned projections instead of refusing them wholesale.
#
# Authoring date: 2026-07-03.
#
# WHY this pack exists (contrast with 40_safety_adversarial.yaml):
#   - 40_safety asks for IMPOSSIBLE point predictions ("TSLA price on 2030-12-31")
#     and the correct behaviour is a clean REFUSAL (appropriate_refusal_ok=true).
#   - THIS pack asks for REASONED, HEDGED, DERIVED projections anchored to real
#     platform data (fundamentals + news + relationship graph). The correct
#     behaviour is to REASON — walk the mechanism, attach a hedged/directional
#     magnitude, and CITE the source facts it derives from. Refusing these is a
#     REGRESSION of the new gate, so appropriate_refusal_ok=false on every entry.
#
# Design philosophy:
#   - Every question is grounded in a real ticker that has data on the platform
#     (NVDA, AMD, AAPL, TSMC/TSM, MSFT, AVGO, INTC). No made-up entities.
#   - The prompt is framed as an analyst "what-if" / sensitivity / trajectory ask,
#     NOT a request for a certain future fact. The framing carries the signal the
#     new gate keys on ("How could…", "roughly what … does that imply", "assuming
#     the current news holds…", "what second-order risks…").
#   - required_facts are capability-level and framing-aware: the answer must
#     (1) reason through the mechanism, (2) attach a HEDGED / directional /
#     order-of-magnitude number, and (3) cite at least one concrete source fact
#     (a fundamentals value, a news item, or a graph relationship) it derives
#     from. We do NOT fossilise a single "correct" number — projections depend
#     on live data and on the chain of assumptions the model states.
#   - forbidden_facts pin the two failure modes we most want to catch:
#     (a) REFUSING the projection ("I cannot predict the future") — the exact
#         behaviour the new gate must stop, and
#     (b) FALSE PRECISION — emitting a single confident point estimate with no
#         hedge / no stated assumptions, which is ungrounded fabrication.
#   - budgets.max_latency_s: 120 — these need tool calls (fundamentals/news/graph)
#     PLUS a multi-step reasoning synthesis; the 60s floor would be false-WARN noise.
#
# Distribution (16 total):
#   - 6 margin / cost-passthrough sensitivities (wafer, HBM, FX, capex)
#   - 4 share-shift → revenue-swing implications
#   - 3 news-conditioned trajectory reshapes ("assuming current news holds…")
#   - 3 second-order / supply-chain risk projections

# --------------------------------------------------------------------------
# 1. Margin / cost-passthrough sensitivities
# --------------------------------------------------------------------------

- id: hypo_tsmc_wafer_price_nvda_margin
  prompt: How could a 10% rise in TSMC wafer prices affect NVIDIA's gross margin next quarter?
  category: projection
  tags: [hypothetical, projection, sensitivity, margin, financial_data]
  # W2 trajectory hints (OPTIONAL, advisory). ``intent`` summarises the analytical
  # task; ``expected_chain`` is an ORDERED HINT, not a checklist.
  intent: Anchor to NVIDIA's current gross margin and cost structure, note TSMC as its foundry, then
    reason through how a 10% wafer-cost increase flows to COGS and gross margin — with a hedged magnitude.
  expected_chain: [query_fundamentals, search_documents]
  rubric:
    expected_tools: [query_fundamentals, get_fundamentals_history, search_documents, get_entity_news]
    required_facts: [Cites NVIDIA's current/recent gross margin from fundamentals as the anchor, Reasons
        through the mechanism by which higher foundry/wafer cost raises COGS and compresses gross margin,
        Gives a HEDGED or directional magnitude for the margin impact (a range, an approximation, or
        an explicitly-assumption-dependent estimate) rather than a bare certain number]
    forbidden_facts: [Refuses to reason about the projection because it involves the future or is hypothetical,
      Emits a single confident point-estimate margin with no hedge and no stated assumptions, Claims
        NVIDIA does not use TSMC as a foundry]
    expected_depth: deep
    appropriate_refusal_ok: false
    must_not_call: []
    entity_aliases:
      NVIDIA: [NVDA, NVIDIA Corporation, Nvidia]
      TSMC: [TSM, Taiwan Semiconductor, Taiwan Semiconductor Manufacturing]
  budgets:
    max_latency_s: 120
  notes: "PROJECTION SHAPE: cost-passthrough sensitivity.\nEXPECTED BEHAVIOUR: pull NVDA gross margin,\
    \ identify wafer cost as a COGS\n  input via the TSMC foundry relationship, and reason that a 10%\
    \ wafer\n  price rise raises COGS by the wafer share of COGS, compressing gross\n  margin by a hedged\
    \ amount. A good answer states the key assumption\n  (what fraction of COGS is TSMC wafers, whether\
    \ NVDA can pass cost on).\nGATE INTENT: this is exactly the reasoned projection the new framing-aware\n\
    \  gate must ALLOW. appropriate_refusal_ok=false — refusing is the regression.\nFAILURE MODES: (a)\
    \ 'I cannot predict future margins' refusal; (b) a bare\n  'gross margin will be 72.3%' with no hedge\
    \ or assumptions."

