# Schema v2 (PLAN-0099-W4): rubric{} is the judge contract; budgets{} is advisory.
# Complex multi-hop / comparison / deep-investigation pack
#
# Authoring date: 2026-06-30.
#
# Target: ~17 questions that REQUIRE 3+ tools spanning DIFFERENT data domains
# (news AND knowledge-graph/relationships AND fundamentals) plus cross-entity
# reasoning. These exist to validate the chat upgrade that (a) batches multiple
# tool calls in parallel in round 1 and (b) performs deeper, adaptive analyst
# investigations across tools.
#
# Design philosophy:
#   - DIFFERENT from the chain-of-tools pack (20_*): those test a STRICT data
#     dependency (iter-2 inputs come from iter-1 output). THESE test BREADTH +
#     SYNTHESIS: several independent sources that should fire in PARALLEL, then
#     be fused into one cross-entity, multi-hop answer. Many of these are
#     "compare A and B across news + KG + fundamentals" — exactly the shape the
#     parallel-batching upgrade targets.
#   - Every question demands at least THREE distinct tools from at least TWO
#     domains (news / KG / fundamentals / portfolio / macro).
#   - `required_facts` are capability-level (e.g. "makes the supply-chain
#     connection between X and Y"), never a hard fossilised answer, because the
#     live data moves. We grade the REASONING and the SOURCING, not one string.
#   - Real tickers only (NVDA/AMD/AAPL/TSMC/MSFT/AVGO/GOOGL/META/INTC/TSLA/QCOM).
#   - `max_latency_s: 150` — parallel batching helps, but a 3-4 tool
#     investigation with synthesis is legitimately slower than a single-tool ask;
#     the 60-120s floors elsewhere would create false-WARN noise.
#
# Distribution (17 total):
#   - 6 head-to-head comparisons (news + fundamentals + KG)
#   - 5 supply-chain / ripple multi-hop traces (KG + news + fundamentals)
#   - 3 portfolio-anchored cross-domain investigations
#   - 3 single-entity deep dives (fundamentals + news + KG together)

# --------------------------------------------------------------------------
# Head-to-head comparisons — the canonical parallel-batching shape. Both
# entities are in the prompt, so a good agent fans out MANY tools at once
# (fundamentals for both + news for both + the shared KG relationship) rather
# than serialising. Synthesis must weigh all three domains into a verdict.
# --------------------------------------------------------------------------

- id: cmp_nvda_amd_datacenter_tsmc
  prompt: Compare NVIDIA and AMD on their latest revenue and data-center momentum, and factor in their
    shared dependence on TSMC. Who is better positioned right now?
  category: comparison
  tags: [complex_investigation, multi_hop, comparison, relationship, financial_data, news]
  intent: Compare NVDA and AMD across fundamentals and recent news, surface their shared TSMC
    supply-chain exposure via the graph, then render a positioning verdict.
  expected_chain: [get_fundamentals_history_batch, get_entity_news, traverse_graph, compare_entities]
  rubric:
    expected_tools: [get_fundamentals_history_batch, query_fundamentals, get_entity_news, search_documents,
      traverse_graph, search_entity_relations, compare_entities]
    required_facts: [Reports a revenue or revenue-growth figure for BOTH NVIDIA and AMD, References
        recent data-center or AI news momentum for at least one of the two, Makes the connection that
        BOTH depend on TSMC for fabrication, Offers a reasoned positioning verdict grounded in the data
        rather than a bare opinion]
    forbidden_facts: [Claims NVIDIA and AMD fabricate their own chips in-house, Gives a verdict without
        citing any fundamental figure]
    expected_depth: deep
    appropriate_refusal_ok: false
    must_not_call: []
    entity_aliases:
      NVIDIA: [NVDA, NVIDIA Corporation, Nvidia]
      AMD: [Advanced Micro Devices, AMD]
      TSMC: [TSM, Taiwan Semiconductor, Taiwan Semiconductor Manufacturing]
  budgets:
    max_latency_s: 150
  notes: |
    THREE-DOMAIN FUSION (news + fundamentals + KG), parallel-batchable.
      Round 1 (parallel): get_fundamentals_history_batch([NVDA, AMD]) +
        get_entity_news(NVDA) + get_entity_news(AMD) + traverse_graph for the
        TSMC supplier edge. None of these depend on each other — a good agent
        fires them together.
      Synthesis: weigh revenue + data-center momentum + the shared TSMC risk
        into a single positioning call.

    WHY: this is THE flagship parallel-batching + comparison case. The shared
    TSMC dependency is the multi-hop twist — both companies route through one
    supplier, which a fundamentals-only or news-only answer would miss.

    FAILURE MODES TO CATCH:
      - Answers from training-data priors ("NVIDIA dominates AI") without
        calling fundamentals for either name.
      - Serialises NVDA-fully-then-AMD-fully instead of batching (slow, and
        often runs out of iterations before the TSMC hop).
      - Never surfaces the shared TSMC dependency — treats them as independent.

- id: cmp_aapl_msft_capital_return_vs_growth
  prompt: Apple versus Microsoft — compare how each returns capital to shareholders against how fast each
    is still growing, and tie in what recent news says about each one's outlook.
  category: comparison
  tags: [complex_investigation, multi_hop, comparison, financial_data, news]
  intent: Compare AAPL and MSFT on capital-return and growth metrics from fundamentals, then blend in
    recent news on each company's forward outlook.
  expected_chain: [get_fundamentals_history_batch, get_entity_news, compare_entities]
  rubric:
    expected_tools: [get_fundamentals_history_batch, query_fundamentals, get_entity_news, search_documents,
      compare_entities]
    required_facts: [Cites a growth metric (revenue or EPS growth) for BOTH Apple and Microsoft, References
        a capital-return signal (dividend, buyback, or payout) for at least one of the two, Summarises
        at least one recent news theme bearing on either company's outlook]
    forbidden_facts: [Claims Microsoft pays no dividend, Reports identical figures for both companies
        as if copied]
    expected_depth: deep
    appropriate_refusal_ok: false
    must_not_call: []
    entity_aliases:
      Apple: [AAPL, Apple Inc., Apple Inc]
      Microsoft: [MSFT, Microsoft Corporation]
  budgets:
    max_latency_s: 150
  notes: |
    Two-domain comparison (fundamentals + news) with a growth-vs-return
    framing that forces the agent to pull MULTIPLE fundamentals dimensions
    (not just one metric) and reconcile them with the news narrative.
    Parallel-batchable: fundamentals-batch + news for both in round 1.

    FAILURE MODES: reports one metric and stops; forgets the news leg;
    fabricates a buyback figure not present in the tool output.

- id: cmp_googl_meta_ai_ad_moat
  prompt: Between Alphabet and Meta, whose advertising business looks more defensible right now? Weigh
    their fundamentals, the latest news on AI competition, and any knowledge-graph links to their rivals.
  category: comparison
  tags: [complex_investigation, multi_hop, comparison, relationship, financial_data, news]
  intent: Compare GOOGL and META ad-business fundamentals, incorporate recent AI-competition news, and
    use the graph to surface each one's competitive relationships.
  expected_chain: [get_fundamentals_history_batch, get_entity_news, traverse_graph, get_entity_intelligence]
  rubric:
    expected_tools: [get_fundamentals_history_batch, query_fundamentals, get_entity_news, search_documents,
      traverse_graph, search_entity_relations, get_entity_intelligence, compare_entities]
    required_facts: [Reports a fundamental figure (revenue, margin, or growth) for BOTH Alphabet and
        Meta, References recent news bearing on AI or advertising competition, Names at least one competitor
        or relationship pulled from the knowledge graph for either company]
    forbidden_facts: [Treats Alphabet and Meta as non-competitors, Gives a defensibility verdict with
        no fundamental or news evidence]
    expected_depth: deep
    appropriate_refusal_ok: false
    must_not_call: []
    entity_aliases:
      Alphabet: [GOOGL, GOOG, Google, Alphabet Inc.]
      Meta: [META, Meta Platforms, Facebook]
  budgets:
    max_latency_s: 150
  notes: |
    Three-domain fusion with a qualitative "moat/defensibility" verdict that
    must be grounded, not vibes. Exercises the KG competitor-edge branch
    alongside fundamentals + news.

