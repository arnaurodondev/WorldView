  intent: Compare AVGO and QCOM fundamentals and recent news, then use each one's customer/partner
    relationships in the graph to argue which is more diversified.
  expected_chain: [get_fundamentals_history_batch, traverse_graph, get_entity_news, compare_entities]
  rubric:
    expected_tools: [get_fundamentals_history_batch, query_fundamentals, traverse_graph, search_entity_relations,
      get_entity_news, search_documents, compare_entities]
    required_facts: [Reports a revenue or growth figure for BOTH Broadcom and Qualcomm, Uses relationship-graph
        data (customers, partners, or segments) to characterise diversification for at least one, Reaches
        a reasoned conclusion on which is more diversified]
    forbidden_facts: [Claims Qualcomm has no data-center exposure at all, Concludes diversification without
