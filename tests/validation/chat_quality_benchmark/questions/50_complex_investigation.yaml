      Broadcom: [AVGO, Broadcom Inc.]
      Qualcomm: [QCOM, Qualcomm Incorporated]
  budgets:
    max_latency_s: 150
  notes: |
    KG-heavy comparison: the diversification claim MUST be grounded in graph
    relationships (customer/partner edges), not just fundamentals. Tests that
    the agent reaches into the graph for a qualitative structural argument.

