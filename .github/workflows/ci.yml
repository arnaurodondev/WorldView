name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │  Job dependency graph                                                       │
# │                                                                             │
# │  lint  validate-schemas  validate-service-structure  import-guards          │
# │  architecture-tests  test-libs  test-frontend  (fast path, all parallel)   │
# │                               │                                             │
# │       ┌──────────┬────────────┼──────────────┐                             │
# │       │          │            │              │                              │
# │  test-services  test-contract  test-integration  test-e2e                  │
# │  (unit,10 svcs) (3 svcs)     (portfolio +        (8 svcs, compose)         │
# │                               market-data, alert,                          │
# │                               api-gateway,                                 │
# │                               rag-chat,                                    │
# │                               testcontainers)                              │
# │                                                                             │
# │  validate-service-structure, import-guards, and architecture-tests gate    │
# │  all long-running test jobs via needs: [...].                               │
# └─────────────────────────────────────────────────────────────────────────────┘

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Fast path — no infrastructure required
  # ═══════════════════════════════════════════════════════════════════════════

  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      # Pin versions so a new ruff/mypy release can't silently break CI.
      # ruff must match .pre-commit-config.yaml rev (v0.4.0) exactly to ensure
      # format output is identical and no phantom reformats occur in CI.
      - name: Install tools
        run: python -m pip install "ruff==0.4.0" "mypy>=1.10,<2"

      - name: Ruff check
        run: ruff check libs/ services/

      - name: Ruff format
        run: ruff format --check libs/ services/

      - name: Install libs for type-checking
        run: |
          # libs/messaging depends on observability at runtime.
          # A per-lib loop installs alphabetically (m before o), so pip tries
          # to resolve observability from PyPI and fails. One combined pip call
          # lets the resolver see all local packages at once.
          python -m pip install \
            $(for dir in libs/*/; do printf " -e %s" "$dir"; done) \
            --quiet
          # Second pass adds [dev] extras; all local deps are now satisfied.
          python -m pip install \
            $(for dir in libs/*/; do printf " -e %s[dev]" "${dir%/}"; done) \
            --quiet

      # Only type-check lib sources — service deps are not installed in this
      # job so running mypy on services/ would produce "missing import" noise.
      - name: mypy (libs)
        run: |
          for src in libs/*/src; do
            if [ -d "$src" ]; then
              echo "=== mypy $src ==="
              mypy "$src"
            fi
          done

  validate-schemas:
    name: Validate Avro Schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install fastavro
        run: python -m pip install "fastavro>=1.9,<2"

      - name: Validate schemas
        run: |
          python3 -c "
          import json, pathlib, fastavro, sys
          schema_dir = pathlib.Path('infra/kafka/schemas')
          if not schema_dir.exists():
              print('No schemas directory found, skipping.')
              sys.exit(0)
          failed = False
          for f in sorted(schema_dir.glob('*.avsc')):
              try:
                  schema = json.loads(f.read_text())
                  fastavro.parse_schema(schema)
                  print(f'  OK: {f.name}')
              except Exception as e:
                  print(f'  FAIL: {f.name}: {e}')
                  failed = True
          if failed:
              sys.exit(1)
          "

  # ═══════════════════════════════════════════════════════════════════════════
  # Service structure validator — fast path, no infra required
  # ═══════════════════════════════════════════════════════════════════════════

  validate-service-structure:
    name: Validate Service Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install PyYAML
        run: python -m pip install "pyyaml>=6" --quiet

      - name: Validate service structure (strict)
        run: >
          python scripts/structure_checks/check_service_structure.py
          --strict
          --allow-exceptions-file scripts/structure_checks/exceptions.yaml
          --report-json /tmp/structure-report.json

      - name: Upload structure report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: structure-violation-report
          path: /tmp/structure-report.json

  # ═══════════════════════════════════════════════════════════════════════════
  # Import guards — AST-based anti-pattern enforcement, fast path
  # ═══════════════════════════════════════════════════════════════════════════

  import-guards:
    name: Import Guards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install PyYAML
        run: python -m pip install "pyyaml>=6" --quiet

      - name: Run import guards (strict)
        run: >
          python scripts/import_guards/check_import_guards.py
          --strict
          --baseline scripts/import_guards/baseline.json
          --report-json /tmp/import-guards-report.json

      - name: Upload import guard report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: import-guard-violation-report
          path: /tmp/import-guards-report.json

  # ═══════════════════════════════════════════════════════════════════════════
  # Architecture tests — fast path pytest suite, no infra required
  # ═══════════════════════════════════════════════════════════════════════════

  architecture-tests:
    name: Architecture Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install pytest and yaml
        run: python -m pip install "pytest>=8" "pytest-asyncio>=0.23" "pyyaml>=6" "structlog>=23" "httpx>=0.27" --quiet

      - name: Run architecture tests
        run: pytest tests/architecture -v --tb=short

  # ═══════════════════════════════════════════════════════════════════════════
  # Avro schema forward+backward compatibility gate
  #
  # WHY: content.article.stored.v1 gained a trailing field; the new 17-field
  # consumer could not positionally decode old 16-field bytes → EOFError →
  # ~82% of docs dead-lettered silently. This job diffs every changed
  # infra/kafka/schemas/*.avsc against the base branch and fails a schema
  # change that is not append-only + defaulted + resolution-compatible.
  #
  # Needs FULL git history (fetch-depth: 0) so `git show <base>:<schema>` can
  # read the previous version. SCHEMA_BASE_REF pins the diff base to the PR
  # target (origin/<base>) — or origin/main for pushes.
  # ═══════════════════════════════════════════════════════════════════════════
  schema-compat:
    name: Avro Schema Compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0  # full history: the gate reads the previous schema via `git show`

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install pytest and fastavro
        run: python -m pip install "pytest>=8" "pytest-asyncio>=0.23" "fastavro>=1.9" --quiet

      - name: Determine base ref
        id: base
        run: |
          BASE="${{ github.base_ref || github.event.repository.default_branch }}"
          BASE="${BASE:-main}"
          git fetch --no-tags --depth=200 origin "$BASE" || true
          echo "ref=origin/$BASE" >> "$GITHUB_OUTPUT"

      - name: Run Avro compatibility gate
        env:
          SCHEMA_BASE_REF: ${{ steps.base.outputs.ref }}
        run: pytest tests/contract/test_avro_schema_compat.py -v --tb=short

  test-libs:
    name: Test Libraries — ${{ matrix.lib }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lib: [common, contracts, messaging, storage, observability, ml-clients]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      # Install all local libs first in one pip call so cross-lib runtime deps
      # (e.g. messaging → observability) resolve without hitting PyPI.
      # Then install the target lib again with [dev] to add test/lint extras.
      - name: Install library
        run: |
          python -m pip install \
            $(for dir in libs/*/; do printf " -e %s" "$dir"; done) \
            --quiet
          python -m pip install -e "libs/${{ matrix.lib }}[dev]" --quiet

      # `not integration` instead of `unit`: common/contracts/observability have
      # no pytestmark at all, so `-m unit` collects 0 tests and exits with code 5.
      - name: Run tests
        run: pytest "libs/${{ matrix.lib }}/tests" -m "not integration" -v --tb=short

  test-services:
    name: Test Services — ${{ matrix.service }} (unit)
    runs-on: ubuntu-latest
    needs: [test-libs, validate-service-structure, import-guards, architecture-tests]
    strategy:
      fail-fast: false
      matrix:
        service:
          - portfolio
          - market-ingestion
          - market-data
          - content-ingestion
          - content-store
          - nlp-pipeline
          - knowledge-graph
          - rag-chat
          - api-gateway
          - alert
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install \
            $(for dir in libs/*/; do printf " -e %s" "$dir"; done) \
            --quiet
          python -m pip install -e "services/${{ matrix.service }}[dev]" --quiet

      # Excludes infra-dependent test tiers: those run in the jobs below.
      - name: Run tests
        run: >
          pytest "services/${{ matrix.service }}/tests"
          -m "not integration and not e2e and not live and not slow"
          -v --tb=short

  test-frontend:
    name: Frontend Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/worldview-web
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "20"

      - name: Install pnpm
        # WHY pnpm@10.33.0: Must match exact version in package.json "packageManager" field.
        # Using a major-only pin (pnpm@10) allows silent drift that can change lockfile
        # format and resolution behaviour between CI runs.
        run: corepack enable && corepack prepare pnpm@10.33.0 --activate

      - name: Cache pnpm store
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('apps/worldview-web/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

  # ═══════════════════════════════════════════════════════════════════════════
  # NOTE: The "E2E Network Budget (Playwright)" job was removed here.
  #
  # It depended on a `test:e2e:budget` npm script and three
  # `e2e/*-network-budget.spec.ts` files that belong to in-flight PLAN-0105
  # (frontend slim-reads). Neither the script nor the specs exist on main or on
  # this branch, so the job failed with ERR_PNPM_RECURSIVE_EXEC_FIRST_FAIL
  # ("Command test:e2e:budget not found"). main already deleted this orphan job
  # in 437ef2f9c; the consolidation merge re-introduced this stale workflow copy.
  # The gate will return with PLAN-0105 once the script and specs land.
  # ═══════════════════════════════════════════════════════════════════════════

  # ═══════════════════════════════════════════════════════════════════════════
  # Contract tests — verifies Avro / OpenAPI schema compatibility
  # No infrastructure needed; uses ASGI in-process transport.
  # ═══════════════════════════════════════════════════════════════════════════

  test-contract:
    name: Contract Tests — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [test-libs, validate-service-structure, import-guards, architecture-tests]
    strategy:
      fail-fast: false
      matrix:
        # Only services with actual contract test files (not empty placeholder dirs).
        # portfolio: 10 test files (Avro shape + OpenAPI contract)
        # alert: test_s1_contract.py (pytest-httpserver mock of S1 Portfolio API)
        # market-ingestion: test_market_dataset_fetched_contract.py (Avro field coverage)
        service: [portfolio, alert, market-ingestion]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install \
            $(for dir in libs/*/; do printf " -e %s" "$dir"; done) \
            --quiet
          python -m pip install -e "services/${{ matrix.service }}[dev]" --quiet

      - name: Run contract tests
        run: pytest services/${{ matrix.service }}/tests -m contract -v --tb=short

  # ═══════════════════════════════════════════════════════════════════════════
  # Integration tests — testcontainers (Docker-in-CI, no compose stack needed)
  #
  # Scope: portfolio and market-data only.
  #   - portfolio: testcontainers Postgres + in-process ASGI
  #   - market-data: testcontainers TimescaleDB + Kafka + MinIO + Valkey
  #
  # market-ingestion has no testcontainers in its dev deps; its integration
  # tests require live infra and run inside the test-e2e compose job below.
  # ═══════════════════════════════════════════════════════════════════════════

  test-integration:
    name: Integration Tests — ${{ matrix.service }} (testcontainers)
    runs-on: ubuntu-latest
    needs: [test-libs, validate-service-structure, import-guards, architecture-tests]
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: portfolio
            # portfolio's integration conftest runs Alembic via subprocess,
            # hardcoded to services/portfolio/.venv/bin/alembic (local dev
            # convention).  We symlink the globally-installed binary to that
            # path so the conftest works without modification in CI.
            fix_alembic_venv: true
          - service: market-data
            # market-data conftest uses the Python alembic API directly —
            # no venv path assumption, works out of the box.
            fix_alembic_venv: false
          - service: alert
            # alert uses testcontainers Postgres + the Python alembic API
            # (similar to market-data).  No venv path fix required.
            fix_alembic_venv: false
          - service: api-gateway
            # api-gateway integration tests use ASGI in-process transport with
            # mocked downstream clients (MagicMock) — no testcontainers needed.
            fix_alembic_venv: false
          - service: rag-chat
            # rag-chat integration tests use ASGI in-process transport — fully
            # mocked, no testcontainers or external infra required.
            fix_alembic_venv: false
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install \
            $(for dir in libs/*/; do printf " -e %s" "$dir"; done) \
            --quiet
          python -m pip install -e "services/${{ matrix.service }}[dev]" --quiet

      - name: Symlink alembic into expected venv path (portfolio only)
        if: matrix.fix_alembic_venv
        run: |
          mkdir -p services/portfolio/.venv/bin
          ln -sf "$(which alembic)" services/portfolio/.venv/bin/alembic

      - name: Run integration tests
        run: >
          pytest "services/${{ matrix.service }}/tests"
          -m integration -v --tb=short

  # ═══════════════════════════════════════════════════════════════════════════
  # E2E tests — docker-compose.test.yml per-service profile
  #
  # Each matrix leg runs on its own dedicated runner, so there are no port
  # conflicts between services (all expose kafka:9092, postgres:5432, etc.).
  #
  # Stack startup uses --wait, which blocks until every service healthcheck
  # passes.  Teardown runs unconditionally via `if: always()`.
  #
  # market-ingestion specifics:
  #   Its integration tests also run here (against the live compose stack)
  #   because the service has no testcontainers in its dev deps.
  #   Env vars are set to the localhost-mapped ports that docker-compose exposes.
  # ═══════════════════════════════════════════════════════════════════════════

  test-e2e:
    name: E2E — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [test-libs, validate-service-structure, import-guards, architecture-tests]
    strategy:
      fail-fast: false
      matrix:
        include:
          # Port mappings (host ← container):
          #   55433 ← postgres, 9092 ← kafka, 8081 ← schema-registry
          #   8001 ← portfolio API
          - service: portfolio
            profile: portfolio-test

          # Port mappings:
          #   55433 ← postgres, 7480 ← minio, 9092 ← kafka, 8081 ← schema-registry
          #   6379 ← valkey, 8002 ← market-ingestion API
          - service: market-ingestion
            profile: market-ingestion-test

          # Port mappings:
          #   5433 ← timescaledb, 7480 ← minio, 9092 ← kafka, 8081 ← schema-registry
          #   6379 ← valkey, 8003 ← market-data API
          - service: market-data
            profile: market-data-test

          # Port mappings:
          #   55433 ← postgres, 7480 ← minio, 6379 ← valkey, 9092 ← kafka
          #   8081 ← schema-registry, 8004 ← content-ingestion API
          - service: content-ingestion
            profile: content-ingestion-test

          # Port mappings:
          #   55433 ← postgres, 7480 ← minio, 6379 ← valkey, 9092 ← kafka
          #   8081 ← schema-registry, 8005 ← content-store API
          - service: content-store
            profile: content-store-test

          # Port mappings:
          #   55433 ← postgres(pgvector), 7480 ← minio, 6379 ← valkey
          #   9092 ← kafka, 8081 ← schema-registry
          #   8006 ← nlp-pipeline API, 8007 ← knowledge-graph API
          # The intelligence-test profile brings up both S6 (nlp-pipeline) and
          # S7 (knowledge-graph) against the shared intelligence_db.
          # Two separate matrix entries run their E2E tests on isolated runners.
          - service: nlp-pipeline
            profile: intelligence-test

          - service: knowledge-graph
            profile: intelligence-test

          # Port mappings:
          #   55433 ← postgres(pgvector), 6379 ← valkey
          #   9092 ← kafka, 8081 ← schema-registry, 8010 ← alert API
          - service: alert
            profile: alert-test

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install \
            $(for dir in libs/*/; do printf " -e %s" "$dir"; done) \
            --quiet
          python -m pip install -e "services/${{ matrix.service }}[dev]" --quiet

      # docker.env is gitignored (contains local secrets). In CI, bootstrap
      # from the committed .example files which have correct Docker-network values.
      - name: Create docker.env from example
        run: |
          for svc in portfolio market-ingestion market-data content-ingestion content-store nlp-pipeline knowledge-graph alert; do
            example="services/$svc/configs/docker.env.example"
            target="services/$svc/configs/docker.env"
            if [ -f "$example" ] && [ ! -f "$target" ]; then
              cp "$example" "$target"
            fi
          done

      # Kafka has a 30s start_period; TimescaleDB is also slow on first start.
      # --wait blocks here until every service healthcheck passes.
      - name: Start test stack
        run: |
          if ! docker compose -f infra/compose/docker-compose.test.yml \
              --profile ${{ matrix.profile }} up --build --wait; then
            echo "=== migrate container logs ==="
            docker compose -f infra/compose/docker-compose.test.yml \
              --profile ${{ matrix.profile }} logs --no-color "${{ matrix.service }}-migrate" 2>/dev/null || true
            exit 1
          fi
        timeout-minutes: 12

      # market-ingestion integration tests connect directly to Postgres, MinIO,
      # and Kafka — no testcontainers.  Set localhost URLs matching the ports
      # that docker-compose.test.yml binds on the runner.
      - name: Set env vars for market-ingestion infra
        if: matrix.service == 'market-ingestion'
        run: |
          {
            echo "MARKET_INGESTION_DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:55433/ingestion_db"
            echo "MARKET_INGESTION_STORAGE_ENDPOINT=http://localhost:7480"
            echo "MARKET_INGESTION_STORAGE_ACCESS_KEY=minioadmin"
            echo "MARKET_INGESTION_STORAGE_SECRET_KEY=minioadmin"
            echo "MARKET_INGESTION_STORAGE_BUCKET=market-ingestion"
            echo "MARKET_INGESTION_BRONZE_BUCKET=market-bronze"
            echo "MARKET_INGESTION_CANONICAL_BUCKET=market-canonical"
            echo "MARKET_INGESTION_KAFKA_BOOTSTRAP_SERVERS=localhost:9092"
            echo "MARKET_INGESTION_SCHEMA_REGISTRY_URL=http://localhost:8081"
            echo "MARKET_INGESTION_EODHD_API_KEY=demo"
            echo "MARKET_INGESTION_VALKEY_URL=redis://localhost:6379/0"
          } >> "$GITHUB_ENV"

      # Run integration tests against the live compose infra.
      # market-ingestion, content-ingestion, and content-store have no
      # testcontainers; their integration tests require the live compose stack.
      - name: Run integration tests (market-ingestion only)
        if: matrix.service == 'market-ingestion'
        run: >
          pytest services/market-ingestion/tests/integration
          -m integration -v --tb=short

      # content-ingestion integration tests default to localhost:5432 but
      # docker-compose.test.yml maps Postgres to localhost:55433.
      - name: Set env vars for content-ingestion infra
        if: matrix.service == 'content-ingestion'
        run: |
          echo "S4_TEST_DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:55433/content_ingestion_test_db" >> "$GITHUB_ENV"

      - name: Run integration tests (content-ingestion only)
        if: matrix.service == 'content-ingestion'
        run: >
          pytest services/content-ingestion/tests/integration
          -m integration -v --tb=short

      # content-store integration tests default to localhost:5432 but
      # docker-compose.test.yml maps Postgres to localhost:55433.
      - name: Set env vars for content-store infra
        if: matrix.service == 'content-store'
        run: |
          echo "S5_TEST_DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:55433/content_store_test_db" >> "$GITHUB_ENV"

      - name: Run integration tests (content-store only)
        if: matrix.service == 'content-store'
        run: >
          pytest services/content-store/tests/integration
          -m integration -v --tb=short

      # All services expose their APIs on localhost (ports mapped in compose).
      # E2E tests use ASGI in-process transport; they connect directly to the
      # databases started by the compose stack.  Conftest defaults match the
      # host-mapped ports (55433 for Postgres, 6379 for Valkey, etc.), so no
      # extra env vars are needed for E2E.
      - name: Run E2E tests
        run: >
          pytest services/${{ matrix.service }}/tests/e2e
          -m e2e -v --tb=short

      # Dump background-worker/consumer logs on E2E failure so root cause
      # is visible without re-running the job (the API container's logs
      # are already implicit via the test output, but workers/consumers
      # are silent). Each `logs` invocation is best-effort: services not
      # present in the active profile are skipped without failing the step.
      - name: Dump worker/consumer logs on failure
        if: failure()
        run: |
          for svc in \
            market-ingestion-worker market-ingestion-scheduler market-ingestion-dispatcher \
            nlp-pipeline-article-consumer nlp-pipeline-entity-refresh-consumer \
            nlp-pipeline-unresolved-resolution-worker \
            knowledge-graph-scheduler knowledge-graph-enriched-consumer \
            content-ingestion-worker; do
            echo "=== $svc logs ==="
            docker compose -f infra/compose/docker-compose.test.yml \
              --profile ${{ matrix.profile }} logs --no-color --tail=200 "$svc" 2>/dev/null || true
          done

      - name: Tear down stack
        if: always()
        run: |
          docker compose -f infra/compose/docker-compose.test.yml \
            --profile ${{ matrix.profile }} down -v
