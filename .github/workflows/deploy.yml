name: Deploy

# ─────────────────────────────────────────────────────────────────────────────
# IMAGE PROMOTION MODEL (PLAN-0121, T-16.3)
#
# This workflow IS the image-promotion mechanism. There is no ArgoCD Image
# Updater: it was inert/contradictory and was DELETED on 2026-07-06 (Report B20).
# The single, authoritative promotion path is:
#
#   1. Build + push each changed service image to ghcr.io (job: build-and-push),
#      tagged with BOTH `latest` and the immutable short SHA `<sha7>`.
#   2. Open ONE PR per changed service against worldview-gitops that bumps
#      `values/<service>.yaml` → `image.tag: <sha7>` (job: bump-image-tag).
#   3. A human merges the PR; ArgoCD (plain sync, NOT Image Updater) reconciles
#      the pinned `<sha7>` onto the k3s cluster.
#
# Deployments are therefore PINNED to an immutable SHA (never a floating
# `latest`), so `git revert` of the bump PR is a complete, deterministic
# rollback.
#
# Images live at:  ghcr.io/arnaurodondev/worldview-<service>
#   Make the ghcr packages PUBLIC (recommended) so the cluster can pull without
#   credentials. If kept private, the cluster needs a `ghcr-credentials`
#   imagePullSecret referencing a PAT with `read:packages`.
#
# NOTE: the frontend (worldview-web) is intentionally ABSENT from the build
# matrix — it deploys to Vercel, not the cluster. Do not add it here.
# ─────────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────────────
# Trigger: only on push to main (not on PRs — tests run via ci.yml)
# ─────────────────────────────────────────────────────────────────────────────
on:
  # Standard: build+push images on merge to main. The feat branch is included
  # TEMPORARILY to build images for the first live deploy test from branch code
  # (REMOVE feat/hetzner-k3s-deploy once merged to main). workflow_dispatch lets us
  # re-trigger manually.
  push:
    branches: [main, feat/hetzner-k3s-deploy]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}
  GITOPS_REPO: arnaurodondev/worldview-gitops

# ─────────────────────────────────────────────────────────────────────────────
# Required GitHub Actions secrets (set in worldview repo Settings → Secrets):
#
#   GITOPS_APP_ID          — GitHub App numeric ID (see §6.8.3 in PRD-0024)
#   GITOPS_APP_PRIVATE_KEY — GitHub App private key PEM (base64-encoded)
#   GITHUB_TOKEN           — automatically provided; used for ghcr.io push
#
# How to create the GitHub App (one-time manual step):
#   1. Go to GitHub → Settings → Developer settings → GitHub Apps → New GitHub App
#   2. Name: worldview-deploy-bot
#   3. Homepage URL: https://github.com/arnaurodondev/WorldView
#   4. Permissions:
#        Repository permissions:
#          Contents: Read & write   (to push branches and bump image tags)
#          Pull requests: Read & write (to open PRs)
#          Metadata: Read-only
#   5. Install the App on the worldview-gitops repository only
#   6. Generate a private key → download the .pem file
#   7. Add to worldview repo secrets:
#        GITOPS_APP_ID = the App ID (number shown on the App page)
#        GITOPS_APP_PRIVATE_KEY = base64 of the .pem file:
#          cat <file>.pem | base64 | tr -d '\n'
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Job 1: Detect which services changed in this push
  # ═══════════════════════════════════════════════════════════════════════════
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      # JSON array of service names that changed, e.g.: ["portfolio","alert"]
      services: ${{ steps.filter.outputs.changes }}
      any_changed: ${{ steps.filter.outputs.any_changed }}
      postgres_changed: ${{ steps.filter.outputs.postgres }}
      gliner_changed: ${{ steps.filter.outputs.gliner }}
      synthetic_changed: ${{ steps.filter.outputs.synthetic }}
      # intelligence-migrations is built by its OWN dedicated job (below) because
      # its Dockerfile COPYs files with SERVICE-LOCAL paths (e.g. `COPY
      # requirements.txt .`), so it must build with context
      # services/intelligence-migrations/ — NOT the repo-root context the matrix
      # uses. It is therefore excluded from the build-and-push matrix.
      intelligence_migrations_changed: ${{ steps.filter.outputs['intelligence-migrations'] }}
      # api-gateway is the only service whose Dockerfile does
      # `FROM worldview-python-base:latest`, so it needs the shared base image
      # built + pushed to ghcr BEFORE its matrix build runs (see build-python-base
      # job below). A change to services/api-gateway/** OR libs/** triggers it.
      api_gateway_changed: ${{ steps.filter.outputs['api-gateway'] }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 2  # needed for paths-filter to compare with parent commit

      - name: Detect changed services
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590  # v3
        id: filter
        with:
          # Each key maps to the service name used in image tags and values/ files.
          # Changes to shared libs (libs/**) trigger ALL services to rebuild,
          # since every service depends on them.
          filters: |
            portfolio:
              - 'services/portfolio/**'
              - 'libs/**'
            market-ingestion:
              - 'services/market-ingestion/**'
              - 'libs/**'
            market-data:
              - 'services/market-data/**'
              - 'libs/**'
            content-ingestion:
              - 'services/content-ingestion/**'
              - 'libs/**'
            content-store:
              - 'services/content-store/**'
              - 'libs/**'
            nlp-pipeline:
              - 'services/nlp-pipeline/**'
              - 'libs/**'
            knowledge-graph:
              - 'services/knowledge-graph/**'
              - 'libs/**'
            rag-chat:
              - 'services/rag-chat/**'
              - 'libs/**'
            api-gateway:
              - 'services/api-gateway/**'
              - 'libs/**'
            alert:
              - 'services/alert/**'
              - 'libs/**'
            intelligence-migrations:
              - 'services/intelligence-migrations/**'
              - 'libs/**'
            postgres:
              - 'infra/postgres/**'
            gliner:
              - 'infra/gliner/**'
            synthetic:
              - 'infra/synthetic/**'

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 1b: Build + push the shared python base image
  #
  # WHY: services/api-gateway/Dockerfile begins with
  #        FROM worldview-python-base:latest
  #      That bare (registry-less) reference resolves to docker.io/library/... in
  #      CI, which does NOT exist — so the api-gateway matrix build fails on ANY
  #      push touching services/api-gateway/** or libs/**. Locally it only works
  #      because `make build-bases` builds worldview-python-base:latest first.
  #
  #      This job builds infra/docker/python-base and pushes it to ghcr so the
  #      api-gateway build can consume it. The matrix build below overrides the
  #      bare FROM with this ghcr image via Buildx `build-contexts` (a named
  #      build context keyed on the exact FROM ref) — so NO Dockerfile edit is
  #      needed and the bare tag keeps working for local `make build-bases`.
  #
  #      Only runs when api-gateway is affected (it is the sole consumer today);
  #      gated behind the GHA layer cache so a no-op change is cheap.
  # ═══════════════════════════════════════════════════════════════════════════
  build-python-base:
    name: Build & Push — python-base
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.api_gateway_changed == 'true'
    permissions:
      contents: read
      packages: write  # required for ghcr.io push
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push python-base
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          # Repo-root context: the base Dockerfile COPYs libs/ to build wheels.
          context: .
          file: infra/docker/python-base/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/worldview-python-base:latest
            ${{ env.IMAGE_PREFIX }}/worldview-python-base:${{ steps.tag.outputs.sha }}
          cache-from: type=gha,scope=python-base
          cache-to: type=gha,mode=max,scope=python-base

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 2: Build + push service images to ghcr.io
  # Runs in a matrix: one parallel job per changed service
  # ═══════════════════════════════════════════════════════════════════════════
  build-and-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    # Depend on build-python-base so the api-gateway matrix leg has its base
    # image available. `always()` keeps the matrix running for every OTHER
    # service even when build-python-base is skipped (api-gateway not changed);
    # we only bail if the base build actually FAILED or was cancelled.
    needs: [detect-changes, build-python-base]
    # Only run if at least one service changed AND the base image build (if it
    # ran) did not fail.
    if: >-
      always() &&
      needs.detect-changes.outputs.services != '[]' &&
      needs.detect-changes.outputs.services != '' &&
      needs.build-python-base.result != 'failure' &&
      needs.build-python-base.result != 'cancelled'
    strategy:
      fail-fast: false  # don't cancel other services if one fails
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
        # intelligence-migrations builds in its OWN job (build-intelligence-
        # migrations) with a service-local context — its Dockerfile uses relative
        # COPY paths that break under the repo-root context this matrix uses.
        exclude:
          - service: intelligence-migrations
    permissions:
      contents: read
      packages: write  # required for ghcr.io push

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Short SHA: first 7 chars of the commit SHA, used as the image tag
      - name: Set image tag
        id: tag
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          # Each service Dockerfile expects the build context at repo root
          # (it COPYs libs/ and services/<name>/ directly)
          file: services/${{ matrix.service }}/Dockerfile
          # Override the bare `FROM worldview-python-base:latest` in the
          # api-gateway Dockerfile with the image just pushed to ghcr by the
          # build-python-base job. This is a Buildx named build context keyed on
          # the EXACT FROM reference, so Buildx substitutes it WITHOUT any
          # Dockerfile change. Dockerfiles that don't reference this name (every
          # other service) simply ignore the unused context — harmless even on
          # runs where python-base was not built.
          build-contexts: |
            worldview-python-base:latest=docker-image://${{ env.IMAGE_PREFIX }}/worldview-python-base:latest
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/worldview-${{ matrix.service }}:latest
            ${{ env.IMAGE_PREFIX }}/worldview-${{ matrix.service }}:${{ steps.tag.outputs.sha }}
          # GitHub Actions cache: speeds up subsequent builds significantly
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 3 (optional): Build + push custom Postgres image
  # Only runs when infra/postgres/ changes
  # ═══════════════════════════════════════════════════════════════════════════
  build-postgres:
    name: Build & Push — postgres (custom)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.postgres_changed == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set image tag
        id: tag
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: infra/postgres/
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/worldview-postgres:latest
            ${{ env.IMAGE_PREFIX }}/worldview-postgres:${{ steps.tag.outputs.sha }}
          cache-from: type=gha,scope=postgres
          cache-to: type=gha,mode=max,scope=postgres

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 5 (optional): Build + push the synthetic-monitor image
  #
  # The in-cluster user-journey prober (infra/synthetic/synthetic_monitor.py) is
  # deployed from worldview-gitops (values/synthetic-monitor.yaml, image
  # ghcr.io/arnaurodondev/worldview-synthetic-monitor:latest). It is NOT a
  # `services/<name>` hexagonal service, so it is absent from the matrix above and
  # needs its own custom-image build — mirroring build-postgres. No bump-image-tag
  # step: the manifest pins `:latest` (imagePullPolicy: Always), not a per-SHA tag.
  # Only runs when infra/synthetic/ changes.
  # ═══════════════════════════════════════════════════════════════════════════
  build-synthetic-monitor:
    name: Build & Push — synthetic-monitor (custom)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.synthetic_changed == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set image tag
        id: tag
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: infra/synthetic/
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/worldview-synthetic-monitor:latest
            ${{ env.IMAGE_PREFIX }}/worldview-synthetic-monitor:${{ steps.tag.outputs.sha }}
          cache-from: type=gha,scope=synthetic-monitor
          cache-to: type=gha,mode=max,scope=synthetic-monitor
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 6 (optional): Build + push intelligence-migrations
  #
  # WHY a dedicated job (not the build-and-push matrix): its Dockerfile COPYs
  # files with SERVICE-LOCAL relative paths (`COPY requirements.txt .`,
  # `COPY alembic/ alembic/`, `COPY entrypoint.sh .`, ...) which only resolve
  # when the build context is services/intelligence-migrations/ — NOT the
  # repo-root context the matrix uses. Building it in the matrix fails with
  # "/entrypoint.sh: not found". This mirrors the docker-compose build (context:
  # services/intelligence-migrations). No bump-image-tag PR: it runs as a one-off
  # Job (values/intelligence-migrations.yaml pins :latest), not a Deployment.
  # Only runs when services/intelligence-migrations/** or libs/** changes.
  # ═══════════════════════════════════════════════════════════════════════════
  build-intelligence-migrations:
    name: Build & Push — intelligence-migrations (custom)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.intelligence_migrations_changed == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set image tag
        id: tag
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: services/intelligence-migrations/
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/worldview-intelligence-migrations:latest
            ${{ env.IMAGE_PREFIX }}/worldview-intelligence-migrations:${{ steps.tag.outputs.sha }}
          cache-from: type=gha,scope=intelligence-migrations
          cache-to: type=gha,mode=max,scope=intelligence-migrations
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 7 (optional): Build + push the GLiNER NER server image
  #
  # The GLiNER HTTP server (infra/gliner/server.py) is deployed from
  # worldview-gitops (image ghcr.io/arnaurodondev/worldview-gliner). It is NOT a
  # services/<name> hexagonal service, so it needs its own custom-image build,
  # mirroring build-postgres / build-synthetic-monitor. No bump-image-tag step:
  # the manifest pins :latest, not a per-SHA tag.
  # Only runs when infra/gliner/ changes.
  #
  # NOTE: this build pre-downloads the ~500 MB GLiNER model into the image layer
  # and runs validate_batch.py, so it is slower than the other custom images.
  # ═══════════════════════════════════════════════════════════════════════════
  build-gliner:
    name: Build & Push — gliner (custom)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.gliner_changed == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set image tag
        id: tag
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: infra/gliner/
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/worldview-gliner:latest
            ${{ env.IMAGE_PREFIX }}/worldview-gliner:${{ steps.tag.outputs.sha }}
          cache-from: type=gha,scope=gliner
          cache-to: type=gha,mode=max,scope=gliner
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 4: Bump image tags in worldview-gitops — 1 PR per changed service
  #
  # This job runs AFTER all builds complete. For each changed service
  # (excluding intelligence-migrations which has no Deployment), it:
  #   1. Generates a short-lived GitHub App token for worldview-gitops
  #   2. Checks out worldview-gitops
  #   3. Updates values/<service>.yaml image.tag = <sha>
  #   4. Opens a PR titled: "chore(deploy): bump <service> to <sha>"
  #
  # One PR per service gives granular rollback ability.
  # ═══════════════════════════════════════════════════════════════════════════
  bump-image-tag:
    name: Bump image tag — ${{ matrix.service }}
    runs-on: ubuntu-latest
    # continue-on-error: this job requires the GITOPS_APP_PRIVATE_KEY / GITOPS_APP_ID
    # GitHub App secrets to mint a token for worldview-gitops. Until those are
    # configured, the "Generate GitHub App token" step fails — but that must NOT
    # fail the overall Deploy workflow or block the image pushes above. The gitops
    # values/*.yaml pin `tag: latest`, so the `:latest` images pushed by the build
    # jobs are sufficient for the first deploy WITHOUT this SHA-bump PR automation.
    # Once the App secrets are set, remove this line to make bump failures fatal.
    continue-on-error: true
    needs: [detect-changes, build-and-push]
    # Run even if build-and-push had individual failures (fail-fast: false)
    if: >-
      always() &&
      needs.build-and-push.result != 'skipped' &&
      needs.detect-changes.outputs.services != '[]'
    strategy:
      fail-fast: false
      matrix:
        # Same service list, but exclude intelligence-migrations (no Deployment)
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
        exclude:
          - service: intelligence-migrations

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: tibdex/github-app-token@3beb63f4bd073e61482598c45c71c1019b59b73a  # v2
        with:
          app_id: ${{ secrets.GITOPS_APP_ID }}
          private_key: ${{ secrets.GITOPS_APP_PRIVATE_KEY }}
          # Scope the token to the gitops repo only
          repositories: worldview-gitops

      - name: Install yq
        run: |
          YQ_VERSION="v4.44.3"
          YQ_BINARY="yq_linux_amd64"
          YQ_URL="https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/${YQ_BINARY}"
          YQ_CHECKSUM_URL="https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/checksums"
          sudo wget -qO /usr/local/bin/yq "$YQ_URL"
          EXPECTED=$(curl -sL "$YQ_CHECKSUM_URL" | grep "${YQ_BINARY}$" | awk '{print $1}')
          echo "${EXPECTED}  /usr/local/bin/yq" | sha256sum -c -
          sudo chmod +x /usr/local/bin/yq

      - name: Checkout worldview-gitops
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ steps.app-token.outputs.token }}
          path: gitops

      - name: Set image tag and branch name
        id: meta
        run: |
          SHA="${GITHUB_SHA::7}"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "branch=deploy/${{ matrix.service }}/${SHA}" >> "$GITHUB_OUTPUT"
          echo "pr_title=chore(deploy): bump ${{ matrix.service }} to $SHA" >> "$GITHUB_OUTPUT"

      - name: Check if values file exists
        id: check
        run: |
          if [[ -f "gitops/values/${{ matrix.service }}.yaml" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::values/${{ matrix.service }}.yaml not found in worldview-gitops — skipping"
          fi

      - name: Bump image.tag in values/${{ matrix.service }}.yaml
        if: steps.check.outputs.exists == 'true'
        working-directory: gitops
        run: |
          SHA="${{ steps.meta.outputs.sha }}"
          yq -i ".image.tag = \"${SHA}\"" "values/${{ matrix.service }}.yaml"
          echo "Updated values/${{ matrix.service }}.yaml image.tag → $SHA"

      - name: Create branch and open PR
        if: steps.check.outputs.exists == 'true'
        working-directory: gitops
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SERVICE: ${{ matrix.service }}
          SHA: ${{ steps.meta.outputs.sha }}
          BRANCH: ${{ steps.meta.outputs.branch }}
          PR_TITLE: ${{ steps.meta.outputs.pr_title }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GITOPS_REPO: ${{ env.GITOPS_REPO }}
        run: |
          git config user.name "worldview-deploy-bot[bot]"
          git config user.email "worldview-deploy-bot[bot]@users.noreply.github.com"

          # Check if a PR for this service+sha already exists (idempotent)
          EXISTING=$(gh pr list \
            --repo "$GITOPS_REPO" \
            --head "$BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number' 2>/dev/null || echo "")

          if [[ -n "$EXISTING" ]]; then
            echo "PR #$EXISTING already exists for $BRANCH — skipping"
            exit 0
          fi

          git checkout -b "$BRANCH"
          git add "values/${SERVICE}.yaml"
          git commit -m "${PR_TITLE}"
          git push origin "$BRANCH"

          # Write PR body to a temp file to avoid YAML heredoc issues
          PR_BODY_FILE=$(mktemp)
          printf '## Automated deploy: %s\n\n' "$SERVICE" > "$PR_BODY_FILE"
          printf 'Service: `%s`  \n' "$SERVICE" >> "$PR_BODY_FILE"
          printf 'Image tag: `%s`  \n' "$SHA" >> "$PR_BODY_FILE"
          printf 'Commit: %s  \n' "$COMMIT_SHA" >> "$PR_BODY_FILE"
          printf 'Triggered by: %s  \n' "$ACTOR" >> "$PR_BODY_FILE"
          printf 'Workflow run: %s  \n\n' "$RUN_URL" >> "$PR_BODY_FILE"
          printf '### Changes\n```\nimage.tag: %s\n```\n\n' "$SHA" >> "$PR_BODY_FILE"
          printf '### Review checklist\n' >> "$PR_BODY_FILE"
          printf -- '- [ ] Image built successfully (see workflow run above)\n' >> "$PR_BODY_FILE"
          printf -- '- [ ] No unexpected side effects in this diff\n' >> "$PR_BODY_FILE"
          printf -- '- [ ] Merge when ready to deploy to cluster\n\n' >> "$PR_BODY_FILE"
          printf -- '---\n*This PR was opened automatically by the worldview deploy workflow.*\n' >> "$PR_BODY_FILE"
          printf '*ArgoCD will apply the change automatically once merged to `main`.*\n' >> "$PR_BODY_FILE"

          # Open the PR against main
          gh pr create \
            --repo "$GITOPS_REPO" \
            --title "$PR_TITLE" \
            --base main \
            --head "$BRANCH" \
            --body-file "$PR_BODY_FILE"

          rm -f "$PR_BODY_FILE"
          echo "Opened PR: ${PR_TITLE}"
