      - "8090:8080"
    environment:
      GLINER_MODEL_PATH: "urchade/gliner_large-v2.1"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

