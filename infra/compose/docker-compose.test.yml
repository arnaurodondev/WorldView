  # ── Intelligence Migrations (intelligence_db DDL) ─────────────────────────
  # DDL owner for intelligence_db (pgvector, relations, entities, embeddings).
  # S6 (nlp-pipeline) and S7 (knowledge-graph) set ALEMBIC_ENABLED=false and
  # consume from this DB; they do NOT own DDL.
  intelligence-migrations:
    build:
      context: ../../services/intelligence-migrations
      dockerfile: Dockerfile
    profiles: [intelligence-test, all]
    environment:
      INTELLIGENCE_DB_URL: postgresql://postgres:postgres@postgres:5432/intelligence_db
    depends_on:
      postgres:
        condition: service_healthy
    # entrypoint.sh: 1) alembic upgrade head 2) run seed SQL 3) populate embeddings (non-blocking)
    restart: "no"

  # ── Ollama — embedding / LLM inference ────────────────────────────────────
  ollama:
    image: ollama/ollama:0.6.7
    profiles: [intelligence-test, all]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── GLiNER server — NER inference ──────────────────────────────────────────
  gliner-server:
    build:
      context: ../gliner
      dockerfile: Dockerfile
