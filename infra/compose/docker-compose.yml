---
# Worldview infrastructure — Docker Compose
# Profiles:
#   infra        — full infra (Postgres, Kafka, MinIO, Valkey) + all services
#   lib-test     — minimal infra for lib-level integration tests (MinIO only)
#   monitoring   — observability stack (Prometheus, Grafana, Loki, Tempo, Alloy, Alertmanager)
#   all          — starts every service in this compose file
#
# Usage:
#   Full infra:   docker compose -f infra/compose/docker-compose.yml --profile infra up -d
#   Monitoring:   docker compose -f infra/compose/docker-compose.yml --profile monitoring up -d
#   Infra + Mon:  docker compose -f infra/compose/docker-compose.yml --profile infra --profile monitoring up -d
#   Lib tests:    docker compose -f infra/compose/docker-compose.yml --profile lib-test up -d
#   All:          docker compose -f infra/compose/docker-compose.yml --profile all up -d
#   Teardown:     docker compose -f infra/compose/docker-compose.yml down -v
#
# Env loading rule (applies to all service containers):
#   Each service uses env_file: pointing at configs/docker.env.
#   Docker-internal hostnames (postgres:5432, kafka:29092, etc.) are set there.
#   NEVER duplicate env vars inline — docker.env is the single source of truth
#   for that deployment context.

name: worldview

services:
  # ── MinIO (S3-compatible object storage) ────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    command: server /data --console-address ":9001"
    profiles: [infra, lib-test, all]
    ports:
      - "7480:9000"    # S3 API (matches STORAGE_ENDPOINT default)
      - "7481:9001"    # MinIO console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── MinIO bucket initialisation ─────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    profiles: [infra, lib-test, all]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command: /init-buckets.sh
    volumes:
      - ../minio/init/init-buckets.sh:/init-buckets.sh:ro
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  # Credentials: postgres:postgres — matches all services' docker.env files.
  # Init script creates one database per service (portfolio_db, ingestion_db, …).
  postgres:
    build:
      context: ../postgres
      dockerfile: Dockerfile
    profiles: [infra, all]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka (KRaft mode) ──────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    profiles: [infra, all]
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    profiles: [infra, all]
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/subjects >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 15s

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    profiles: [infra, all]
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: /bin/bash
    command: /create-topics.sh
    volumes:
      - ../kafka/init/create-topics.sh:/create-topics.sh:ro
    restart: "no"

  # ── Schema Registry: register all Avro schemas (one-shot) ─────────────────
  schema-registry-init:
    image: python:3.12-slim
    profiles: [infra, all]
    depends_on:
      schema-registry:
        condition: service_healthy
    volumes:
      - ../kafka/schemas:/schemas:ro
      - ../kafka/init/register-schemas.py:/register-schemas.py:ro
    environment:
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      SCHEMA_DIR: /schemas
    entrypoint: ["python3", "/register-schemas.py"]
    restart: "no"

  # ── Valkey (Redis-compatible cache) ─────────────────────────────────────────
  valkey:
    image: valkey/valkey:7.2-alpine
    profiles: [infra, all]
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Intelligence DB migrations (one-shot) ────────────────────────────────────
  # Owns ALL DDL for intelligence_db. S6/S7 must set ALEMBIC_ENABLED=false.
  intelligence-migrations:
    build:
      context: ../../services/intelligence-migrations
      dockerfile: Dockerfile
    profiles: [infra, all]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      INTELLIGENCE_DB_URL: "postgresql://postgres:postgres@postgres:5432/intelligence_db"
      EMBEDDING_BASE_URL: "http://ollama:11434"
      EMBEDDING_MODEL: "bge-large-en-v1.5"
    restart: "no"

  # ── Portfolio migrations (one-shot) ──────────────────────────────────────────
  portfolio-migrate:
    build:
      context: ../..
      dockerfile: services/portfolio/Dockerfile
    profiles: [infra, all]
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../../services/portfolio/configs/docker.env
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  # ── Portfolio service ────────────────────────────────────────────────────────
  portfolio:
    build:
      context: ../..
      dockerfile: services/portfolio/Dockerfile
    profiles: [infra, all]
    depends_on:
      portfolio-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8001:8000"
    env_file:
      - ../../services/portfolio/configs/docker.env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/readyz')"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ── Portfolio outbox dispatcher ──────────────────────────────────────────────
  portfolio-dispatcher:
    build:
      context: ../..
      dockerfile: services/portfolio/Dockerfile
    profiles: [infra, all]
    depends_on:
      portfolio:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry-init:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    env_file:
      - ../../services/portfolio/configs/docker.env
    command: ["python", "-m", "portfolio.messaging.dispatcher_main"]
    restart: on-failure

  portfolio-instrument-consumer:
    build:
      context: ../..
      dockerfile: services/portfolio/Dockerfile
    profiles: [infra, all]
    depends_on:
      portfolio:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry-init:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    env_file:
      - ../../services/portfolio/configs/docker.env
    command: ["python", "-m", "portfolio.infrastructure.messaging.consumers.instrument_consumer_main"]
    restart: on-failure

  # ── Market ingestion migrations (one-shot) ──────────────────────────────────
  market-ingestion-migrate:
    build:
      context: ../..
      dockerfile: services/market-ingestion/Dockerfile
    profiles: [infra, all]
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../../services/market-ingestion/configs/docker.env
    command: ["alembic", "-c", "alembic.ini", "upgrade", "head"]
    restart: "no"

  # ── Market ingestion service ─────────────────────────────────────────────────
  market-ingestion:
    build:
      context: ../..
      dockerfile: services/market-ingestion/Dockerfile
    profiles: [infra, all]
    depends_on:
      market-ingestion-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      minio:
        condition: service_healthy
      valkey:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8002:8002"
    env_file:
      - ../../services/market-ingestion/configs/docker.env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/healthz')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── Market ingestion scheduler ───────────────────────────────────────────────
  market-ingestion-scheduler:
    build:
      context: ../..
      dockerfile: services/market-ingestion/Dockerfile
    profiles: [infra, all]
    depends_on:
      market-ingestion:
        condition: service_healthy
    env_file:
      - ../../services/market-ingestion/configs/docker.env
    command: ["python", "-m", "market_ingestion.scheduler.main"]
    restart: unless-stopped

  # ── Market ingestion worker ──────────────────────────────────────────────────
  market-ingestion-worker:
    build:
      context: ../..
      dockerfile: services/market-ingestion/Dockerfile
    profiles: [infra, all]
    depends_on:
      market-ingestion:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - ../../services/market-ingestion/configs/docker.env
    command: ["python", "-m", "market_ingestion.worker.main"]
    restart: unless-stopped

  # ── Market ingestion outbox dispatcher ───────────────────────────────────────
  market-ingestion-dispatcher:
    build:
      context: ../..
      dockerfile: services/market-ingestion/Dockerfile
    profiles: [infra, all]
    depends_on:
      market-ingestion:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry-init:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    env_file:
      - ../../services/market-ingestion/configs/docker.env
    command: ["python", "-m", "market_ingestion.messaging.dispatcher_main"]
    restart: on-failure

  # ── Monitoring Stack ────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v3.2.1
    profiles: [monitoring, all]
    ports:
      - "9090:9090"
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  tempo:
    image: grafana/tempo:2.7.2
    profiles: [monitoring, all]
    command: ["-config.file=/etc/tempo.yml"]
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ../tempo/tempo.yml:/etc/tempo.yml:ro
      - tempo_data:/var/tempo
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3200/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  loki:
    image: grafana/loki:3.5.0
    profiles: [monitoring, all]
    command: ["-config.file=/etc/loki/local-config.yml"]
    ports:
      - "3100:3100"
    volumes:
      - ../loki/loki-config.yml:/etc/loki/local-config.yml:ro
      - loki_data:/loki
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  grafana:
    image: grafana/grafana:11.6.0
    profiles: [monitoring, all]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  alloy:
    image: grafana/alloy:v1.8.3
    profiles: [monitoring, all]
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
      - --server.http.listen-addr=0.0.0.0:12345
      - --stability.level=generally-available
    ports:
      - "12345:12345"
      - "4317"
      - "4318"
    volumes:
      - ../alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy_data:/var/lib/alloy/data
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:12345/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  alertmanager:
    image: prom/alertmanager:v0.27.0
    profiles: [monitoring, all]
    ports:
      - "9093:9093"
    volumes:
      - ../alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Content Ingestion (S4) — 4 processes, same image ──────────────────────
  # API server
  content-ingestion:
    build:
      context: ../../services/content-ingestion
      dockerfile: Dockerfile
    profiles: [infra, all]
    command: ["uvicorn", "content_ingestion.app:create_app", "--factory", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8004:8000"
    env_file:
      - ../../services/content-ingestion/configs/docker.env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Scheduler process — evaluates sources and creates tasks
  content-ingestion-scheduler:
    build:
      context: ../../services/content-ingestion
      dockerfile: Dockerfile
    profiles: [infra, all]
    command: ["python", "-m", "content_ingestion.infrastructure.scheduler.scheduler_process"]
    env_file:
      - ../../services/content-ingestion/configs/docker.env
    depends_on:
      content-ingestion:
        condition: service_healthy
    restart: unless-stopped

  # Worker process — claims and executes ingestion tasks
  content-ingestion-worker:
    build:
      context: ../../services/content-ingestion
      dockerfile: Dockerfile
    profiles: [infra, all]
    command: ["python", "-m", "content_ingestion.infrastructure.workers.worker"]
    env_file:
      - ../../services/content-ingestion/configs/docker.env
    depends_on:
      content-ingestion:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    # Scale: docker compose up --scale content-ingestion-worker=3

  # Outbox dispatcher — publishes events from outbox to Kafka
  content-ingestion-dispatcher:
    build:
      context: ../../services/content-ingestion
      dockerfile: Dockerfile
    profiles: [infra, all]
    command: ["python", "-m", "content_ingestion.infrastructure.messaging.outbox.dispatcher_main"]
    env_file:
      - ../../services/content-ingestion/configs/docker.env
    depends_on:
      content-ingestion:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure

volumes:
  minio_data:
  postgres_data:
  kafka_data:
  valkey_data:
  prometheus_data:
  grafana_data:
  tempo_data:
  loki_data:
  alloy_data:
  alertmanager_data:
