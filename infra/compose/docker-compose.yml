---
# Worldview infrastructure — Docker Compose
# Profiles:
#   infra        — full infra (Postgres, Kafka, MinIO, Valkey) + all services
#   lib-test     — minimal infra for lib-level integration tests (MinIO only)
#   all          — starts every service in this compose file
#
# Usage:
#   Full infra:   docker compose -f infra/compose/docker-compose.yml --profile infra up -d
#   Lib tests:    docker compose -f infra/compose/docker-compose.yml --profile lib-test up -d
#   All:          docker compose -f infra/compose/docker-compose.yml --profile all up -d
#   Teardown:     docker compose -f infra/compose/docker-compose.yml down -v
#
# Env loading rule (applies to all service containers):
#   Each service uses env_file: pointing at configs/docker.env.
#   Docker-internal hostnames (postgres:5432, kafka:29092, etc.) are set there.
#   NEVER duplicate env vars inline — docker.env is the single source of truth
#   for that deployment context.

name: worldview

services:
  # ── MinIO (S3-compatible object storage) ────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    command: server /data --console-address ":9001"
    profiles: [infra, lib-test, all]
    ports:
      - "7480:9000"    # S3 API (matches STORAGE_ENDPOINT default)
      - "7481:9001"    # MinIO console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── MinIO bucket initialisation ─────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    profiles: [infra, lib-test, all]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command: /init-buckets.sh
    volumes:
      - ../minio/init/init-buckets.sh:/init-buckets.sh:ro
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  # Credentials: postgres:postgres — matches all services' docker.env files.
  # Init script creates one database per service (portfolio_db, ingestion_db, …).
  postgres:
    build:
      context: ../postgres
      dockerfile: Dockerfile
    profiles: [infra, all]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka (KRaft mode) ──────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    profiles: [infra, all]
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    profiles: [infra, all]
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/subjects >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 15s

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    profiles: [infra, all]
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: /bin/bash
    command: /create-topics.sh
    volumes:
      - ../kafka/init/create-topics.sh:/create-topics.sh:ro
    restart: "no"

  # ── Schema Registry: register all Avro schemas (one-shot) ─────────────────
  schema-registry-init:
    image: python:3.12-slim
    profiles: [infra, all]
    depends_on:
      schema-registry:
        condition: service_healthy
    volumes:
      - ../kafka/schemas:/schemas:ro
      - ../kafka/init/register-schemas.py:/register-schemas.py:ro
    environment:
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      SCHEMA_DIR: /schemas
    entrypoint: ["python3", "/register-schemas.py"]
    restart: "no"

  # ── Valkey (Redis-compatible cache) ─────────────────────────────────────────
  valkey:
    image: valkey/valkey:7.2-alpine
    profiles: [infra, all]
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Portfolio migrations (one-shot) ──────────────────────────────────────────
  portfolio-migrate:
    build:
      context: ../..
      dockerfile: services/portfolio/Dockerfile
    profiles: [infra, all]
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../../services/portfolio/configs/docker.env
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  # ── Portfolio service ────────────────────────────────────────────────────────
  portfolio:
    build:
      context: ../..
      dockerfile: services/portfolio/Dockerfile
    profiles: [infra, all]
    depends_on:
      portfolio-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8001:8000"
    env_file:
      - ../../services/portfolio/configs/docker.env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/readyz')"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ── Portfolio outbox dispatcher ──────────────────────────────────────────────
  portfolio-dispatcher:
    build:
      context: ../..
      dockerfile: services/portfolio/Dockerfile
    profiles: [infra, all]
    depends_on:
      portfolio:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry-init:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    env_file:
      - ../../services/portfolio/configs/docker.env
    command: ["python", "-m", "portfolio.messaging.dispatcher_main"]
    restart: on-failure

  # ── Market ingestion migrations (one-shot) ──────────────────────────────────
  market-ingestion-migrate:
    build:
      context: ../..
      dockerfile: services/market-ingestion/Dockerfile
    profiles: [infra, all]
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../../services/market-ingestion/configs/docker.env
    command: ["alembic", "-c", "alembic.ini", "upgrade", "head"]
    restart: "no"

  # ── Market ingestion service ─────────────────────────────────────────────────
  market-ingestion:
    build:
      context: ../..
      dockerfile: services/market-ingestion/Dockerfile
    profiles: [infra, all]
    depends_on:
      market-ingestion-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      minio:
        condition: service_healthy
      valkey:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8002:8002"
    env_file:
      - ../../services/market-ingestion/configs/docker.env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/healthz')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── Market ingestion scheduler ───────────────────────────────────────────────
  market-ingestion-scheduler:
    build:
      context: ../..
      dockerfile: services/market-ingestion/Dockerfile
    profiles: [infra, all]
    depends_on:
      market-ingestion:
        condition: service_healthy
    env_file:
      - ../../services/market-ingestion/configs/docker.env
    command: ["python", "-m", "market_ingestion.scheduler.main"]
    restart: unless-stopped

  # ── Market ingestion worker ──────────────────────────────────────────────────
  market-ingestion-worker:
    build:
      context: ../..
      dockerfile: services/market-ingestion/Dockerfile
    profiles: [infra, all]
    depends_on:
      market-ingestion:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - ../../services/market-ingestion/configs/docker.env
    command: ["python", "-m", "market_ingestion.worker.main"]
    restart: unless-stopped

  # ── Market ingestion outbox dispatcher ───────────────────────────────────────
  market-ingestion-dispatcher:
    build:
      context: ../..
      dockerfile: services/market-ingestion/Dockerfile
    profiles: [infra, all]
    depends_on:
      market-ingestion:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry-init:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    env_file:
      - ../../services/market-ingestion/configs/docker.env
    command: ["python", "-m", "market_ingestion.messaging.dispatcher_main"]
    restart: on-failure

volumes:
  minio_data:
  postgres_data:
  kafka_data:
  valkey_data:
