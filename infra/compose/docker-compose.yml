      # checks; give the probe a 10s budget so a transiently slow check reports
      # "degraded" (503) rather than the Docker probe itself timing out (BP-350).
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/readyz', timeout=9)"]
