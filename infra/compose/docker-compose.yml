      dockerfile: services/content-store/Dockerfile
    profiles: [infra, all]
    depends_on:
      content-store-migrate:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
      schema-registry-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
    env_file:
      - ../../services/content-store/configs/docker.env
    command: ["python", "-m", "content_store.infrastructure.messaging.consumers.article_consumer_main"]
    expose: ["9100"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9100/healthz', timeout=4).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # H-5 Stage C streaming near-duplicate cluster writer (PLAN-0088).
  # Reads content.article.stored.v1 (S5 outbox output) and writes
  # near-duplicate pairs (Jaccard ≥ 0.65) into duplicate_clusters.
  # Separate consumer group from content-store-consumer so it maintains
  # its own independent offset on the stored.v1 topic.
  content-store-dedup-consumer:
    build:
      context: ../..
      dockerfile: services/content-store/Dockerfile
    profiles: [infra, all]
    depends_on:
      content-store-migrate:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
      schema-registry-init:
        condition: service_completed_successfully
    env_file:
      - ../../services/content-store/configs/docker.env
    command: ["python", "-m", "content_store.infrastructure.messaging.consumers.stored_article_dedup_consumer_main"]
    expose: ["9100"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9100/healthz', timeout=4).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Ollama — LLM inference (embeddings + Qwen2.5 extraction) ─────────────────
  # Serves:
  #   - BGE-large-en-v1.5  (embedding model, Block 7)
  #   - qwen3:0.6b         (intent classification, S8 rag-chat; replaces qwen2.5:3b)
  #   - qwen2.5:7b-instruct (extraction model, Block 10)
  #
  # GPU notes:
  #   Ollama can use a GPU when the Docker host has NVIDIA drivers + nvidia-docker2.
  #   Uncomment the `deploy.resources` block below to enable GPU passthrough.
  #   Without GPU, qwen3:0.6b runs on CPU in <1s per classify call (very fast at 522 MB).
  #   BGE-large embeddings are fast enough on CPU (~0.1 s/section).
  #
  # Model pre-loading:
  #   The `ollama-init` service below pulls all required models automatically after
  #   Ollama is healthy. No manual `docker exec ollama ollama pull ...` needed.
  #   Models are cached in the ollama_data volume and persist across container restarts.
  ollama:
    image: ollama/ollama:0.6.7
    profiles: [infra, all]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    # ── Memory/CPU cap (D1 prevention — PLAN-0113 W1 caps, finally applied) ────
    # Ollama can balloon: idle RSS is tiny but loaded models (qwen3:0.6b +
    # bge-large ≈ 1.7G resident, qwen2.5:7b adds 4G for the DEEP tier) plus the
    # KV cache grow fast. Cap it so CPU inference cannot pin the host or push the
    # VM into the reclaim/OOM that killed MinIO (F-001).
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 6G
    # ── GPU passthrough (uncomment to enable NVIDIA GPU) ──────────────────────
    # Requires: nvidia-docker2, NVIDIA drivers ≥ 525, and
    #   DOCKER_DEFAULT_RUNTIME=nvidia in /etc/docker/daemon.json
    # Merge the device reservation INTO the deploy.resources block above.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── Ollama model init — pre-pulls required models after Ollama is healthy ─────
  # This init container runs once (restart: no) and pulls all models needed by the
  # platform so `docker compose up` gives a fully operational Ollama with no manual
  # intervention. Models are stored in the shared ollama_data volume and cached
  # across restarts — subsequent `docker compose up` calls skip download.
  #
  # Models pulled:
  #   - qwen3:0.6b      → S8 intent classification (522 MB, CPU-fast, Qwen3 gen)
  #   - bge-large       → S7/S8 text embeddings (1.2 GB, BERT-based)
  #
  # qwen2.5:7b-instruct (DEEP extraction, Block 10) is NOT pulled here because it
  # is only needed for the rare DEEP processing tier and its 4 GB size would slow
  # first-boot significantly. Pull it manually if DEEP tier is required:
  #   docker compose exec ollama ollama pull qwen2.5:7b-instruct
  ollama-init:
    image: ollama/ollama:0.6.7
    profiles: [infra, all]
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        ollama pull qwen3:0.6b &&
        ollama pull bge-large
      "
    environment:
      # Tell the Ollama CLI to talk to the ollama container (not localhost)
      OLLAMA_HOST: "http://ollama:11434"
    volumes:
      # Share the same model cache so pulls persist for the main ollama container
      - ollama_data:/root/.ollama

  # ── GLiNER server — NER inference (Block 4) ───────────────────────────────────
  # Runs GLiNER (DeBERTa-large) as a standalone HTTP service so NLP pipeline
  # replicas share a single warm model instance.
  #
  # GPU notes:
  #   GLiNER (DeBERTa-large, ~500MB) runs well on CPU (~0.5-3 s/batch of 20 sections).
  #   GPU is optional but reduces latency to ~50 ms/batch.
  #   Uncomment the `deploy.resources` block to enable GPU passthrough (same as above).
  gliner-server:
    build:
      context: ../gliner
      dockerfile: Dockerfile
    profiles: [infra, all]
    ports:
      - "8090:8080"
    environment:
      GLINER_MODEL_PATH: "urchade/gliner_large-v2.1"
      HF_HUB_ENABLE_HF_TRANSFER: "0"  # disable hf_transfer native lib
      HF_HUB_DISABLE_XET: "1"        # use standard HTTPS; xet throttles to ~63 KB/s on some hosts
      # Server-side micro-batching (dual-trigger). The article-consumer fleet
      # (3 replicas x 16 = ~48 concurrent single-text /ner calls) is coalesced
      # into one batch_predict_entities forward pass per (labels, threshold)
      # group. Throughput peaks at batch=16 (13.7x vs batch-1) and degrades
      # beyond, so MAX_BATCH caps there. WAIT_MS bounds the fill window.
      GLINER_MAX_BATCH: "16"
      GLINER_BATCH_WAIT_MS: "25"
      # CPU-bottleneck fix (2026-06-21 cpu-bottleneck investigation): PyTorch defaults
      # to one OpenMP thread per HOST core (14 here) but the container is capped at 4
      # CPUs (deploy.limits below) — 14 threads on a 4-core CFS quota thrash/throttle,
      # so inference drew only ~12% CPU and a single article took >300s. Pin the thread
      # pools to MATCH the CPU cap so the 4 cores are used efficiently (server.py also
      # calls torch.set_num_threads). Align all the BLAS/OpenMP knobs.
      OMP_NUM_THREADS: "4"
      MKL_NUM_THREADS: "4"
      OPENBLAS_NUM_THREADS: "4"
      NUMEXPR_NUM_THREADS: "4"
      TORCH_NUM_THREADS: "4"
    volumes:
      - gliner_model_cache:/home/appuser/.cache/huggingface  # persist model across restarts
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s  # allow 10 min for first-boot model download on slow connections
    # ── Memory/CPU cap (D1 prevention — PLAN-0113 W1 caps) ─────────────────────
    # GLiNER (DeBERTa-large) holds the model + micro-batch forward-pass tensors.
    # 2026-06-21: the 4G cap was the exit-137 OOM cause — live RSS sat at 3.99/4.0
    # GiB (99.8%) and any batch's activation tensors tipped it over → kernel kill
    # (38h outage). Raised to 8G so the ~2.6-4G model + batch tensors have real
    # headroom. cpus stays 4 and is now matched by the pinned thread count above.
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8G
    # ── GPU passthrough (uncomment to enable NVIDIA GPU) ──────────────────────
    # Merge the device reservation INTO the deploy.resources block above.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── NLP Pipeline (S6) — migrate + API + dispatcher + 2 consumers ────────────
  # S6 owns nlp_db DDL; intelligence_db DDL is owned by intelligence-migrations.
  nlp-pipeline-migrate:
    build:
      context: ../..
      dockerfile: services/nlp-pipeline/Dockerfile
    profiles: [infra, all]
    depends_on:
      # Workload split (2026-06-08): nlp_db now lives on postgres-intelligence.
      postgres-intelligence:
        condition: service_healthy
    env_file:
      - ../../services/nlp-pipeline/configs/docker.env
    command: ["alembic", "upgrade", "head"]
    restart: "on-failure:5"

  nlp-pipeline:
    build:
      context: ../..
      dockerfile: services/nlp-pipeline/Dockerfile
    profiles: [infra, all]
    depends_on:
      nlp-pipeline-migrate:
        condition: service_completed_successfully
      intelligence-migrations:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
      schema-registry-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
    ports:
      - "8006:8006"
    env_file:
      - ../../services/nlp-pipeline/configs/docker.env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8006/readyz')"]
      interval: 30s
      timeout: 5s
      start_period: 45s
      retries: 3
    restart: unless-stopped

  nlp-pipeline-dispatcher:
    build:
      context: ../..
      dockerfile: services/nlp-pipeline/Dockerfile
    profiles: [infra, all]
    depends_on:
      nlp-pipeline-migrate:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
      schema-registry-init:
        condition: service_completed_successfully
    env_file:
      - ../../services/nlp-pipeline/configs/docker.env
    command: ["python", "-m", "nlp_pipeline.infrastructure.messaging.outbox.dispatcher_main"]
    expose: ["9100"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9100/healthz', timeout=4).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  nlp-pipeline-article-consumer:
    build:
      context: ../..
      dockerfile: services/nlp-pipeline/Dockerfile
    profiles: [infra, all]
    depends_on:
      nlp-pipeline-migrate:
        condition: service_completed_successfully
      intelligence-migrations:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
      schema-registry-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
      ollama:
        condition: service_healthy
      gliner-server:
        condition: service_healthy
    env_file:
      - ../../services/nlp-pipeline/configs/docker.env
    command: ["python", "-m", "nlp_pipeline.infrastructure.messaging.consumers.article_consumer_main"]
    # 3 replicas: the article topic has 12 partitions but a single serial
    # consumer (~120 docs/h) cannot keep up with ingest (250-480 docs/h), so
    # lag grew unboundedly. Kafka rebalances the 12 partitions 4/4/4 across
    # the 3 members of the same consumer group. Replicas require no
    # container_name and no host port binding (both true here). Equivalent
    # CLI form: docker compose up -d --scale nlp-pipeline-article-consumer=3
    deploy:
      replicas: 3
    expose: ["9100"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9100/healthz', timeout=4).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  nlp-pipeline-watchlist-consumer:
    build:
      context: ../..
      dockerfile: services/nlp-pipeline/Dockerfile
    profiles: [infra, all]
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
    env_file:
      - ../../services/nlp-pipeline/configs/docker.env
    command: ["python", "-m", "nlp_pipeline.infrastructure.messaging.consumers.watchlist_consumer_main"]
    expose: ["9100"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9100/healthz', timeout=4).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  nlp-pipeline-document-deletion-consumer:
    build:
      context: ../..
      dockerfile: services/nlp-pipeline/Dockerfile
    profiles: [infra, all]
    depends_on:
      nlp-pipeline-migrate:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
    env_file:
      - ../../services/nlp-pipeline/configs/docker.env
    command: ["python", "-m", "nlp_pipeline.infrastructure.messaging.consumers.document_deletion_consumer_main"]
    expose: ["9100"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9100/healthz', timeout=4).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # REQ-003 / TASK-W0-06: consumes entity.refresh.v1 events from S7's
  # TriggerEntityRefreshUseCase and marks entity_embedding_state rows as
  # due (next_refresh_at = now()). Without this container running, the
  # manual /api/v1/entities/{entity_id}/refresh endpoint publishes to
  # Kafka but is never consumed → silent no-op.
  # NOTE: was accidentally dropped in the PLAN-0089 merge; restored here.
  nlp-pipeline-entity-refresh-consumer:
    build:
      context: ../..
      dockerfile: services/nlp-pipeline/Dockerfile
    profiles: [infra, all]
    depends_on:
      nlp-pipeline-migrate:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    env_file:
      - ../../services/nlp-pipeline/configs/docker.env
    command: ["python", "-m", "nlp_pipeline.infrastructure.messaging.consumers.entity_refresh_consumer_main"]
    expose: ["9100"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9100/healthz', timeout=4).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  nlp-pipeline-price-impact-worker:
    build:
      context: ../..
      dockerfile: services/nlp-pipeline/Dockerfile
    profiles: [infra, all]
    depends_on:
      nlp-pipeline-migrate:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    env_file:
      - ../../services/nlp-pipeline/configs/docker.env
    command: ["python", "-m", "nlp_pipeline.workers.price_impact_labelling_worker"]
    expose: ["9100"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9100/healthz', timeout=4).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  nlp-pipeline-relevance-scoring:
    build:
      context: ../..
      dockerfile: services/nlp-pipeline/Dockerfile
    profiles: [infra, all]
    depends_on:
      nlp-pipeline-migrate:
        condition: service_completed_successfully
      ollama:
        condition: service_healthy
    env_file:
      - ../../services/nlp-pipeline/configs/docker.env
    command: ["python", "-m", "nlp_pipeline.workers.article_relevance_scoring_worker"]
    expose: ["9100"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9100/healthz', timeout=4).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  nlp-pipeline-unresolved-resolution-worker:
    build:
      context: ../..
      dockerfile: services/nlp-pipeline/Dockerfile
    profiles: [infra, all]
    depends_on:
      nlp-pipeline-migrate:
        condition: service_completed_successfully
      intelligence-migrations:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    env_file:
      - ../../services/nlp-pipeline/configs/docker.env
    command: ["python", "-m", "nlp_pipeline.workers.unresolved_resolution_worker_main"]
    expose: ["9100"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 10s

  # PLAN-0057 Wave E-4 / F-MAJOR-05: drains the embedding_pending retry queue.
  # The worker class existed since 2026-02 but no entry point ever ran it, so
  # rows accumulated forever.  Standalone process per R22.
  #
  # Intentionally NO `ollama` dependency: deployments running with
  # NLP_PIPELINE_EMBEDDING_PROVIDER=deepinfra (the dev/prod default) never
  # touch Ollama, so coupling the retry queue to Ollama health would block
  # drain whenever Ollama flakes — for no benefit.  The Ollama-fallback path
  # gracefully degrades to "embedding_retry_failed" and re-tries with backoff.
  nlp-pipeline-embedding-retry-worker:
    build:
      context: ../..
      dockerfile: services/nlp-pipeline/Dockerfile
    profiles: [infra, all]
    depends_on:
      nlp-pipeline-migrate:
        condition: service_completed_successfully
    env_file:
      - ../../services/nlp-pipeline/configs/docker.env
    command: ["python", "-m", "nlp_pipeline.workers.embedding_retry_worker_main"]
    expose: ["9100"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9100/healthz', timeout=4).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Knowledge Graph (S7) — API + dispatcher + scheduler + 4 consumers ───────
  # S7 has no Alembic migrations — intelligence_db DDL is owned by intelligence-migrations.
  knowledge-graph:
    build:
      context: ../..
      dockerfile: services/knowledge-graph/Dockerfile
    profiles: [infra, all]
    depends_on:
      intelligence-migrations:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
      schema-registry-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
    ports:
      - "8007:8007"
    env_file:
      - ../../services/knowledge-graph/configs/docker.env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8007/readyz')"]
      interval: 30s
      timeout: 5s
      start_period: 45s
      retries: 3
    restart: unless-stopped

  knowledge-graph-dispatcher:
    build:
      context: ../..
      dockerfile: services/knowledge-graph/Dockerfile
    profiles: [infra, all]
    depends_on:
      intelligence-migrations:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
      schema-registry-init:
        condition: service_completed_successfully
    env_file:
      - ../../services/knowledge-graph/configs/docker.env
    command: ["python", "-m", "knowledge_graph.infrastructure.messaging.outbox.dispatcher_main"]
    expose: ["9100"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9100/healthz', timeout=4).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  knowledge-graph-scheduler:
    build:
      context: ../..
      dockerfile: services/knowledge-graph/Dockerfile
    profiles: [infra, all]
    depends_on:
      intelligence-migrations:
        condition: service_completed_successfully
      knowledge-graph:
        condition: service_started
    env_file:
      - ../../services/knowledge-graph/configs/docker.env
    command: ["python", "-m", "knowledge_graph.infrastructure.scheduler.scheduler_main"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9108/healthz', timeout=4).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  knowledge-graph-enriched-consumer:
    build:
      context: ../..
      dockerfile: services/knowledge-graph/Dockerfile
    profiles: [infra, all]
    depends_on:
      intelligence-migrations:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
      schema-registry-init:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
    env_file:
      - ../../services/knowledge-graph/configs/docker.env
    command: ["python", "-m", "knowledge_graph.infrastructure.messaging.consumers.enriched_consumer_main"]
    expose: ["9100"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9100/healthz', timeout=4).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # PLAN-0061 Wave E / PLAN-0062 Wave C — hot-path provisional-entity enrichment.
  # Reacts to entity.provisional.queued.v1 events emitted by S6
  # UnresolvedResolutionWorker so newly-discovered provisional entities are
  # enriched without waiting for the 5-min ProvisionalEnrichmentWorker sweep.
  # DEF-037: container was missing from docker-compose.yml (present in test compose).
  knowledge-graph-provisional-queued-consumer:
    build:
      context: ../..
      dockerfile: services/knowledge-graph/Dockerfile
    profiles: [infra, all]
    depends_on:
      intelligence-migrations:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
      schema-registry-init:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
    env_file:
      - ../../services/knowledge-graph/configs/docker.env
