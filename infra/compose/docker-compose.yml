  # ── Content Store (S5) — migrate + API + dispatcher + consumer ──────────────
  content-store-migrate:
    build:
      context: ../..
      dockerfile: services/content-store/Dockerfile
    profiles: [infra, all]
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
