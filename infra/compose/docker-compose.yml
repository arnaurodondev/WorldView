  # Dedicated OLAP instance volume (workload split 2026-06-08).
  postgres_intelligence_data:
  kafka_data:
  valkey_data:
  prometheus_data:
  grafana_data:
  tempo_data:
  loki_data:
  alloy_data:
  alertmanager_data:
  ollama_data:
  gliner_model_cache:
