    expose: ["9100"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9100/healthz', timeout=4).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Market ingestion worker ──────────────────────────────────────────────────
  market-ingestion-worker:
    build:
      context: ../..
      dockerfile: services/market-ingestion/Dockerfile
    profiles: [infra, all]
    depends_on:
      market-ingestion:
        condition: service_started
      minio:
        condition: service_healthy
    env_file:
      - ../../services/market-ingestion/configs/docker.env
    command: ["python", "-m", "market_ingestion.infrastructure.workers.worker_main"]
    expose: ["9100"]
