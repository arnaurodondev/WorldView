    command: ["python", "-m", "market_ingestion.infrastructure.messaging.outbox.dispatcher_main"]
    expose: ["9100"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9100/healthz', timeout=4).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  prometheus:
    image: prom/prometheus:v3.2.1
    profiles: [monitoring, infra, all]
    ports:
      - "9090:9090"
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  tempo:
    image: grafana/tempo:2.7.2
    profiles: [monitoring, infra, all]
    command: ["-config.file=/etc/tempo.yml"]
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ../tempo/tempo.yml:/etc/tempo.yml:ro
      - tempo_data:/var/tempo
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3200/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  loki:
    image: grafana/loki:3.5.0
    profiles: [monitoring, infra, all]
    command: ["-config.file=/etc/loki/local-config.yml"]
    ports:
      - "3100:3100"
    volumes:
      - ../loki/loki-config.yml:/etc/loki/local-config.yml:ro
      - loki_data:/loki
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  grafana:
    image: grafana/grafana:11.6.0
    profiles: [monitoring, infra, all]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      # WHY env var with fallback: allows overriding in production without
      # committing plaintext credentials. Change GRAFANA_ADMIN_PASSWORD
      # in your .env file before any internet-exposed deployment.
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      # WHY anonymous disabled: anonymous Admin access allows any network-reachable
      # user to see all metrics and dashboards without authenticating.
      # Use the admin account for local dev access.
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  alloy:
    image: grafana/alloy:v1.8.3
    profiles: [monitoring, infra, all]
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
      - --server.http.listen-addr=0.0.0.0:12345
      - --stability.level=generally-available
    ports:
      - "12345:12345"
      - "4317"
      - "4318"
    volumes:
      - ../alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy_data:/var/lib/alloy/data
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /proc/1/exe"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  alertmanager:
    image: prom/alertmanager:v0.27.0
    profiles: [monitoring, infra, all]
    ports:
      - "9093:9093"
    volumes:
      - ../alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Infrastructure exporters (monitoring profile) ───────────────────────────
  # WHY: Prometheus cannot scrape Postgres or Valkey natively — they don't expose
  # a /metrics endpoint.  These exporters act as translators: postgres_exporter
  # converts pg_stat_* views into Prometheus metrics (used by ValkeyDown alert and
  # DB connection pool dashboards); redis_exporter does the same for Valkey/Redis.
  # Both are in the monitoring profile so they only start when observability is
  # requested (same as Prometheus/Grafana).

  postgres_exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    profiles: [monitoring, infra, all]
    environment:
      # WHY env var expansion: credentials must not be hardcoded; docker.env sets
      # POSTGRES_USER/POSTGRES_PASSWORD at runtime.  Defaults match the dev values
      # in postgres init so `--profile monitoring` works out-of-the-box.
      # BP-452 fix: worldview_db does not exist; connect to the built-in postgres
      # superuser DB instead. Instance-wide stats (pg_stat_activity, pg_stat_database,
      # pg_stat_bgwriter, etc.) are always visible regardless of which DB is used.
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/postgres?sslmode=disable"
    ports:
      - "127.0.0.1:9187:9187"
    depends_on:
      postgres:
        condition: service_healthy

  redis_exporter:
    image: oliver006/redis_exporter:v1.62.0
    profiles: [monitoring, infra, all]
    environment:
      # WHY redis_exporter not valkey_exporter: oliver006/redis_exporter is fully
      # compatible with Valkey (fork of Redis 7.2) — the Redis protocol is identical.
      REDIS_ADDR: "redis://valkey:6379"
    ports:
      - "127.0.0.1:9121:9121"

  # ── Content Ingestion (S4) — 4 processes, same image ──────────────────────
  # Migrations (one-shot)
  content-ingestion-migrate:
    build:
      context: ../..
      dockerfile: services/content-ingestion/Dockerfile
    profiles: [infra, all]
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../../services/content-ingestion/configs/docker.env
    command: ["alembic", "upgrade", "head"]
    restart: "on-failure:5"

  # API server
  content-ingestion:
    build:
      context: ../..
      dockerfile: services/content-ingestion/Dockerfile
    profiles: [infra, all]
    command: ["uvicorn", "content_ingestion.app:create_app", "--factory", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8004:8000"
    env_file:
      - ../../services/content-ingestion/configs/docker.env
    depends_on:
      content-ingestion-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      valkey:
        condition: service_healthy
      # BP-164: InternalJWTMiddleware fetches JWKS from api-gateway at startup.
      # If api-gateway is not yet healthy the fetch fails permanently (no re-try
      # for 1 hour).  Waiting for service_healthy guarantees the JWKS endpoint
      # is live before this service attempts to contact it.
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # Scheduler process — evaluates sources and creates tasks
  content-ingestion-scheduler:
    build:
      context: ../..
      dockerfile: services/content-ingestion/Dockerfile
    profiles: [infra, all]
    command: ["python", "-m", "content_ingestion.infrastructure.scheduler.scheduler_main"]
    expose: ["9100"]
    env_file:
      - ../../services/content-ingestion/configs/docker.env
    depends_on:
      content-ingestion:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9100/healthz', timeout=4).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Worker process — claims and executes ingestion tasks
  content-ingestion-worker:
    build:
      context: ../..
      dockerfile: services/content-ingestion/Dockerfile
    profiles: [infra, all]
    command: ["python", "-m", "content_ingestion.infrastructure.workers.worker_main"]
    env_file:
      - ../../services/content-ingestion/configs/docker.env
    depends_on:
      content-ingestion:
        condition: service_started
      minio:
        condition: service_healthy
    restart: unless-stopped
    # PLAN-0028 worker-metrics phase 1: expose the /metrics + /healthz
    # endpoint so Prometheus (and any in-network healthcheck) can scrape
    # this background worker.  ``expose`` keeps the port unreachable from
    # the host while making it routable inside the compose network.
    expose:
      - "9100"
    # Scale: docker compose up --scale content-ingestion-worker=3
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9100/healthz', timeout=4).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Outbox dispatcher — publishes events from outbox to Kafka
  content-ingestion-dispatcher:
    build:
      context: ../..
      dockerfile: services/content-ingestion/Dockerfile
    profiles: [infra, all]
    command: ["python", "-m", "content_ingestion.infrastructure.messaging.outbox.dispatcher_main"]
    expose: ["9100"]
    env_file:
      - ../../services/content-ingestion/configs/docker.env
