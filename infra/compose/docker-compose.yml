    command: ["python", "-m", "rag_chat.infrastructure.scheduling.brief_scheduler_main"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9100/healthz', timeout=4).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── API Gateway (S9) — stateless reverse proxy + auth ─────────────────────────
  api-gateway:
    build:
      context: ../..
      dockerfile: services/api-gateway/Dockerfile
    profiles: [infra, all]
    depends_on:
      # Infrastructure must be healthy — api-gateway needs these directly
      valkey:
        condition: service_healthy
      # F-003B: All 9 backend services depend on api-gateway:service_healthy for
      # JWKS fetch at startup (InternalJWTMiddleware).  Adding them here with
      # service_started would create a circular dependency.  api-gateway is
      # stateless and returns 502/503 for any backend that isn't up yet.
    ports:
      - "8000:8000"
    env_file:
      - ../../services/api-gateway/configs/docker.env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/readyz')"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: unless-stopped

  # ── Worldview Web (Next.js 15 frontend) ────────────────────────────────────
  # Canonical production frontend. Talks exclusively to S9 API Gateway via
  # /api/* rewrites. See docs/apps/worldview-web.md for architecture.
  worldview-web:
    build:
      context: ../..
      dockerfile: apps/worldview-web/Dockerfile
    profiles: [infra, all]
    depends_on:
      api-gateway:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      API_GATEWAY_URL: http://api-gateway:8000
      NEXT_PUBLIC_ZITADEL_URL: ${ZITADEL_URL:-http://localhost:8088}
      NEXT_PUBLIC_ZITADEL_CLIENT_ID: ${ZITADEL_CLIENT_ID:-worldview-web}
    # WHY /api/version (not the bare root "/"): the root path is the heavy SSR
    # dashboard/landing route — it data-fetches on the server and can take
    # >5s to render under load, so the old `wget http://127.0.0.1:3001` probe
    # timed out and falsely marked the container "unhealthy" whenever the host
    # was busy. /api/version is a pure route handler that returns a tiny JSON
    # `{ buildId }` with no SSR, no backend calls, and no auth — it responds in
    # milliseconds whenever the Node process has CPU, so it tracks true liveness.
    # WHY start_period 60s: the Next.js standalone server can take ~50s to reach
    # "Ready" on a loaded host; a 20s grace window flapped to unhealthy during
    # normal startup. WHY timeout 10s + retries 5: absorb transient CPU
    # starvation without a false negative.
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3001/api/version"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 5
    restart: unless-stopped

  # ── Pushgateway — receives metrics pushed by synthetic monitor ─────────────────
  # WHY pushgateway: Prometheus scrapes metrics by polling a /metrics endpoint.
  # The synthetic monitor is a short-lived async loop that cannot expose its own
  # HTTP server while running probes. Pushgateway acts as an intermediary: the
  # monitor pushes after each probe cycle, and Prometheus scrapes the gateway.
  pushgateway:
    image: prom/pushgateway:v1.8.0
    profiles: [monitoring, infra, all]
    ports:
      - "127.0.0.1:9091:9091"

  # ── Synthetic monitor — simulates user journeys and pushes results ──────────
  # Runs three probes every 60s (configurable via PROBE_INTERVAL_S):
  #   1. probe_api_gateway_health  — GET /health must return 200
  #   2. probe_market_data_quote   — GET /api/v1/market-data/AAPL/quote must not 5xx
  #   3. probe_portfolio_holdings  — GET /api/v1/portfolio/holdings must not 5xx
  #      (skipped if SYNTHETIC_JWT is empty — auth-required endpoint)
  # Results land in Prometheus via Pushgateway; SyntheticProbeDown alert fires
  # when any probe_success == 0 for >5 minutes.
  synthetic-monitor:
    build:
      context: ../synthetic
      dockerfile: Dockerfile
    profiles: [monitoring, infra, all]
    environment:
      PUSHGATEWAY_URL: "http://pushgateway:9091"
      API_BASE_URL: "http://api-gateway:8000"
      SYNTHETIC_JWT: "${SYNTHETIC_MONITOR_JWT:-}"
    depends_on:
      - pushgateway
    restart: unless-stopped

