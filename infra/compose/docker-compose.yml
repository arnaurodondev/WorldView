      dockerfile: services/knowledge-graph/Dockerfile
    profiles: [infra, all]
    depends_on:
      intelligence-migrations:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
      schema-registry-init:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
    env_file:
      - ../../services/knowledge-graph/configs/docker.env
    command: ["python", "-m", "knowledge_graph.infrastructure.messaging.consumers.insider_transactions_dataset_consumer_main"]
    restart: on-failure
    healthcheck:
      test: ["CMD", "python", "-c", "import os; os.kill(1, 0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Alert (S10) — migrate + API + dispatcher + 2 consumers ──────────────────
  alert-migrate:
    build:
      context: ../..
      dockerfile: services/alert/Dockerfile
    profiles: [infra, all]
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../../services/alert/configs/docker.env
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  alert:
    build:
      context: ../..
      dockerfile: services/alert/Dockerfile
    profiles: [infra, all]
    depends_on:
      alert-migrate:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
      schema-registry-init:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
    ports:
      - "8010:8010"
    env_file:
      - ../../services/alert/configs/docker.env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/readyz')"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  alert-dispatcher:
    build:
      context: ../..
      dockerfile: services/alert/Dockerfile
    profiles: [infra, all]
    depends_on:
      alert-migrate:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
      schema-registry-init:
        condition: service_completed_successfully
    env_file:
      - ../../services/alert/configs/docker.env
    command: ["python", "-m", "alert.infrastructure.messaging.outbox.dispatcher_main"]
    restart: on-failure
    healthcheck:
      test: ["CMD", "python", "-c", "import os; os.kill(1, 0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  alert-intelligence-consumer:
    build:
      context: ../..
      dockerfile: services/alert/Dockerfile
    profiles: [infra, all]
    depends_on:
      alert-migrate:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
      schema-registry-init:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
    env_file:
      - ../../services/alert/configs/docker.env
    command: ["python", "-m", "alert.infrastructure.messaging.consumers.intelligence_consumer_main"]
    restart: on-failure
    healthcheck:
      test: ["CMD", "python", "-c", "import os; os.kill(1, 0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  alert-watchlist-consumer:
    build:
      context: ../..
      dockerfile: services/alert/Dockerfile
    profiles: [infra, all]
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
    env_file:
      - ../../services/alert/configs/docker.env
    command: ["python", "-m", "alert.infrastructure.messaging.consumers.watchlist_consumer_main"]
    restart: on-failure
    healthcheck:
      test: ["CMD", "python", "-c", "import os; os.kill(1, 0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  alert-email-scheduler:
    build:
      context: ../..
      dockerfile: services/alert/Dockerfile
    profiles: [infra, all]
    depends_on:
      alert-migrate:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
    env_file:
      - ../../services/alert/configs/docker.env
    command: ["python", "-m", "alert.infrastructure.email.scheduler_main"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import os; os.kill(1, 0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── S8 RAG/Chat Service ───────────────────────────────────────────────────────

  rag-chat-migrate:
    build:
      context: ../..
      dockerfile: services/rag-chat/Dockerfile
    profiles: [infra, all]
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../../services/rag-chat/configs/docker.env
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  rag-chat:
    build:
      context: ../..
      dockerfile: services/rag-chat/Dockerfile
    profiles: [infra, all]
    depends_on:
      rag-chat-migrate:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
      ollama:
        condition: service_started
      # BP-164: InternalJWTMiddleware fetches JWKS from api-gateway at startup.
      # Without this dependency rag-chat starts before api-gateway is healthy,
      # the 3 retries all fail, and the service returns 503 on all authenticated
      # requests for the next hour.  service_healthy breaks the race condition.
      api-gateway:
        condition: service_healthy
    ports:
      - "8008:8008"
    env_file:
      - ../../services/rag-chat/configs/docker.env
    command: ["python", "-m", "rag_chat"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8008/healthz')"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  # ── API Gateway (S9) — stateless reverse proxy + auth ─────────────────────────
  api-gateway:
    build:
      context: ../..
      dockerfile: services/api-gateway/Dockerfile
    profiles: [infra, all]
    depends_on:
      # Infrastructure must be healthy — api-gateway needs these directly
      valkey:
        condition: service_healthy
      # F-003B: All 9 backend services depend on api-gateway:service_healthy for
      # JWKS fetch at startup (InternalJWTMiddleware).  Adding them here with
      # service_started would create a circular dependency.  api-gateway is
      # stateless and returns 502/503 for any backend that isn't up yet.
    ports:
      - "8000:8000"
    env_file:
      - ../../services/api-gateway/configs/docker.env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/readyz')"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ── Worldview Web (Next.js 15 frontend) ────────────────────────────────────
  # Canonical production frontend. Talks exclusively to S9 API Gateway via
  # /api/* rewrites. See docs/apps/worldview-web.md for architecture.
  worldview-web:
    build:
      context: ../..
      dockerfile: apps/worldview-web/Dockerfile
    profiles: [infra, all]
    depends_on:
      api-gateway:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      API_GATEWAY_URL: http://api-gateway:8000
      NEXT_PUBLIC_ZITADEL_URL: ${ZITADEL_URL:-http://localhost:8088}
      NEXT_PUBLIC_ZITADEL_CLIENT_ID: ${ZITADEL_CLIENT_ID:-worldview-web}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3001"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  minio_data:
  postgres_data:
  kafka_data:
  valkey_data:
  prometheus_data:
  grafana_data:
  tempo_data:
  loki_data:
  alloy_data:
  alertmanager_data:
  ollama_data:
