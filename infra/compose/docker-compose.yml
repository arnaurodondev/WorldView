      timeout: 5s
      retries: 3
      start_period: 30s

  # ── S8 RAG/Chat Service ───────────────────────────────────────────────────────

  rag-chat-migrate:
    build:
      context: ../..
      dockerfile: services/rag-chat/Dockerfile
    profiles: [infra, all]
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../../services/rag-chat/configs/docker.env
    command: ["alembic", "upgrade", "head"]
    restart: "on-failure:5"

  rag-chat:
    build:
      context: ../..
      dockerfile: services/rag-chat/Dockerfile
    profiles: [infra, all]
    depends_on:
      rag-chat-migrate:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
      ollama:
        condition: service_started
      # BP-164: InternalJWTMiddleware fetches JWKS from api-gateway at startup.
      # Without this dependency rag-chat starts before api-gateway is healthy,
      # the 3 retries all fail, and the service returns 503 on all authenticated
      # requests for the next hour.  service_healthy breaks the race condition.
      api-gateway:
        condition: service_healthy
    ports:
      - "8008:8008"
    env_file:
      - ../../services/rag-chat/configs/docker.env
    command: ["python", "-m", "rag_chat"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8008/healthz')"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    restart: unless-stopped

  # PLAN-0094: pre-generates morning briefs on a 1h interval for all active
  # users. Exposes Prometheus metrics on port 9100 (rag_brief_pregeneration_*).
  # NOTE: was accidentally dropped in the PLAN-0089 merge; restored here.
  rag-chat-brief-scheduler:
    build:
      context: ../..
      dockerfile: services/rag-chat/Dockerfile
    profiles: [infra, all]
    depends_on:
      rag-chat-migrate:
        condition: service_completed_successfully
