---
# Worldview infrastructure — Docker Compose
# Profiles:
#   infra        — full infra (Postgres, Kafka, MinIO, Valkey) + all services
#   lib-test     — minimal infra for lib-level integration tests (MinIO only)
#   monitoring   — observability stack (Prometheus, Grafana, Loki, Tempo, Alloy, Alertmanager)
#   all          — starts every service in this compose file
#
# Notes:
#   - postgres is built from timescale/timescaledb (includes TimescaleDB + pgvector + AGE).
#     It also exposes the "timescaledb" alias so market-data can use its standard docker.env.
#   - intelligence-migrations owns all DDL for intelligence_db; S6/S7 set ALEMBIC_ENABLED=false.
#
# Usage:
#   Full infra:   docker compose -f infra/compose/docker-compose.yml --profile infra up -d
#   Monitoring:   docker compose -f infra/compose/docker-compose.yml --profile monitoring up -d
#   Infra + Mon:  docker compose -f infra/compose/docker-compose.yml --profile infra --profile monitoring up -d
#   Lib tests:    docker compose -f infra/compose/docker-compose.yml --profile lib-test up -d
#   All:          docker compose -f infra/compose/docker-compose.yml --profile all up -d
#   Teardown:     docker compose -f infra/compose/docker-compose.yml down -v
#
# Env loading rule (applies to all service containers):
#   Each service uses env_file: pointing at configs/docker.env.
#   Docker-internal hostnames (postgres:5432, kafka:29092, etc.) are set there.
#   NEVER duplicate env vars inline — docker.env is the single source of truth
#   for that deployment context.

name: worldview

services:
  # ── MinIO (S3-compatible object storage) ────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    command: server /data --console-address ":9001"
    profiles: [infra, lib-test, all]
    ports:
      # SEC-007: bind to localhost only — prevent external access to infra
      - "127.0.0.1:7480:9000"    # S3 API (matches STORAGE_ENDPOINT default)
      - "127.0.0.1:7481:9001"    # MinIO console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    # ── Memory governance (D1 prevention — 2026-06-21 OOM RCA) ────────────────
    # MinIO was the ONLY stateful infra service with no reservation/limit, so
    # under a VM-wide memory squeeze (rebuild waves) it was the deterministic
    # OOM victim (Exit 137, F-001). It backs the whole pipeline (OHLCV + silver
    # buckets), so guarantee it a baseline and cap its page-cache/buffer growth.
    #   reservation 1G  — observed idle RSS ~0.6G; floor that survives squeezes.
    #   limit 4G        — generous headroom for IO buffers during rebuild waves.
    deploy:
      resources:
        reservations:
          memory: 1G
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── MinIO bucket initialisation ─────────────────────────────────────────────
  minio-init:
    # WHY pinned: mc client version should match the MinIO server version to avoid API
    # compatibility drift. :latest is a floating tag that can change silently.
    image: minio/mc:RELEASE.2025-04-08T15-39-49Z
    profiles: [infra, lib-test, all]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command: /init-buckets.sh
    volumes:
      - ../minio/init/init-buckets.sh:/init-buckets.sh:ro
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  # Credentials: postgres:postgres — matches all services' docker.env files.
  # Init script creates one database per service (portfolio_db, ingestion_db, …).
  postgres:
    build:
      context: ../postgres
      dockerfile: Dockerfile
    profiles: [infra, all]
    # Docker defaults /dev/shm to 64MB; parallel VACUUM/maintenance on large
    # tables (e.g. fundamental_metrics ANALYZE in market-data migration 037)
    # allocates >64MB of shared memory and fails with DiskFullError on the shm
    # segment. 256MB gives comfortable headroom. (Applies on next postgres recreate.)
    shm_size: 256mb
    ports:
      # SEC-007: bind to localhost only — prevent external DB access
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../postgres/init:/docker-entrypoint-initdb.d:ro
    command: ["postgres", "-c", "max_connections=500", "-c", "shared_buffers=256MB"]
    # ── Memory/CPU governance (D1 prevention) ─────────────────────────────────
    # Primary datastore for every service — guarantee it baseline capacity so a
    # memory-heavy rebuild wave (or uncapped ML inference) cannot starve it.
    #   reservation 1G / 1 cpu — observed idle RSS ~0.6G; floors the datastore.
    deploy:
      resources:
        reservations:
          cpus: "1.0"
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    # timescaledb alias: market-data's docker.env uses "timescaledb" hostname;
    # this single postgres container (built from timescaledb image) serves both roles.
    networks:
      default:
        aliases:
          - timescaledb

  # ── PostgreSQL (intelligence / OLAP) ─────────────────────────────────────────
  # WORKLOAD SPLIT (2026-06-08): dedicated instance for the heavy KG/NLP analytical
  # workload (intelligence_db, nlp_db, kg_db). Splitting these off the main `postgres`
  # instance stops multi-hour AGE relation scans + multi-minute FTS from starving the
  # latency-sensitive OLTP queries (portfolio, market-data, gateway, alert).
  # See docs/audits/2026-06-08-postgres-workload-split.md.
  #
  # Same image as `postgres` (timescaledb-pg16 + pgvector + Apache AGE) — AGE +
  # pgvector are required for intelligence_db/nlp_db. Own volume + own init dir that
  # creates ONLY the OLAP databases.
  postgres-intelligence:
    build:
      context: ../postgres
      dockerfile: Dockerfile
    profiles: [infra, all]
    ports:
      # SEC-007: bind to localhost only — prevent external DB access.
      # 5433 on the host avoids clashing with the OLTP instance's 5432.
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_intelligence_data:/var/lib/postgresql/data
      - ../postgres/init-intelligence:/docker-entrypoint-initdb.d:ro
    # OLAP tuning: larger work_mem for AGE/FTS sorts; shared_buffers sized for the
    # 25% rule against this instance's allotted RAM. Adjust mem_limit/cpus per host.
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=2GB"
      - "-c"
      - "work_mem=128MB"
      - "-c"
      - "max_connections=120"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka (KRaft mode) ──────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    profiles: [infra, all]
    ports:
      # SEC-007: bind to localhost only
      - "127.0.0.1:9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      # BP-NNN: Single-node KRaft (broker+controller in one JVM) saturates the
      # QuorumController event queue during cold-restart with many partitions.
      # ~250+ partition-leader-election events flood the queue, the broker's
      # own heartbeat to the in-process controller times out (default 4500ms),
      # controller marks broker dead, triggers re-election → loop. Raising the
      # heartbeat/session/election budgets gives cold-start enough headroom.
      KAFKA_CONTROLLER_QUORUM_REQUEST_TIMEOUT_MS: 30000
      KAFKA_CONTROLLER_QUORUM_ELECTION_TIMEOUT_MS: 30000
      KAFKA_BROKER_HEARTBEAT_INTERVAL_MS: 5000
      KAFKA_BROKER_SESSION_TIMEOUT_MS: 30000
      # ── Connection-churn / GC-pause hardening (broker scope) ─────────────────
      # ROOT CAUSE (diagnosed 2026-06-20 from live broker logs): under a ~24k-event
      # backlog drain + 48 consumers (each holding producer+consumer+admin TCP
      # connections to this single broker), the broker JVM stalls. Evidence:
      #   * default heap is -Xms1G -Xmx1G (confirmed via `ps` in-container) — far
      #     too small for the drain working set → stop-the-world GC pauses freeze
      #     the network acceptor + the in-process controller event loop.
      #   * broker logs show its OWN in-process heartbeat to its in-process
      #     QuorumController timing out for 15s / 27s / 47s / 70s / 111s (one at
      #     23min): "processExpiredBrokerHeartbeat: controller event queue
      #     overloaded" + "Disconnecting from node 1 due to request timeout".
      #   * "Attempting to send response via channel for which there is no open
      #     connection" — clients already gave up (rdkafka 31s CONNECT timeout).
      # When the single JVM freezes it serves NEITHER the in-process controller
      # channel NOR external connection handshakes → producers + consumers all
      # time out in state CONNECT at the same instants. Same stall, two symptoms.
      #
      # Heap 1G→4G: kill the GC pauses (host has 48GB / 14 CPU; 4G is generous and
      # leaves ample room for 48 consumers + ML containers). This is the dominant
      # fix — a non-pausing JVM keeps the event loop + acceptor responsive.
      KAFKA_HEAP_OPTS: "-Xms4G -Xmx4G"
      # G1GC with a low pause target so the larger heap still collects in short,
      # predictable pauses instead of long full GCs that re-trigger the stall.
      KAFKA_JVM_PERFORMANCE_OPTS: "-XX:+UseG1GC -XX:MaxGCPauseMillis=20 -XX:InitiatingHeapOccupancyPercent=35"
      # Network/IO threads: defaults are 3/8. With ~48 consumers churning
      # connections against ONE broker, 3 acceptor/network threads is the
      # secondary bottleneck once GC is out of the way — raise to absorb the
      # connection + request fan-in. Host has 14 CPU, so 6/12 is well within budget.
      KAFKA_NUM_NETWORK_THREADS: 6
      KAFKA_NUM_IO_THREADS: 12
      KAFKA_BACKGROUND_THREADS: 12
      # Socket buffers + accept backlog: cushion bursty connection storms during
      # backlog drain so SYNs queue instead of being dropped (a dropped SYN is
      # exactly what surfaces client-side as a CONNECT timeout). Defaults are
      # 102400 send/recv and listen backlog 50.
      KAFKA_SOCKET_SEND_BUFFER_BYTES: 1048576
      KAFKA_SOCKET_RECEIVE_BUFFER_BYTES: 1048576
      KAFKA_SOCKET_REQUEST_MAX_BYTES: 209715200
      KAFKA_QUEUED_MAX_REQUESTS: 1000
      KAFKA_SOCKET_LISTEN_BACKLOG_SIZE: 256
      # Connection limits: dev single broker serving 48 consumers + producers +
      # admin + kafka-ui. Default max.connections is unbounded but per-listener
      # acceptor pressure benefits from an explicit, generous ceiling rather than
      # a per-IP throttle (all clients share the docker bridge / few source IPs,
      # so a tight per-IP cap would self-DoS). Keep per-IP high.
      KAFKA_MAX_CONNECTIONS: 2000
      KAFKA_MAX_CONNECTIONS_PER_IP: 2000
    volumes:
      - kafka_data:/var/lib/kafka/data
    # PRD-0113 FR-10 intent (broker scope): guarantee the event backbone CPU+mem
    # so ML inference (gliner/ollama) cannot starve it. ML-container CPU *caps*
    # are owned by PLAN-0113 W1 (the commented deploy blocks on gliner/ollama);
    # this reservation is the kafka half and is additive to that work.
    deploy:
      resources:
        reservations:
          cpus: "2.0"
          memory: 5G
        limits:
          memory: 6G
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      # Tuned for single-node KRaft cold-restart load (see KAFKA_CONTROLLER_* above).
      # Original 10s timeout × 5 retries × 30s start_period = ~75s tolerance
      # was insufficient when 250+ partitions need leader election on startup.
      timeout: 30s
      retries: 10
      start_period: 300s

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    profiles: [infra, all]
    ports:
      # SEC-007: bind to localhost only
      - "127.0.0.1:8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/subjects >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 15s

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    profiles: [infra, all]
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: /bin/bash
    command: /create-topics.sh
    volumes:
      - ../kafka/init/create-topics.sh:/create-topics.sh:ro
    restart: "no"

  # ── Schema Registry: register all Avro schemas (one-shot) ─────────────────
  schema-registry-init:
    image: python:3.12-slim
    profiles: [infra, all]
    depends_on:
      schema-registry:
        condition: service_healthy
    volumes:
      - ../kafka/schemas:/schemas:ro
      - ../kafka/init/register-schemas.py:/register-schemas.py:ro
    environment:
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      SCHEMA_DIR: /schemas
    entrypoint: ["python3", "/register-schemas.py"]
    restart: "no"

  # ── Schema Registry: pin per-subject compatibility level (one-shot) ───────
  # PLAN-0057 follow-up Wave A (D-004). Runs AFTER schema-registry-init so
  # every subject already exists. Idempotent re-runs are safe; we PUT
  # ``{"compatibility":"BACKWARD"}`` per subject regardless of current state.
  schema-compat-init:
    image: alpine:3.20
    profiles: [infra, all]
    depends_on:
      schema-registry-init:
        condition: service_completed_successfully
    volumes:
      - ../kafka/init/set-schema-compatibility.sh:/set-schema-compatibility.sh:ro
    environment:
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      COMPAT_LEVEL: BACKWARD
    # ``apk add`` curl is required because the alpine base image does not ship
    # with curl by default. Cheap (~3 MB, ~1 s) and avoids a custom image.
    entrypoint: ["/bin/sh", "-c", "apk add --no-cache curl >/dev/null && /bin/sh /set-schema-compatibility.sh"]
    restart: "no"

  # ── Valkey (Redis-compatible cache) ─────────────────────────────────────────
  valkey:
    image: valkey/valkey:7.2-alpine
    profiles: [infra, all]
    ports:
      # SEC-007: bind to localhost only
      - "127.0.0.1:6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Intelligence DB migrations (one-shot) ────────────────────────────────────
  # Owns ALL DDL for intelligence_db. S6/S7 must set ALEMBIC_ENABLED=false.
  intelligence-migrations:
    build:
      context: ../../services/intelligence-migrations
      dockerfile: Dockerfile
    profiles: [infra, all]
    depends_on:
      # Workload split (2026-06-08): intelligence_db now lives on postgres-intelligence.
      postgres-intelligence:
        condition: service_healthy
    environment:
      INTELLIGENCE_DB_URL: "postgresql://postgres:postgres@postgres-intelligence:5432/intelligence_db"
      EMBEDDING_BASE_URL: "http://ollama:11434"
      EMBEDDING_MODEL: "bge-large:latest"
    restart: "no"

  # ── Portfolio migrations (one-shot) ──────────────────────────────────────────
  portfolio-migrate:
    build:
      context: ../..
      dockerfile: services/portfolio/Dockerfile
    profiles: [infra, all]
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../../services/portfolio/configs/docker.env
    command: ["alembic", "upgrade", "head"]
    restart: "on-failure:5"

  # ── Portfolio service ────────────────────────────────────────────────────────
  portfolio:
    build:
      context: ../..
      dockerfile: services/portfolio/Dockerfile
    profiles: [infra, all]
    depends_on:
      portfolio-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      api-gateway:
        condition: service_healthy
    ports:
      - "8001:8000"
    env_file:
      - ../../services/portfolio/configs/docker.env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/readyz')"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: unless-stopped

  # ── Portfolio outbox dispatcher ──────────────────────────────────────────────
  portfolio-dispatcher:
    build:
      context: ../..
      dockerfile: services/portfolio/Dockerfile
    profiles: [infra, all]
    depends_on:
      portfolio:
        condition: service_started
      kafka:
        condition: service_healthy
      schema-registry-init:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    env_file:
      - ../../services/portfolio/configs/docker.env
    command: ["python", "-m", "portfolio.infrastructure.messaging.outbox.dispatcher_main"]
    expose: ["9100"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9100/healthz', timeout=4).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  portfolio-instrument-consumer:
    build:
      context: ../..
      dockerfile: services/portfolio/Dockerfile
    profiles: [infra, all]
    depends_on:
      portfolio:
        condition: service_started
      kafka:
        condition: service_healthy
      schema-registry-init:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    env_file:
      - ../../services/portfolio/configs/docker.env
    command: ["python", "-m", "portfolio.infrastructure.messaging.consumers.instrument_consumer_main"]
    expose: ["9100"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9100/healthz', timeout=4).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Portfolio manual holdings recompute consumer ────────────────────────────
  # PLAN-0114 W1 / T-W1-07.
  # Consumes portfolio.holding.recompute_requested.v1 and calls
  # ComputeManualHoldingsUseCase (FIFO/AVCO replay).
  portfolio-manual-holdings-consumer:
    build:
      context: ../..
      dockerfile: services/portfolio/Dockerfile
    profiles: [infra, all]
    depends_on:
      portfolio:
        condition: service_started
      kafka:
        condition: service_healthy
      schema-registry-init:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    env_file:
      - ../../services/portfolio/configs/docker.env
    command: ["python", "-m", "portfolio.infrastructure.messaging.consumers.manual_holdings_consumer_main"]
    expose: ["9100"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9100/healthz', timeout=4).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Portfolio manual holdings nightly worker ─────────────────────────────────
  # PLAN-0114 W1 / T-W1-08.
  # Fallback sweep: recomputes MANUAL portfolio holdings at 22:00 UTC daily.
  portfolio-manual-holdings-worker:
    build:
      context: ../..
      dockerfile: services/portfolio/Dockerfile
    profiles: [infra, all]
    depends_on:
      portfolio-migrate:
        condition: service_completed_successfully
    env_file:
      - ../../services/portfolio/configs/docker.env
    command: ["python", "-m", "portfolio.workers.manual_holdings_worker"]
    restart: unless-stopped

  # ── Portfolio daily value snapshot worker ───────────────────────────────────
  # PLAN-0046 Wave 4 / T-46-4-02 + T-46-4-03.
  # Same Dockerfile as the API + other workers — only the ``command`` differs.
  # Wakes up at 21:30 UTC daily, snapshots non-root portfolios, then aggregates
  # into root portfolios. Idempotent on (portfolio_id, snapshot_date).
  portfolio-snapshot-worker:
    build:
      context: ../..
      dockerfile: services/portfolio/Dockerfile
    profiles: [infra, all]
    depends_on:
      portfolio-migrate:
        condition: service_completed_successfully
    env_file:
      - ../../services/portfolio/configs/docker.env
    environment:
      - PORTFOLIO_MARKET_DATA_SERVICE_URL=${PORTFOLIO_MARKET_DATA_SERVICE_URL:-http://market-data:8003}
    command: ["python", "-m", "portfolio.workers.portfolio_snapshot_worker"]
    expose: ["9100"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9100/healthz', timeout=4).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Portfolio brokerage sync worker ─────────────────────────────────────────
  portfolio-brokerage-sync:
    build:
      context: ../..
      dockerfile: services/portfolio/Dockerfile
    profiles: [infra, all]
    depends_on:
      portfolio-migrate:
        condition: service_completed_successfully
    env_file:
      - ../../services/portfolio/configs/docker.env
    environment:
      - SNAPTRADE_CLIENT_ID=${SNAPTRADE_CLIENT_ID:-}
      - SNAPTRADE_CONSUMER_KEY=${SNAPTRADE_CONSUMER_KEY:-}
      - SNAPTRADE_REDIRECT_URI=${SNAPTRADE_REDIRECT_URI:-http://localhost:3001/portfolio/brokerage/callback}
      - SNAPTRADE_SECRET_ENCRYPTION_KEY=${SNAPTRADE_SECRET_ENCRYPTION_KEY:-}
      - PORTFOLIO_MARKET_DATA_SERVICE_URL=${PORTFOLIO_MARKET_DATA_SERVICE_URL:-http://market-data:8003}
    command: ["python", "-m", "portfolio.workers.brokerage_sync_worker"]
    expose: ["9100"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9100/healthz', timeout=4).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Market ingestion migrations (one-shot) ──────────────────────────────────
  market-ingestion-migrate:
    build:
      context: ../..
      dockerfile: services/market-ingestion/Dockerfile
    profiles: [infra, all]
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../../services/market-ingestion/configs/docker.env
    command: ["alembic", "-c", "alembic.ini", "upgrade", "head"]
    restart: "on-failure:5"

