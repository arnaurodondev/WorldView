      context: ../..
      dockerfile: services/content-store/Dockerfile
    profiles: [infra, all]
    depends_on:
      content-store-migrate:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
      schema-registry-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
