---
# Worldview infrastructure — Docker Compose
# Profiles:
#   infra        — full infra (Postgres, Kafka, MinIO, Valkey)
#   lib-test     — minimal infra for lib-level integration tests (MinIO only)
#
# Usage:
#   Full infra:   docker compose -f infra/compose/docker-compose.yml --profile infra up -d
#   Lib tests:    docker compose -f infra/compose/docker-compose.yml --profile lib-test up -d
#   Teardown:     docker compose -f infra/compose/docker-compose.yml down -v

name: worldview

services:
  # ── MinIO (S3-compatible object storage) ────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    command: server /data --console-address ":9001"
    profiles: [infra, lib-test]
    ports:
      - "7480:9000"    # S3 API (matches STORAGE_ENDPOINT default)
      - "7481:9001"    # MinIO console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── MinIO bucket initialisation ─────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    profiles: [infra, lib-test]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command: /init-buckets.sh
    volumes:
      - ../minio/init/init-buckets.sh:/init-buckets.sh:ro
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    profiles: [infra]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: worldview
      POSTGRES_PASSWORD: worldview
      POSTGRES_DB: worldview
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worldview"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka + Zookeeper ────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    profiles: [infra]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    profiles: [infra]
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    profiles: [infra]
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: /bin/bash
    command: /create-topics.sh
    volumes:
      - ../kafka/init/create-topics.sh:/create-topics.sh:ro

  # ── Valkey (Redis-compatible cache) ─────────────────────────────────────────
  valkey:
    image: valkey/valkey:7.2-alpine
    profiles: [infra]
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Portfolio service ────────────────────────────────────────────────────────
  portfolio:
    build:
      context: ../..
      dockerfile: services/portfolio/Dockerfile
    profiles: [infra]
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://worldview:worldview@postgres:5432/worldview
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      VALKEY_URL: redis://valkey:6379
      SERVICE_NAME: portfolio
      LOG_LEVEL: info
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/readyz')"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ── Portfolio outbox dispatcher ──────────────────────────────────────────────
  portfolio-dispatcher:
    build:
      context: ../..
      dockerfile: services/portfolio/Dockerfile
    profiles: [infra]
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      portfolio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://worldview:worldview@postgres:5432/worldview
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      SERVICE_NAME: portfolio-dispatcher
      LOG_LEVEL: info
    command: ["python", "-m", "portfolio.messaging.dispatcher_main"]
    restart: on-failure

  # ── Portfolio migrations (one-shot) ──────────────────────────────────────────
  portfolio-migrate:
    build:
      context: ../..
      dockerfile: services/portfolio/Dockerfile
    profiles: [infra]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://worldview:worldview@postgres:5432/worldview
    command: ["alembic", "upgrade", "head"]
    restart: "no"

volumes:
  minio_data:
  postgres_data:
  kafka_data:
  zookeeper_data:
  valkey_data:
