global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "portfolio"
    static_configs:
      # Use container-internal port (right side of host:container mapping).
      # docker-compose maps 8001:8000 on the host — within the Docker network
      # the service listens on :8000, not :8001. (BP-175)
      - targets: ["portfolio:8000"]
    metrics_path: /metrics

  - job_name: "market-ingestion"
    static_configs:
      - targets: ["market-ingestion:8002"]
    metrics_path: /metrics

  - job_name: "market-data"
    static_configs:
      - targets: ["market-data:8003"]
    metrics_path: /metrics

  - job_name: "content-ingestion"
    static_configs:
      # Container listens on :8000; host maps 8004:8000. Use :8000. (BP-175)
      - targets: ["content-ingestion:8000"]
    metrics_path: /metrics

  - job_name: "content-store"
    static_configs:
      - targets: ["content-store:8005"]
    metrics_path: /metrics

  # PLAN-0028 worker-metrics rollout phase 1 — pilot worker scrape.
  # The content-ingestion-worker exposes the shared start_metrics_server
  # ASGI app on :9100 (no host port, only compose-network reachable).
  - job_name: "content-ingestion-worker"
    static_configs:
      - targets: ["content-ingestion-worker:9100"]
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: "api-gateway"
    static_configs:
      - targets: ["api-gateway:8000"]
    metrics_path: /metrics

  - job_name: "nlp-pipeline"
    static_configs:
      - targets: ["nlp-pipeline:8006"]
    metrics_path: /metrics

  - job_name: "knowledge-graph"
    static_configs:
      - targets: ["knowledge-graph:8007"]
    metrics_path: /metrics

  # FIX-LIVE-C / F-LIVE-006-B: scheduler is a separate process (R22) without
  # a FastAPI app — it exposes its prometheus_client gauges on :9108 via
  # ``start_http_server`` so backlog metrics (path_insight_explanation_pending_total,
  # relation_summary_backlog, summary_worker_stuck_relations_total) are scraped.
  - job_name: "knowledge-graph-scheduler"
    static_configs:
      - targets: ["knowledge-graph-scheduler:9108"]
    metrics_path: /metrics

  - job_name: "rag-chat"
    static_configs:
      - targets: ["rag-chat:8008"]
    metrics_path: /metrics

  - job_name: "alert"
    static_configs:
      - targets: ["alert:8010"]
    metrics_path: /metrics

  # ── Outbox dispatchers (Phase 2 worker-metrics) ────────────────────────
  # Each dispatcher runs as an independent process (R22) without a FastAPI
  # app and exposes prometheus_client counters on :9100 via the shared
  # ``start_metrics_server`` helper from libs/observability.
  - job_name: "portfolio-dispatcher"
    static_configs:
      - targets: ["portfolio-dispatcher:9100"]
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: "content-ingestion-dispatcher"
    static_configs:
      - targets: ["content-ingestion-dispatcher:9100"]
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: "content-store-dispatcher"
    static_configs:
      - targets: ["content-store-dispatcher:9100"]
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: "nlp-pipeline-dispatcher"
    static_configs:
      - targets: ["nlp-pipeline-dispatcher:9100"]
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: "market-ingestion-dispatcher"
    static_configs:
      - targets: ["market-ingestion-dispatcher:9100"]
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: "knowledge-graph-dispatcher"
    static_configs:
      - targets: ["knowledge-graph-dispatcher:9100"]
    metrics_path: /metrics
    scrape_interval: 15s

  # ── Observability stack self-monitoring ────────────────────────────────
  # Without these, Loki/Tempo/AlertManager outages are undetectable — no
  # ServiceDown alert would fire. (F-014, audit finding)
  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]
    metrics_path: /metrics

  - job_name: "tempo"
    static_configs:
      - targets: ["tempo:3200"]
    metrics_path: /metrics

  - job_name: "alertmanager"
    static_configs:
      - targets: ["alertmanager:9093"]
    metrics_path: /metrics

  # ── Infrastructure exporters ────────────────────────────────────────────────
  # WHY separate jobs: postgres_exporter and redis_exporter scrape infrastructure
  # rather than application services; separate job names make it easy to write
  # Prometheus rules that target only infra (e.g., ValkeyDown alert uses redis_up).
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres_exporter:9187"]
    metrics_path: /metrics

  - job_name: "valkey"
    static_configs:
      - targets: ["redis_exporter:9121"]
    metrics_path: /metrics

  # ── Phase 3 worker /metrics endpoints (port 9100) ─────────────────────────
  # These are non-HTTP background workers/consumers that now expose Prometheus
  # /metrics via the `start_metrics_server` helper from libs/observability.
  - job_name: "alert-intelligence-consumer"
    static_configs:
      - targets: ["alert-intelligence-consumer:9100"]
    metrics_path: /metrics

  - job_name: "market-ingestion-worker"
    static_configs:
      - targets: ["market-ingestion-worker:9100"]
    metrics_path: /metrics

  - job_name: "portfolio-brokerage-sync"
    static_configs:
      - targets: ["portfolio-brokerage-sync:9100"]
    metrics_path: /metrics

  - job_name: "knowledge-graph-path-insight-worker"
    static_configs:
      - targets: ["knowledge-graph-path-insight-worker:9100"]
    metrics_path: /metrics

  - job_name: "knowledge-graph-provisional-queued-consumer"
    static_configs:
      - targets: ["knowledge-graph-provisional-queued-consumer:9100"]
    metrics_path: /metrics

  # ── Pushgateway — synthetic monitor probe results ─────────────────────────
  # honor_labels: true preserves the probe_name label set by synthetic_monitor.py
  # so SyntheticProbeDown alert can reference {{ $labels.probe_name }} correctly.
  - job_name: "pushgateway"
    honor_labels: true
    static_configs:
      - targets: ["pushgateway:9091"]
    metrics_path: /metrics
