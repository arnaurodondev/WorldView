global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "portfolio"
    static_configs:
      - targets: ["portfolio:8001"]
    metrics_path: /metrics

  - job_name: "market-ingestion"
    static_configs:
      - targets: ["market-ingestion:8002"]
    metrics_path: /metrics

  - job_name: "market-data"
    static_configs:
      - targets: ["market-data:8003"]
    metrics_path: /metrics

  - job_name: "content-ingestion"
    static_configs:
      - targets: ["content-ingestion:8004"]
    metrics_path: /metrics

  - job_name: "content-store"
    static_configs:
      - targets: ["content-store:8005"]
    metrics_path: /metrics

  - job_name: "api-gateway"
    static_configs:
      - targets: ["api-gateway:8000"]
    metrics_path: /metrics

  - job_name: "nlp-pipeline"
    static_configs:
      - targets: ["nlp-pipeline:8006"]
    metrics_path: /metrics

  - job_name: "knowledge-graph"
    static_configs:
      - targets: ["knowledge-graph:8007"]
    metrics_path: /metrics

  - job_name: "rag-chat"
    static_configs:
      - targets: ["rag-chat:8008"]
    metrics_path: /metrics

  - job_name: "alert"
    static_configs:
      - targets: ["alert:8010"]
    metrics_path: /metrics
