groups:
  - name: worldview_alerts
    rules:
      # ── Service availability ───────────────────────────────────────────────
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.job }} is down"
          description: >
            Prometheus target {{ $labels.instance }} (job: {{ $labels.job }})
            has been unreachable for >1 minute.
          runbook_url: "https://github.com/worldview/runbooks/blob/main/ServiceDown.md"

      # ── HTTP error rates ───────────────────────────────────────────────────
      # Threshold lowered from 5% → 1%. A financial platform should not
      # tolerate more than 1% 5xx before alerting. (audit finding)
      - alert: HighErrorRate
        expr: job:http_error_ratio:rate5m > 0.01
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.job }} error rate >1%"
          description: >
            {{ $labels.job }} has a 5xx error ratio of
            {{ $value | humanizePercentage }} (threshold: 1%) for >5 minutes.
          runbook_url: "https://github.com/worldview/runbooks/blob/main/HighErrorRate.md"

      # Threshold lowered from 20% → 10%. Service is effectively broken at 10%.
      # HighErrorRate (warning) is suppressed when this fires — see alertmanager inhibit_rules.
      - alert: CriticalErrorRate
        expr: job:http_error_ratio:rate5m > 0.10
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.job }} error rate >10%"
          description: >
            {{ $labels.job }} has a 5xx error ratio of
            {{ $value | humanizePercentage }} (threshold: 10%) for >2 minutes.
          runbook_url: "https://github.com/worldview/runbooks/blob/main/CriticalErrorRate.md"

      # ── Latency ───────────────────────────────────────────────────────────
      # Threshold lowered from 2s → 500ms. Financial data APIs must respond
      # in sub-second time; 2s is grotesquely permissive. (audit finding)
      - alert: HighP95Latency
        expr: job:http_duration_p95:rate5m > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.job }} p95 latency >500ms"
          description: >
            {{ $labels.job }} p95 request latency is
            {{ $value | humanizeDuration }} (threshold: 500ms) for >5 minutes.
          runbook_url: "https://github.com/worldview/runbooks/blob/main/HighLatency.md"

      # ── Outbox backlog ─────────────────────────────────────────────────────
      # Expanded scope from s[45] to all services (s[1-9]).
      # S1–S3 and S6–S9 all use the shared outbox pattern. (audit finding)
      - alert: OutboxBacklog
        expr: '{__name__=~"s[1-9]_outbox_pending_total"} > 100'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Outbox backlog >100 events in {{ $labels.job }}"
          description: >
            {{ $labels.job }} has {{ $value }} pending outbox events
            (threshold: 100) for >5 minutes. Check dispatcher process.
          runbook_url: "https://github.com/worldview/runbooks/blob/main/OutboxBacklog.md"

      # ── Dead letter queue ──────────────────────────────────────────────────
      # Expanded scope from s[45] to all services. (audit finding)
      - alert: DeadLetterQueueNonEmpty
        expr: '{__name__=~"s[1-9]_dlq_total"} > 0'
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "DLQ has entries in {{ $labels.job }}"
          description: >
            {{ $labels.job }} dead-letter queue has {{ $value }} entries
            for >2 minutes. Investigate failed event processing.
          runbook_url: "https://github.com/worldview/runbooks/blob/main/DLQNonEmpty.md"

      # ── Outbox dispatch errors ─────────────────────────────────────────────
      - alert: OutboxDispatchErrors
        expr: job:outbox_errors:rate5m > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.job }} outbox dispatch errors"
          description: >
            {{ $labels.job }} outbox dispatch error rate is {{ $value }}/sec
            (threshold: 0.1/sec) for >5 minutes.
          runbook_url: "https://github.com/worldview/runbooks/blob/main/OutboxDispatchErrors.md"

      # ── S5 Content Store — dedup latency ──────────────────────────────────
      # Correct histogram_quantile: sum by (tier, le) before quantile.
      - alert: HighDedupLatency
        expr: >
          histogram_quantile(0.95,
            sum by (tier, le) (rate(s5_dedup_duration_seconds_bucket[5m]))
          ) > 2.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "S5 dedup p95 latency >2s (tier: {{ $labels.tier }})"
          description: >
            Content Store dedup p95 latency for tier {{ $labels.tier }} is
            {{ $value | humanizeDuration }} (threshold: 2s) for >5 minutes.
          runbook_url: "https://github.com/worldview/runbooks/blob/main/HighDedupLatency.md"

      # ── S5 Content Store — LSH index failures ─────────────────────────────
      # Lower `for` from 5m to 1m: LSH failures happen in bursts and resolve
      # quickly; 5m `for` masks the burst entirely. (audit finding)
      - alert: LSHIndexFailures
        expr: rate(s5_lsh_index_failures_total[5m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "S5 LSH index failures occurring"
          description: >
            Content Store LSH Valkey index is experiencing failures at
            {{ $value }}/sec for >1 minute.
          runbook_url: "https://github.com/worldview/runbooks/blob/main/LSHFailures.md"

      # ── S4 Content Ingestion — fetch errors ───────────────────────────────
      # Reduced `for` from 10m to 5m. Ten-minute delay is too long for a
      # financial content pipeline. (audit finding)
      - alert: ContentFetchErrors
        expr: sum(rate(s4_fetches_total{status="failed"}[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "S4 content fetch failures sustained"
          description: >
            Content Ingestion fetch failure rate is {{ $value }}/sec
            (threshold: 0.5/sec) sustained for >5 minutes.
          runbook_url: "https://github.com/worldview/runbooks/blob/main/ContentFetchErrors.md"
