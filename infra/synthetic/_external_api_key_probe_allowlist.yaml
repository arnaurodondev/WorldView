# External API key freshness-probe allowlist
# ─────────────────────────────────────────────────────────────────────────────
# Companion to tests/architecture/_consumer_dedup_allowlist.yaml's pattern
# (same schema philosophy: force an explicit, reviewable, dated decision
# instead of a silent gap).
#
# infra/synthetic/tests/test_probe_registry_completeness.py scans every
# service's (+ libs/ml-clients') config.py for str/SecretStr-typed fields
# whose name looks like a shared/rotatable external API credential (has
# "key"/"secret" as an underscore-delimited token, or ends in "_client_id" —
# matches SnapTrade's client-id/consumer-key pair). Both str AND SecretStr are
# scanned — several real external keys in this repo (resend_api_key,
# sendgrid_api_key, content-ingestion's eodhd_api_key, router_embedding_api_key)
# are typed plain str, not SecretStr. For each field found, the test requires
# EITHER:
#   (a) a corresponding `probe_<name>_key` function registered in
#       synthetic_monitor.PROBES (derived by stripping the field's
#       "_api_key"/"_secret_key"/"_access_key"/"_consumer_key"/"_client_id"/
#       "_client_secret"/"_key"/"_secret" suffix), OR
#   (b) an entry here, justifying why no freshness probe exists today.
#
# This is what closes the "reactive-only" gap that produced probe_deepinfra_key
# and probe_eodhd_key: those two were added AFTER separate production
# incidents (DeepInfra key rotation with no alert; potential EODHD key
# rotation). A brand-new SecretStr key-shaped config field that is neither
# probed nor listed here FAILS the test loudly — forcing the same "add a
# probe" vs. "document why not" decision made explicit and reviewable, instead
# of silently doing neither until the next incident.
#
# Schema: each entry must have:
#   service:       str   — service directory name (e.g. "market-ingestion")
#   field:         str   — exact Settings attribute name
#   file:          str   — config.py path, relative to repo root (greppability)
#   justification: str   — why no probe_<name>_key exists today
#   granted_at:    str   — ISO-8601 date this exemption was recorded
#
# Exemption categories used below:
#
#   Internal-signing-key   — a self-generated credential (JWT RSA key, HMAC
#                             secret) used for THIS platform's own
#                             service-to-service auth. There is no external
#                             provider endpoint to probe; it can't be
#                             "rotated out from under us" by a third party.
#
#   Internal-infra-cred    — a credential for infrastructure we operate
#                             ourselves (MinIO/S3 access/secret key pair) via
#                             our own IaC, not a third-party SaaS account key.
#                             Freshness is covered by our own infra health
#                             checks, not a key-rotation-style probe.
#
#   Duplicate-shared-key   — the SAME physical DeepInfra account key
#                             duplicated across a per-service/per-feature env
#                             var (this repo runs ~8 such duplicated vars —
#                             see infra/gitops/docs/deepinfra-key-rotation.md).
#                             probe_deepinfra_key already probes that live
#                             value; a second identical probe would be
#                             redundant, not additional coverage.
#
#   Not-a-credential        — the field matches the "*_key"/"*_secret" naming
#                             heuristic (name.contains "key"/"secret" as an
#                             underscore-delimited token) but is NOT actually
#                             a secret value: a version/identifier string
#                             (e.g. jwt_key_version = "v1") or a Valkey/Redis
#                             cache-key NAME used as a key-prefix constant
#                             (e.g. valkey_watchlist_key), not a credential at
#                             all. No freshness probe applies because there is
#                             no "freshness" for a version tag or a cache-key
#                             string to check.
#
#   Optional-fallback-cred — a third-party integration that is OPTIONAL and
#                             disabled-by-default (empty string = feature off)
#                             in the live deployment today. Not yet on any
#                             critical path an incident has hit. Flagged here
#                             as a real, reviewable follow-up candidate rather
#                             than silently doing nothing — see the `followup`
#                             note on each such entry.

allowlist:

  # ── alert ─────────────────────────────────────────────────────────────────
  - service: alert
    field: resend_api_key
    file: services/alert/src/alert/config.py
    justification: >
      Resend transactional email provider — the default configured
      email_provider ("resend"), but the key VALUE itself is empty by default
      (must be set via env for the feature to actually send mail). No
      freshness probe exists today. Category: Optional-fallback-cred.
      followup: add probe_resend_key (Resend exposes a lightweight API-key
      validation endpoint) — genuine candidate given it's the default
      provider, not bundled into this test-gap-closing change.
    granted_at: "2026-07-24"

  - service: alert
    field: sendgrid_api_key
    file: services/alert/src/alert/config.py
    justification: >
      SendGrid — the alternate email_provider option (config.py: "resend |
      sendgrid | smtp"), not the default. Category: Optional-fallback-cred.
    granted_at: "2026-07-24"

  # ── api-gateway ───────────────────────────────────────────────────────────
  - service: api-gateway
    field: oidc_client_id
    file: services/api-gateway/src/api_gateway/config.py
    justification: >
      Zitadel-issued OIDC client id (public, non-secret identifier — plain
      str, paired with oidc_client_secret below). Same login-flow-covered
      reasoning as oidc_client_secret. Category: Internal-infra-cred.
    granted_at: "2026-07-24"

  - service: api-gateway
    field: oidc_client_secret
    file: services/api-gateway/src/api_gateway/config.py
    justification: >
      Zitadel-issued OIDC client secret used only for the S9 login/token-exchange
      flow. Its "freshness" is already implicitly covered by the login flow itself
      (a revoked/rotated secret breaks every login attempt within seconds, which
      user-facing auth-failure alerting already catches) — a standalone
      GET-based freshness probe (the pattern probe_deepinfra_key/probe_eodhd_key
      use) doesn't map cleanly onto an OAuth client-credentials exchange.
      Category: Internal-infra-cred (auth-adjacent, not a data-provider key).
    granted_at: "2026-07-24"

  - service: api-gateway
    field: internal_jwt_public_key
    file: services/api-gateway/src/api_gateway/config.py
    justification: >
      Public half of the RS256 keypair S9 uses to sign internal JWTs (paired
      with internal_jwt_private_key below, also exposed via GET
      /internal/jwks for other services to validate against) — not secret by
      design, and nothing external can silently revoke it. Category:
      Internal-signing-key.
    granted_at: "2026-07-24"

  - service: api-gateway
    field: jwt_key_version
    file: services/api-gateway/src/api_gateway/config.py
    justification: >
      NOT a credential — this is the "kid" version tag (e.g. "v1") stamped
      into internal JWT headers for JWKS rotation, a plain identifier string,
      not a secret value. Category: Not-a-credential.
    granted_at: "2026-07-24"

  - service: api-gateway
    field: internal_jwt_private_key
    file: services/api-gateway/src/api_gateway/config.py
    justification: >
      Self-generated RSA private key S9 uses to SIGN its own internal JWTs
      (validated by every backend's InternalJWTMiddleware via GET /internal/jwks).
      Nothing external issues or can silently revoke this key — it never calls
      out to a third party. Category: Internal-signing-key.
    granted_at: "2026-07-24"

