openapi: 3.1.0
info:
  title: worldview-gateway
  version: 2025.6.0
paths:
  /metrics:
    get:
      summary: Metrics Endpoint
      operationId: metrics_endpoint_metrics_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /healthz:
    get:
      tags:
      - health
      summary: Healthz
      description: Liveness probe — returns 200 if process is running.
      operationId: healthz_healthz_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                title: Response Healthz Healthz Get
  /readyz:
    get:
      tags:
      - health
      summary: Readyz
      description: Readiness probe — checks Valkey availability.
      operationId: readyz_readyz_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /internal/jwks:
    get:
      tags:
      - internal
      summary: Internal JWKS — public key for RS256 internal JWT verification
      description: 'Return the JWKS for S9''s internal RS256 signing key.


        Backend services fetch this endpoint at startup to verify X-Internal-JWT tokens.

        Response is cached for 1 hour (``Cache-Control: public, max-age=3600``).'
      operationId: get_jwks_internal_jwks_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /internal/v1/service-token:
    post:
      tags:
      - internal
      summary: Mint a service-account RS256 internal JWT
      description: "Authenticate a worker via shared service-account secret; issue\
        \ an RS256 JWT.\n\nBackground workers (e.g. the nlp-pipeline price-impact\
        \ worker) use this\nendpoint instead of ``POST /v1/auth/dev-login`` so they\
        \ can authenticate\nin production deployments where dev-login is hard-blocked.\n\
        \nBehaviour:\n  - **200**: ``service_name`` is on the allow-list AND ``secret``\
        \ matches\n    ``settings.service_account_token`` → returns\n    ``{\"access_token\"\
        : <jwt>, \"expires_in\": 300, \"token_type\": \"Bearer\"}``.\n  - **401**:\
        \ wrong secret OR service_name not on the allow-list. Both\n    conditions\
        \ return the same error to avoid leaking which check failed.\n  - **503**:\
        \ ``settings.service_account_token`` is unset (deployment\n    misconfiguration)\
        \ OR the RSA private key is missing.\n\nSECURITY:\n  - Constant-time comparison\
        \ via ``secrets.compare_digest``.\n  - Endpoint is **NOT** guarded by ``app_env\
        \ == 'production'`` — that's\n    the entire point. The shared secret IS the\
        \ auth boundary.\n  - Each successful mint logs ``service_token_issued`` with\
        \ the\n    ``service_name`` (never the secret nor the JWT itself)."
      operationId: issue_service_token_internal_v1_service_token_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceTokenRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/auth/login:
    get:
      tags:
      - auth
      summary: Login
      description: Initiate PKCE OIDC flow — redirect browser to Zitadel (F-02).
      operationId: login_v1_auth_login_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /v1/auth/callback:
    get:
      tags:
      - auth
      summary: Callback
      description: Handle Zitadel redirect; exchange code for tokens; provision user
        (F-03).
      operationId: callback_v1_auth_callback_get
      parameters:
      - name: code
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Code
      - name: state
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: State
      - name: error
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Error
      - name: error_description
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Error Description
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/auth/refresh:
    post:
      tags:
      - auth
      summary: Refresh
      description: Exchange httpOnly refresh_token cookie for a new access_token (F-04).
      operationId: refresh_v1_auth_refresh_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /v1/auth/logout:
    post:
      tags:
      - auth
      summary: Logout
      description: Revoke refresh_token at Zitadel; clear cookie; invalidate Valkey
        cache (F-05).
      operationId: logout_v1_auth_logout_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /v1/auth/me:
    get:
      tags:
      - auth
      summary: Me
      description: Return current user identity from validated access_token (F-06).
      operationId: me_v1_auth_me_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /v1/auth/register:
    get:
      tags:
      - auth
      summary: Register
      description: 'Redirect browser to Zitadel self-registration page (OQ-05).


        Public endpoint — no authentication required.

        Zitadel self-registration URL: {oidc_issuer_url}/ui/console/register.'
      operationId: register_v1_auth_register_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /v1/auth/ws-token:
    get:
      tags:
      - auth
      summary: Ws Token
      description: 'Issue a 30-second short-lived internal JWT for WebSocket authentication.


        Called by the frontend immediately before opening the alert stream WebSocket.

        The returned token goes in ?token= on the WS URL (browser WS API cannot set
        headers).


        Auth: requires Bearer access token (normal OIDC flow).'
      operationId: ws_token_v1_auth_ws_token_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /v1/auth/dev-login:
    post:
      tags:
      - auth
      summary: Dev Login
      description: 'Issue an access token for the demo user WITHOUT Zitadel.


        SECURITY GATE: This endpoint is ONLY available when ``oidc_config is None``

        (i.e., OIDC discovery was skipped because Zitadel is not running AND

        ``API_GATEWAY_OIDC_DISCOVERY_OPTIONAL=true``).  In production, OIDC

        discovery succeeds, ``oidc_config`` is populated, and this endpoint

        returns 403.


        Returns the same response shape as ``GET /v1/auth/callback`` so the

        frontend can use an identical ``setTokens()`` call.'
      operationId: dev_login_v1_auth_dev_login_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/v1/admin/llm-costs:
    get:
      tags:
      - admin
      summary: Get Admin Llm Costs
      description: 'Aggregate LLM costs across S6 (nlp-pipeline), S7 (knowledge-graph),
        S8 (rag-chat).


        Returns partial results if one or two services are unavailable.

        Returns 503 only when ALL three services fail.'
      operationId: get_admin_llm_costs_api_v1_admin_llm_costs_get
      parameters:
      - name: period
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Period
      - name: provider
        in: query
        required: false
        schema:
          type: string
          default: all
          title: Provider
      - name: breakdown
        in: query
        required: false
        schema:
          type: string
          default: provider
          title: Breakdown
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminLlmCostsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/portfolios/{portfolio_id}/risk-metrics:
    get:
      summary: Get Risk Metrics
      description: "Return drawdown, volatility, Sharpe, Sortino, beta vs SPY for\
        \ a portfolio.\n\nPLAN-0046 Wave 5 / T-46-5-03. Pure S9 composition — no S1\
        \ endpoint\nis required beyond the existing value-history. Auth required.\n\
        \nEach metric is independently nullable. ``null`` means either:\n\n* Insufficient\
        \ history (N < 10 daily returns), OR\n* The metric is ill-defined (volatility\
        \ 0, no downside returns,\n  SPY data unavailable, etc.).\n\nThe frontend\
        \ renders every ``null`` as \"—\" — see RiskMetricsStrip."
      operationId: get_risk_metrics_v1_portfolios__portfolio_id__risk_metrics_get
      parameters:
      - name: portfolio_id
        in: path
        required: true
        schema:
          type: string
          title: Portfolio Id
      - name: lookback_days
        in: query
        required: false
        schema:
          type: integer
          maximum: 3650
          minimum: 10
          default: 90
          title: Lookback Days
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/companies/{company_id}/overview:
    get:
      summary: Company Overview
      description: 'Composed endpoint: instrument + quote + OHLCV + (optional) fundamentals.


        Passes a JWT factory so each of the 4 parallel downstream calls gets a fresh

        JWT with a unique JTI, preventing replay detection on market-data.'
      operationId: company_overview_v1_companies__company_id__overview_get
      parameters:
      - name: company_id
        in: path
        required: true
        schema:
          type: string
          title: Company Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                title: Response Company Overview V1 Companies  Company Id  Overview
                  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/instruments/{instrument_id}/page-bundle:
    get:
      summary: Instrument Page Bundle
      description: 'PLAN-0059 I-5 — instrument-detail page initial-load composite.


        Collapses the overview-tab waterfall (overview + fundamentals + technicals

        + insider + top-news) into a single round-trip. Each downstream call uses

        its own freshly-issued internal JWT so InternalJWTMiddleware''s JTI replay

        detection accepts the parallel fan-out.


        Per-call failures degrade gracefully — failed sub-resources return null

        fields rather than failing the whole bundle. The FE renders partial UIs.


        QA-iter1: explicit auth guard. OIDCAuthMiddleware does not 401 on its own

        — individual routes enforce auth. The bundle exposes 6 downstream

        sub-resources (including insider transactions which can be sensitive),

        so unauthenticated access is rejected here.'
      operationId: instrument_page_bundle_v1_instruments__instrument_id__page_bundle_get
      parameters:
      - name: instrument_id
        in: path
        required: true
        schema:
          type: string
          title: Instrument Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                title: Response Instrument Page Bundle V1 Instruments  Instrument
                  Id  Page Bundle Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/news/relevant:
    get:
      summary: Relevant News
      description: 'Most relevant news articles across all sources.


        Public endpoint — issues a system JWT so S5''s InternalJWTMiddleware

        accepts the request.'
      operationId: relevant_news_v1_news_relevant_get
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 20
          title: Limit
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                title: Response Relevant News V1 News Relevant Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/map/layers:
    get:
      summary: Map Layers
      description: Available map overlay layers.
      operationId: map_layers_v1_map_layers_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                title: Response Map Layers V1 Map Layers Get
  /v1/chat:
    post:
      summary: Chat
      description: 'Proxy synchronous chat request to S8 RAG/Chat service.


        Requires authentication — chat uses user context for personalised responses.'
      operationId: chat_v1_chat_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                title: Response Chat V1 Chat Post
  /v1/chat/stream:
    post:
      summary: Chat Stream
      description: 'Proxy SSE streaming chat to S8 — not buffered (chunked transfer).


        Requires authentication. Forwards the request body to S8 `/api/v1/chat/stream`

        and streams back Server-Sent Events without buffering, preserving the

        `text/event-stream` content type.'
      operationId: chat_stream_v1_chat_stream_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                title: Response Chat Stream V1 Chat Stream Post
  /v1/threads:
    get:
      summary: List Threads
      description: List conversation threads for the authenticated user (proxy to
        S8).
      operationId: list_threads_v1_threads_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                title: Response List Threads V1 Threads Get
    post:
      summary: Create Thread
      description: Create a new conversation thread (proxy to S8).
      operationId: create_thread_v1_threads_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                title: Response Create Thread V1 Threads Post
  /v1/threads/{thread_id}:
    get:
      summary: Get Thread
      description: Get a single conversation thread (proxy to S8).
      operationId: get_thread_v1_threads__thread_id__get
      parameters:
      - name: thread_id
        in: path
        required: true
        schema:
          type: string
          title: Thread Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                title: Response Get Thread V1 Threads  Thread Id  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      summary: Delete Thread
      description: Delete a conversation thread (proxy to S8).
      operationId: delete_thread_v1_threads__thread_id__delete
      parameters:
      - name: thread_id
        in: path
        required: true
        schema:
          type: string
          title: Thread Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                title: Response Delete Thread V1 Threads  Thread Id  Delete
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      summary: Update Thread
      description: 'Proxy PATCH /v1/threads/{thread_id} → S8 PATCH /api/v1/threads/{thread_id}.


        PLAN-0051 Wave E / T-E-5-06.


        Used by the chat UI to rename a thread inline (double-click on the

        sidebar title). Body is forwarded unchanged so future patchable fields

        don''t require a gateway change.'
      operationId: update_thread_v1_threads__thread_id__patch
      parameters:
      - name: thread_id
        in: path
        required: true
        schema:
          type: string
          title: Thread Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                title: Response Update Thread V1 Threads  Thread Id  Patch
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/email/preferences:
    get:
      summary: Get Email Preferences
      description: 'Proxy GET /api/v1/email/preferences → S10 Alert service.


        Passes X-Tenant-Id and X-User-Id headers derived from the JWT payload

        so S10 can enforce per-user isolation.'
      operationId: get_email_preferences_v1_email_preferences_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                title: Response Get Email Preferences V1 Email Preferences Get
    put:
      summary: Update Email Preferences
      description: 'Proxy PUT /api/v1/email/preferences → S10 Alert service.


        Passes request body unchanged; forwards X-Tenant-Id and X-User-Id headers.

        S10 returns 400 on invalid preference values (e.g., send_day_of_week > 6).'
      operationId: update_email_preferences_v1_email_preferences_put
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                title: Response Update Email Preferences V1 Email Preferences Put
  /v1/fundamentals/screen:
    post:
      summary: Screen Instruments
      description: 'Proxy POST /api/v1/fundamentals/screen → S3 Market Data.


        Public endpoint — issues a system JWT so the backend''s InternalJWTMiddleware

        accepts the request.  S3 returns 400 for no filters, 422 for invalid metric/sort_by.'
      operationId: screen_instruments_v1_fundamentals_screen_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                title: Response Screen Instruments V1 Fundamentals Screen Post
  /v1/fundamentals/screen/fields:
    get:
      summary: Get Screen Fields
      description: 'Proxy GET /api/v1/fundamentals/screen/fields → S3 Market Data.


        Public endpoint — issues a system JWT for backend authentication.

        Returns screener field metadata (Valkey-backed, 6h refresh).'
      operationId: get_screen_fields_v1_fundamentals_screen_fields_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                title: Response Get Screen Fields V1 Fundamentals Screen Fields Get
  /v1/fundamentals/timeseries:
    get:
      summary: Get Fundamentals Timeseries
      description: 'Proxy GET /api/v1/fundamentals/timeseries → S3 Market Data.


        Public endpoint — issues a system JWT for backend authentication.

        Forwards query parameters unchanged.'
      operationId: get_fundamentals_timeseries_v1_fundamentals_timeseries_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                title: Response Get Fundamentals Timeseries V1 Fundamentals Timeseries
                  Get
  /v1/entities/similar:
    post:
      summary: Find Similar Entities
      description: 'Proxy POST /api/v1/entities/similar → S7 Knowledge Graph.


        Public endpoint — issues a system JWT for backend authentication.

        S7 returns 404 (entity not found), 422 (no embedding), 503 (pgvector unavailable).'
      operationId: find_similar_entities_v1_entities_similar_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                title: Response Find Similar Entities V1 Entities Similar Post
  /v1/alerts/pending:
    get:
      summary: Get Pending Alerts
      description: 'Proxy GET /api/v1/alerts/pending → S10 Alert service.


        Requires authentication. Forwards X-Internal-JWT so S10''s InternalJWTMiddleware

        can extract user_id from the JWT (PRD-0025 §T-D-1-10).'
      operationId: get_pending_alerts_v1_alerts_pending_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                title: Response Get Pending Alerts V1 Alerts Pending Get
  /v1/alerts/{alert_id}/ack:
    delete:
      summary: Acknowledge Alert
      description: 'Proxy DELETE /api/v1/alerts/{alert_id}/ack → S10 Alert service.


        Requires authentication. Forwards X-Internal-JWT so S10 can verify the user

        owns the alert before acknowledging it (PRD-0025 §T-D-1-10).'
      operationId: acknowledge_alert_v1_alerts__alert_id__ack_delete
      parameters:
      - name: alert_id
        in: path
        required: true
        schema:
          type: string
          title: Alert Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                title: Response Acknowledge Alert V1 Alerts  Alert Id  Ack Delete
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/alerts/{alert_id}/acknowledge:
    patch:
      summary: Acknowledge Alert Entity
      description: 'Proxy PATCH /api/v1/alerts/{alert_id}/acknowledge → S10.


        Forwards the (optional) JSON body and X-Internal-JWT. ``Cache-Control:

        no-store`` prevents any intermediary from caching the mutation response.'
      operationId: acknowledge_alert_entity_v1_alerts__alert_id__acknowledge_patch
      parameters:
      - name: alert_id
        in: path
        required: true
        schema:
          type: string
          title: Alert Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/alerts/{alert_id}/snooze:
    patch:
      summary: Snooze Alert Entity
      description: Proxy PATCH /api/v1/alerts/{alert_id}/snooze → S10.
      operationId: snooze_alert_entity_v1_alerts__alert_id__snooze_patch
      parameters:
      - name: alert_id
        in: path
        required: true
        schema:
          type: string
          title: Alert Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/alerts/history:
    get:
      summary: List Alert History
      description: Proxy GET /api/v1/alerts/history → S10 with query params forwarded
        verbatim.
      operationId: list_alert_history_v1_alerts_history_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /v1/signals/prediction-markets:
    get:
      summary: List Prediction Markets
      description: 'Proxy GET /api/v1/prediction-markets → S3 Market Data.


        Requires authentication. Forwards query params (status, limit, offset,

        category) and auth headers derived from the JWT payload.'
      operationId: list_prediction_markets_v1_signals_prediction_markets_get
      parameters:
      - name: category
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            maxLength: 50
          - type: 'null'
          description: 'Optional category filter. Suggested values: macro, politics,
            sports, crypto, general (non-binding — backend does case-insensitive equality,
            never validates the enum).'
          title: Category
        description: 'Optional category filter. Suggested values: macro, politics,
          sports, crypto, general (non-binding — backend does case-insensitive equality,
          never validates the enum).'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                title: Response List Prediction Markets V1 Signals Prediction Markets
                  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/signals/prediction-markets/categories:
    get:
      summary: Get Prediction Market Categories
      description: 'Proxy GET /api/v1/prediction-markets/categories → S3 Market Data.


        PLAN-0053 T-C-3-05. Registered BEFORE the ``/{market_id}`` route so the

        literal "categories" path matches first (FastAPI evaluates routes in

        registration order; if /{market_id} were declared first it would shadow

        this and treat "categories" as a market_id).


        Returns ``[{category, count}, ...]`` and a top-level ``total`` for all

        currently-open markets.  Used by PredictionMarketsWidget to render

        filter pill counts and the empty-state explainer.'
      operationId: get_prediction_market_categories_v1_signals_prediction_markets_categories_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                title: Response Get Prediction Market Categories V1 Signals Prediction
