components:
  schemas:
    AdminLlmCostsResponse:
      properties:
        period:
          type: string
          title: Period
        services:
          items:
            $ref: '#/components/schemas/ServiceCostSummary'
          type: array
          title: Services
        grand_total_estimated_cost_usd:
          type: number
          title: Grand Total Estimated Cost Usd
        grand_total_calls:
          type: integer
          title: Grand Total Calls
      type: object
      required:
      - period
      - services
      - grand_total_estimated_cost_usd
      - grand_total_calls
      title: AdminLlmCostsResponse
    CostBreakdownItemSchema:
      properties:
        dimension:
          type: string
          title: Dimension
        calls:
          type: integer
          title: Calls
        tokens_in:
          type: integer
          title: Tokens In
        tokens_out:
          type: integer
          title: Tokens Out
        estimated_cost_usd:
          type: number
          title: Estimated Cost Usd
        success_rate:
          type: number
          title: Success Rate
      type: object
      required:
      - dimension
      - calls
      - tokens_in
      - tokens_out
      - estimated_cost_usd
      - success_rate
      title: CostBreakdownItemSchema
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    ServiceCostSummary:
      properties:
        service:
          type: string
          title: Service
        period:
          type: string
          title: Period
        total_estimated_cost_usd:
          type: number
          title: Total Estimated Cost Usd
        total_calls:
          type: integer
          title: Total Calls
        total_tokens_in:
          type: integer
          title: Total Tokens In
        total_tokens_out:
          type: integer
          title: Total Tokens Out
        success_rate:
          type: number
          title: Success Rate
        breakdown:
          items:
            $ref: '#/components/schemas/CostBreakdownItemSchema'
          type: array
          title: Breakdown
        error:
          anyOf:
          - type: string
          - type: 'null'
          title: Error
      type: object
      required:
      - service
      - period
      - total_estimated_cost_usd
      - total_calls
      - total_tokens_in
      - total_tokens_out
      - success_rate
      - breakdown
      title: ServiceCostSummary
    ServiceTokenRequest:
      properties:
        service_name:
          type: string
          maxLength: 64
          minLength: 1
          title: Service Name
        secret:
          type: string
          minLength: 1
          title: Secret
      type: object
      required:
      - service_name
      - secret
      title: ServiceTokenRequest
      description: 'Request body for POST /internal/v1/service-token.


        Both fields are required and validated server-side. The Pydantic v2 ``min_length``

        constraints reject the trivially-empty payloads that an attacker is most

        likely to try first; the real authorization check is the ``compare_digest``

        on ``secret`` below.'
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
    _BatchOHLCVRequest:
      properties:
        requests:
          items:
            $ref: '#/components/schemas/_BatchOHLCVRequestItem'
          type: array
          maxItems: 50
          minItems: 1
          title: Requests
      type: object
      required:
      - requests
      title: _BatchOHLCVRequest
      description: Body for POST /v1/ohlcv/batch.
    _BatchOHLCVRequestItem:
      properties:
        instrument_id:
          type: string
          maxLength: 64
          minLength: 1
          title: Instrument Id
        timeframe:
          type: string
          pattern: ^(1m|5m|15m|30m|1h|4h|1d|1w|1M)$
          title: Timeframe
          default: 1d
        start:
          anyOf:
          - type: string
          - type: 'null'
          title: Start
        end:
          anyOf:
          - type: string
          - type: 'null'
          title: End
        limit:
          anyOf:
          - type: integer
            maximum: 2000.0
            minimum: 1.0
          - type: 'null'
          title: Limit
      type: object
      required:
      - instrument_id
      title: _BatchOHLCVRequestItem
      description: One symbol+timeframe spec inside a batch OHLCV request.
