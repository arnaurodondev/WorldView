  /v1/portfolios/{portfolio_id}/performance:
    get:
      summary: Get Portfolio Performance
      description: "Composition endpoint — portfolio period return.\n\nWHY a composition\
        \ endpoint (not a proxy): S1 holds position sizes but not\nprices; S3 (market-data)\
        \ holds OHLCV but not portfolio weights. Computing a\nweighted portfolio return\
        \ requires data from both services simultaneously.\nThe frontend cannot safely\
        \ call two services itself (CORS + auth complexity),\nso S9 stitches the two\
        \ data sources here.\n\nAlgorithm:\n  1. Fetch holdings from S1 — gives us\
        \ quantity + average_cost per instrument\n  2. Fetch the last N OHLCV bars\
        \ from S3 for all instrument_ids in bulk\n     (1D → 2 bars; 1W → 6 bars;\
        \ 1M → 23 bars)\n  3. For each holding: weight = cost_basis_value / total_cost_basis\n\
        \     period_return_i = close_end / close_start - 1\n  4. Weighted sum → portfolio\
        \ period return\n\nGraceful degradation: if S3 has no bars for an instrument\
        \ (e.g. a new\nticker not yet ingested), that position is excluded from the\
        \ calculation.\nThe response includes a `covered_pct` field so the frontend\
        \ can show a\ncaveat when coverage is partial."
      operationId: get_portfolio_performance_v1_portfolios__portfolio_id__performance_get
      parameters:
      - name: portfolio_id
        in: path
        required: true
        schema:
          type: string
          title: Portfolio Id
      - name: period
        in: query
        required: false
        schema:
          type: string
          pattern: ^(1D|1W|1M)$
          default: 1D
          title: Period
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                title: Response Get Portfolio Performance V1 Portfolios  Portfolio
                  Id  Performance Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
