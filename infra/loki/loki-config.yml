auth_enabled: false

server:
  http_listen_port: 3100

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: "2024-01-01"
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  delete_request_store: filesystem

limits_config:
  retention_period: 720h  # 30 days — prevents unbounded disk growth (F-011)
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  allow_structured_metadata: true
  # PLAN-0108 Wave A: Loki 3.5 auto-injects `service_name=unknown_service`
  # from OTLP resource attributes when no service_name label exists. We
  # disable that auto-discovery so the real `service_name` set by Alloy's
  # `loki.relabel "docker"` block survives end-to-end. The earlier blocker
  # ("at least one label pair required" push rejection) is resolved by the
  # `external_labels = { stack = "worldview" }` block added in
  # `loki.write "default"` (infra/alloy/config.alloy), which guarantees a
  # non-empty label set on every push.
  discover_service_name: []
  discover_log_levels: false
