auth_enabled: false

server:
  http_listen_port: 3100

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: "2024-01-01"
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  delete_request_store: filesystem

limits_config:
  retention_period: 720h  # 30 days — prevents unbounded disk growth (F-011)
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  allow_structured_metadata: true
  # FU-OBS-LOKI-LABELS-V2 (PLAN-0107 follow-up, blocked):
  # Disabling Loki's `service_name` auto-discovery surfaced a deeper bug:
  # `loki.source.docker` strips ALL labels (including Alloy's relabel results)
  # before push, so Loki receives streams with no labels at all and rejects
  # them with "at least one label pair is required per stream". Needs an
  # `external_labels` block on `loki.write.default` OR a `labels = {...}`
  # block on `loki.source.docker` to attach static labels alongside relabel.
  # Tracking as FU-OBS-LOKI-LABELS-V2; the original `discover_service_name: []`
  # patch is reverted until the upstream label propagation is fixed.
