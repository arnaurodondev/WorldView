global:
  resolve_timeout: 5m
  # MailHog SMTP relay (already running in dev profile, port 1025).
  # Replace with real SMTP / PagerDuty / Slack for production. (BP-176)
  smtp_smarthost: "mailhog:1025"
  smtp_from: "alertmanager@worldview.local"
  smtp_require_tls: false

route:
  receiver: default
  group_by: [alertname, job]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: critical
      group_wait: 10s
      repeat_interval: 1h

receivers:
  - name: default
    email_configs:
      - to: "oncall@worldview.local"
        send_resolved: true
        headers:
          subject: "[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}"

  - name: critical
    email_configs:
      - to: "oncall@worldview.local"
        send_resolved: true
        headers:
          subject: "[CRITICAL] {{ .GroupLabels.alertname }} — {{ .GroupLabels.job }}"
    # WHY slack_configs: Slack provides faster on-call visibility than email for
    # critical alerts (e.g. ValkeyDown, FastBurnRate).  The webhook URL is injected
    # via SLACK_WEBHOOK_URL env var — set it in docker.env or the environment block
    # for the alertmanager container.  If the env var is empty the slack_configs
    # block is still valid YAML; Alertmanager will fail to POST but will not crash
    # (it logs the error and continues delivering via email).
    # PLAN-0087 (2026-05-09): Alertmanager does not expand ${SLACK_WEBHOOK_URL}
    # at runtime, so an unset env var was loaded literally as the URL and the
    # config-loader rejected the file ("unsupported scheme"), crashing the
    # container.  Slack delivery is opt-in: uncomment the block below AND set
    # SLACK_WEBHOOK_URL when you want it.  Email delivery via the receiver
    # above continues to work without Slack.
    # slack_configs:
    #   - api_url: "https://hooks.slack.com/services/T_XXX/B_XXX/XXX"
    #     channel: "#alerts-critical"
    #     send_resolved: true
    #     title: "[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}"
    #     text: >-
    #       {{ range .Alerts }}
    #       *Alert:* {{ .Annotations.summary }}
    #       *Severity:* {{ .Labels.severity }}
    #       *Job:* {{ .Labels.job }}
    #       {{ end }}

inhibit_rules:
  # Suppress all lower-severity alerts when ServiceDown fires for the same job
  # — avoids alert flood (HighErrorRate + CriticalErrorRate + HighP95Latency all
  # firing simultaneously for a service that is simply down). (F-036)
  - source_match:
      severity: critical
      alertname: ServiceDown
    target_match_re:
      alertname: "(HighErrorRate|CriticalErrorRate|HighP95Latency|OutboxBacklog|KafkaConsumerSilent)"
    equal: [job]

  # Suppress HighErrorRate (warning) when CriticalErrorRate fires for the
  # same job — avoids duplicate paging noise. (audit finding)
  - source_match:
      severity: critical
      alertname: CriticalErrorRate
    target_match:
      severity: warning
      alertname: HighErrorRate
    equal: [job]
