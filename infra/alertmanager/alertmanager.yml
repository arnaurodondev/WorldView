global:
  resolve_timeout: 5m
  # MailHog SMTP relay (already running in dev profile, port 1025).
  # Replace with real SMTP / PagerDuty / Slack for production. (BP-176)
  smtp_smarthost: "mailhog:1025"
  smtp_from: "alertmanager@worldview.local"
  smtp_require_tls: false

route:
  receiver: default
  group_by: [alertname, job]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: critical
      group_wait: 10s
      repeat_interval: 1h

receivers:
  - name: default
    email_configs:
      - to: "oncall@worldview.local"
        send_resolved: true
        headers:
          subject: "[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}"

  - name: critical
    email_configs:
      - to: "oncall@worldview.local"
        send_resolved: true
        headers:
          subject: "[CRITICAL] {{ .GroupLabels.alertname }} — {{ .GroupLabels.job }}"

inhibit_rules:
  # Suppress HighErrorRate (warning) when CriticalErrorRate fires for the
  # same job — avoids duplicate paging noise. (audit finding)
  - source_match:
      severity: critical
      alertname: CriticalErrorRate
    target_match:
      severity: warning
      alertname: HighErrorRate
    equal: [job]
