# One-shot K8s Job: 2-year daily (1d) OHLCV backfill from the EODHD EOD feed.
#
# WHY A JOB (not `kubectl exec`): a detached exec dies when the pod rolls; a Job
# survives pod eviction and reports completion. Run this to repair the D2/F1 prod
# gap (only ~1 daily bar/instrument → returns/price-levels/movers/heatmap null).
#
# Mirrors the market-ingestion-worker Deployment (image, secret, infra endpoints)
# so the backfill has the same DB / Kafka / MinIO / Valkey / EODHD wiring. The
# script is resumable (Valkey cursor), budget-capped, idempotent, and dry-runnable.
#
# ORDERING (HARD REQUIREMENT — run this BACK-TO-BACK after fix/ohlcv-dup-bars):
#   1. Deploy fix/ohlcv-dup-bars FIRST (ingest-path UTC-midnight bar_date normalization
#      + market-data migration 045). Migration 045 collapses the duplicate daily bars
#      to one UTC-midnight row per (instrument, timeframe, bar_date), keeping the
#      HIGHEST-priority winner. Where Alpaca IEX daily (110) is the winner, that
#      surviving row has UNDERSTATED volume and a NULL adjusted_close — i.e. 045 leaves
#      the corrected key but temporarily WRONG values.
#   2. Run THIS Job with --authoritative IMMEDIATELY AFTER 045. It stamps eodhd_bulk
#      (priority 120 >= 110), so the /eod bars OVERWRITE those Alpaca winners in place,
#      restoring correct consolidated volume + adjusted_close. Until this Job finishes,
#      users see NULL adjusted_close on the affected days — so do NOT leave a long gap
#      between step 1 and step 2. (Without 045 first, eodhd_bulk 120 and Alpaca 110 sit
#      on DIFFERENT bar_date keys and the priority guard never fires — the overwrite
#      silently no-ops.)
#
# NODE LOAD (single-node cx53, CPU-saturated as of 2026-07-17 by an active NLP news
# backfill that is being drained): this Job is single-threaded asyncio, one symbol at a
# time, --sleep 0.2 between symbols, cpu limit 1000m — gentle on the FETCH side and it
# cannot starve the NLP drain. BUT a full 2yr run produces ~550 symbols x ~500 daily
# bars ~= 270k downstream OHLCV upserts through Kafka -> market-data -> postgres. To
# avoid contending with the NLP drain + live ingestion on the saturated node, run this
# one-shot corrective backfill OFF-PEAK / AFTER the NLP drain has completed (the daily
# --days 5 authoritative CronJob is tiny by comparison and is safe to leave scheduled).
#
# USAGE (operator runs; do NOT run against prod automatically):
#   # 1. Dry-run first — prints the instrument plan + credit estimate, fetches nothing:
#   #    edit args below to `--years 2 --dry-run`, then:
#   kubectl -n worldview apply -f infra/k8s/backfill-daily-ohlcv-job.yaml
#   kubectl -n worldview logs -f job/market-ingestion-backfill-daily-ohlcv
#   # 2. Real run — set args to `--years 2 --resume`, bump the name suffix, re-apply.
#   # 3. Re-run daily (or as a CronJob) with --resume to drain the whole universe.
#
# CREDIT COST: EOD = 1 credit/request, one request per instrument covers the full
# range → ~1 credit/instrument → ~550 credits for ~550 instruments (2yr). The
# per-run cap (--max-credits) and shared daily headroom (--daily-headroom) bound it.
apiVersion: batch/v1
kind: Job
metadata:
  name: market-ingestion-backfill-daily-ohlcv
  namespace: worldview
  labels:
    app.kubernetes.io/name: market-ingestion-backfill-daily-ohlcv
    app.kubernetes.io/instance: market-ingestion
    app.kubernetes.io/component: backfill
spec:
  # A backfill run can take a while (HTTP latency × ~550 instruments); give it room.
  activeDeadlineSeconds: 7200
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: market-ingestion-backfill-daily-ohlcv
        app.kubernetes.io/instance: market-ingestion
        app.kubernetes.io/component: backfill
    spec:
      restartPolicy: Never
      # k8s injects service-link env vars (e.g. MARKET_INGESTION_PORT=tcp://<ip>:8002 for
      # the market-ingestion Service). That collides with pydantic-settings' `port` field
      # (env_prefix MARKET_INGESTION_) and crashes Settings() with an int-parse error. The
      # runtime Deployments dodge it by setting MARKET_INGESTION_PORT="8002" explicitly; a
      # one-shot Job has no port to serve, so just disable service links.
      enableServiceLinks: false
      serviceAccountName: market-ingestion
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: backfill
          image: ghcr.io/arnaurodondev/worldview-market-ingestion:latest
          imagePullPolicy: Always
          command:
            - python
            - -m
            - market_ingestion.scripts.backfill_daily_ohlcv
          # ── EDIT THESE ARGS ──────────────────────────────────────────────
          # Start with --dry-run; switch to --resume for the real run.
          args:
            - --years
            - "2"
            - --resume
            - --max-credits
            - "5000"
            - --daily-headroom
            - "5000"
          # ── Same infra wiring as the market-ingestion-worker Deployment ──
          env:
            - name: APP_ENV
              value: production
            # Belt-and-suspenders with enableServiceLinks:false above: pin the Settings
            # `port` field to a valid int so Settings() never trips on a service-link value.
            - name: MARKET_INGESTION_PORT
              value: "8002"
            - name: MARKET_INGESTION_DATABASE_URL
              value: postgresql+asyncpg://postgres:$(POSTGRES_PASSWORD)@postgres.infra.svc:5432/ingestion_db
            - name: MARKET_INGESTION_DATABASE_URL_READ
              value: postgresql+asyncpg://postgres:$(POSTGRES_PASSWORD)@postgres.infra.svc:5432/ingestion_db
            - name: MARKET_INGESTION_KAFKA_BOOTSTRAP_SERVERS
              value: kafka.infra.svc:9092
            - name: MARKET_INGESTION_SCHEMA_REGISTRY_URL
              value: http://schema-registry.infra.svc:8081
            - name: MARKET_INGESTION_STORAGE_ENDPOINT
              value: http://minio.infra.svc:9000
            - name: MARKET_INGESTION_STORAGE_BUCKET
              value: market-ingestion
            - name: MARKET_INGESTION_BRONZE_BUCKET
              value: market-bronze
            - name: MARKET_INGESTION_CANONICAL_BUCKET
              value: market-canonical
            - name: MARKET_INGESTION_VALKEY_URL
              value: redis://valkey.infra.svc:6379/0
            - name: MARKET_INGESTION_EODHD_BASE_URL
              value: https://eodhd.com/api
            - name: MARKET_INGESTION_EODHD_DAILY_QUOTA
              value: "100000"
            - name: MARKET_INGESTION_EODHD_MONTHLY_QUOTA
              value: "145000"
            - name: MARKET_INGESTION_PROVIDER_HTTP_TIMEOUT_SECONDS
              value: "30.0"
            - name: MARKET_INGESTION_LOG_LEVEL
              value: INFO
            - name: MARKET_INGESTION_LOG_JSON
              value: "true"
          # Provides POSTGRES_PASSWORD, MARKET_INGESTION_EODHD_API_KEY,
          # MARKET_INGESTION_STORAGE_ACCESS_KEY / _SECRET_KEY, etc.
          envFrom:
            - secretRef:
                name: market-ingestion-secrets
          resources:
            requests:
              cpu: 200m
              memory: 320Mi
            limits:
              cpu: "1000m"
              memory: 1Gi
