# Once-daily K8s CronJob: authoritative daily (1d) OHLCV from the EODHD BULK EOD feed.
#
# WHY: Alpaca's free IEX daily bar (priority 110 = old daily "source of truth") has
# WRONG volume (IEX-only, ~19-30x understated) and NO adjusted_close. Alpaca stays
# the intraday 1m source; DAILY bars now come from EODHD's bulk end-of-day endpoint
# (`/eod-bulk-last-day/{EXCHANGE}`) — ONE call returns EVERY symbol on the exchange
# with the CORRECT consolidated volume + adjusted_close + raw close, for a flat ~100
# credits/exchange/day. The produced bars are stamped `eodhd_bulk` (priority 120) so
# they win the market-data upsert guard over Alpaca's IEX daily (110).
#
# COORDINATION: requires the `fix/ohlcv-dup-bars` UTC-midnight bar_date normalization
# so the eodhd_bulk and Alpaca daily bars share the same (instrument, timeframe,
# bar_date) conflict key and the priority guard actually fires.
#
# SCHEDULE: 22:00 UTC (after the US cash close + EODHD end-of-day settle). Crypto (CC,
# 24/7) is NOT served by bulk EOD and stays on Alpaca — hence `--exchanges US` only by
# default; add index/foreign equity exchanges (INDX, SHG, …) = one extra 100-credit
# call/day each.
#
# CREDIT COST: 100 credits/exchange/day. The per-run cap (--max-credits) and shared
# daily headroom (--daily-headroom) bound it against the 100k/day EODHD account cap.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: market-ingestion-bulk-eod-daily
  namespace: worldview
  labels:
    app.kubernetes.io/name: market-ingestion-bulk-eod-daily
    app.kubernetes.io/instance: market-ingestion
    app.kubernetes.io/component: bulk-eod
spec:
  # 22:00 UTC daily — after the US cash close and EODHD's EOD settle.
  schedule: "0 22 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      activeDeadlineSeconds: 3600
      backoffLimit: 3
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app.kubernetes.io/name: market-ingestion-bulk-eod-daily
            app.kubernetes.io/instance: market-ingestion
            app.kubernetes.io/component: bulk-eod
        spec:
          restartPolicy: Never
          # See backfill-daily-ohlcv-job.yaml: k8s service-link env (MARKET_INGESTION_PORT=
          # tcp://…) collides with pydantic-settings; disable service links + pin PORT.
          enableServiceLinks: false
          serviceAccountName: market-ingestion
          imagePullSecrets:
            - name: ghcr-credentials
          containers:
            - name: bulk-eod
              image: ghcr.io/arnaurodondev/worldview-market-ingestion:latest
              imagePullPolicy: Always
              command:
                - python
                - -m
                - market_ingestion.scripts.bulk_eod_daily
              args:
                - --exchanges
                - "US"
                - --max-credits
                - "5000"
                - --daily-headroom
                - "5000"
              env:
                - name: APP_ENV
                  value: production
                - name: MARKET_INGESTION_PORT
                  value: "8002"
                - name: MARKET_INGESTION_DATABASE_URL
                  value: postgresql+asyncpg://postgres:$(POSTGRES_PASSWORD)@postgres.infra.svc:5432/ingestion_db
                - name: MARKET_INGESTION_DATABASE_URL_READ
                  value: postgresql+asyncpg://postgres:$(POSTGRES_PASSWORD)@postgres.infra.svc:5432/ingestion_db
                - name: MARKET_INGESTION_KAFKA_BOOTSTRAP_SERVERS
                  value: kafka.infra.svc:9092
                - name: MARKET_INGESTION_SCHEMA_REGISTRY_URL
                  value: http://schema-registry.infra.svc:8081
                - name: MARKET_INGESTION_STORAGE_ENDPOINT
                  value: http://minio.infra.svc:9000
                - name: MARKET_INGESTION_STORAGE_BUCKET
                  value: market-ingestion
                - name: MARKET_INGESTION_BRONZE_BUCKET
                  value: market-bronze
                - name: MARKET_INGESTION_CANONICAL_BUCKET
                  value: market-canonical
                - name: MARKET_INGESTION_VALKEY_URL
                  value: redis://valkey.infra.svc:6379/0
                - name: MARKET_INGESTION_EODHD_BASE_URL
                  value: https://eodhd.com/api
                - name: MARKET_INGESTION_EODHD_DAILY_QUOTA
                  value: "100000"
                - name: MARKET_INGESTION_EODHD_MONTHLY_QUOTA
                  value: "145000"
                - name: MARKET_INGESTION_PROVIDER_HTTP_TIMEOUT_SECONDS
                  value: "30.0"
                - name: MARKET_INGESTION_LOG_LEVEL
                  value: INFO
                - name: MARKET_INGESTION_LOG_JSON
                  value: "true"
              # Provides POSTGRES_PASSWORD, MARKET_INGESTION_EODHD_API_KEY,
              # MARKET_INGESTION_STORAGE_ACCESS_KEY / _SECRET_KEY, etc.
              envFrom:
                - secretRef:
                    name: market-ingestion-secrets
              resources:
                requests:
                  cpu: 200m
                  memory: 320Mi
                limits:
                  cpu: "1000m"
                  memory: 1Gi
