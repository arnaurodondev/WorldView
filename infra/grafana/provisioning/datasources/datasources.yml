apiVersion: 1
# Datasource UIDs are pinned (lowercase) because every dashboard JSON in
# infra/grafana/dashboards/ references `"uid": "prometheus"` / "loki" / "tempo"
# verbatim. Without pinning, Grafana auto-generates random UIDs at first
# provisioning (e.g. PBFA97CFB590B2093) and every panel renders "no data"
# because its datasource ref doesn't resolve.
datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    editable: false
    jsonData:
      tracesToMetrics:
        datasourceUid: prometheus
      serviceMap:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true

  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      derivedFields:
        - datasourceUid: tempo
          matcherRegex: '"trace_id":"(\w+)"'
          name: TraceID
          url: "$${__value.raw}"
