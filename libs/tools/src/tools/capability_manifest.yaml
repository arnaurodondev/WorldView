version: "4"
tools:
  - name: get_price_history
    description: >
      Fetches OHLCV (open/high/low/close/volume) bar history for a stock ticker
      over a specified date range. Use when the user asks about price movement,
      trend, range, or performance over a time period.
    parameters:
      - name: ticker
        type: string
        description: Stock ticker symbol (e.g. "AAPL")
        required: true
      - name: from_date
        type: date
        description: Start of date range (YYYY-MM-DD)
        required: true
      - name: to_date
        type: date
        description: End of date range (YYYY-MM-DD)
        required: true
      - name: interval
        type: string
        enum: [day, week, month]
        description: Bar granularity. Default "week".
        required: false
    source_type: ohlcv  # used by TrustScorer — trust_weight NOT stored here (PLAN-0067 §0 A-2)
    since: "v1"
    deprecated_at: null
    example_queries:
      - "How has AAPL performed over the last 3 months?"
      - "What was NVDA's price range in Q1 2026?"

  - name: get_fundamentals_history
    description: >
      Fetches fundamental metrics (revenue, gross profit, net income,
      EPS, P/E ratio, market cap) for a ticker over N periods. Use when the user
      asks about revenue trends, EPS growth, or multi-period financial performance.
      Defaults to QUARTERLY periodicity; pass period_type="annual" to retrieve
      fiscal-year totals instead (F-LIVE-P, 2026-05-26 — prevents annual rows
      leaking into quarterly answers, e.g. AMD FY2025 $34.6B quoted as Q1 FY2026).
    parameters:
      - name: ticker
        type: string
        description: Stock ticker symbol (e.g. "MSFT")
        required: true
      - name: periods
        type: integer
        description: Number of periods to return (1-20). Default 8.
        required: false
      - name: period_type
        type: string
        description: >
          Periodicity of returned rows. Allowed values: "quarterly" (default),
          "annual". Any other value falls back to "quarterly" with a warning.
        required: false
    source_type: fundamentals  # used by TrustScorer — trust_weight NOT stored here (PLAN-0067 §0 A-2)
    since: "v1"
    deprecated_at: null
    example_queries:
      - "Show me MSFT's revenue trend over 8 quarters"
      - "What has AAPL's EPS been over the last 2 years?"

  # PLAN-0095 W2 T-W2-02: batched fundamentals tool — collapses N agent turns
  # into one. See tool_registry_builder.py for the explicit "5-10x slower"
  # framing the LLM needs to actually pick this over the singular variant.
  - name: get_fundamentals_history_batch
    description: >
      Fetches quarterly fundamental metrics (revenue, gross profit, net income,
      EPS, P/E, market cap) for MULTIPLE tickers in a single call.
      Use this when comparing or screening MULTIPLE tickers; calling the singular
      get_fundamentals_history N times is 5-10x slower (each call is a separate
      agent turn). Returns a per-ticker dict {ticker: {status: ok|error, periods?,
      reason?}}; partial failures (unknown ticker, missing data) do not fail the
      whole batch. Cap: 25 tickers per call.
    parameters:
      - name: tickers
        type: array
        description: 'List of stock tickers to fetch (e.g. ["AAPL", "MSFT", "NVDA"]). Max 25.'
        required: true
      - name: periods
        type: integer
        description: Number of quarters per ticker (1-20). Default 5.
        required: false
    source_type: fundamentals
    since: "v4"
    deprecated_at: null
    example_queries:
      - "Compare revenue growth of AAPL, MSFT, GOOG, AMZN, META"
      - "Get the last 4 quarters of fundamentals for the top 5 AI chip stocks"

  # PLAN-0104 W32: unified parameterised fundamentals query.
  # Use for non-standard metrics (gross margin, forward P/E, PEG, EV/EBITDA,
  # FCF yield, consensus EPS) that the legacy get_fundamentals_history's
  # fixed 6-column projection cannot surface.
  - name: query_fundamentals
    description: >
      Parameterised fundamentals query for a SINGLE ticker. Use this — NOT
      get_fundamentals_history — when the user asks about metrics beyond the
      standard revenue/EPS/net-income/P-E triple. Examples: gross margin,
      operating margin, net margin, forward P/E, PEG ratio, EV/EBITDA,
      EV/Revenue, FCF yield, consensus EPS for current or next year,
      quarterly revenue/earnings growth YoY, ROE, dividend yield. You declare
      the metric list and the tool returns both a per-period series AND a
      TTM/live snapshot block, with a per-metric coverage flag
      (ok | partial | missing) so you know which values are safe to quote and
      which to caveat or refuse on. Always read the Coverage line before
      quoting a metric — if it says 'missing', refuse rather than fabricate.
    parameters:
      - name: ticker
        type: string
        description: Stock ticker symbol (e.g. 'AAPL')
        required: true
      - name: metrics
        type: array
        description: >
          List of canonical metric names to fetch. Supported: revenue,
          gross_profit, operating_income, net_income, ebit, ebitda, eps,
          cost_of_revenue, research_development, operating_cash_flow,
          capital_expenditures, free_cash_flow, gross_margin, operating_margin,
          net_margin, ebitda_margin, pe_ratio, forward_pe, peg_ratio,
          ev_ebitda, ev_revenue, price_to_book, price_to_sales_ttm,
          market_cap, ebitda_ttm, revenue_ttm, gross_profit_ttm, eps_ttm,
          diluted_eps_ttm, dividend_yield, dividend_share, book_value,
          roe_ttm, roa_ttm, operating_margin_ttm, profit_margin_ttm,
          quarterly_revenue_growth_yoy, quarterly_earnings_growth_yoy,
          consensus_eps_curr_quarter, consensus_eps_next_quarter,
          consensus_eps_curr_year, consensus_eps_next_year,
          wall_street_target_price, fcf_yield. Unknown names are flagged
          'missing' in coverage rather than rejected.
        required: true
      - name: periods
        type: integer
        description: >
          Number of per-period rows to return (0-20). Default 8. Pass 0 to
          get the snapshot only (no historical series).
        required: false
      - name: period_type
        type: string
        description: >
          Periodicity: "quarterly" (default) or "annual". Anything else
          falls back to "quarterly".
        required: false
      - name: include_snapshot
        type: boolean
        description: Include the TTM/live snapshot block (default true).
        required: false
    source_type: fundamentals
    since: "v5"
    deprecated_at: null
    example_queries:
      - "What's AAPL's forward P/E and PEG ratio?"
      - "Show TSLA's gross margin trend over the last 8 quarters"
      - "Get NVDA's consensus EPS for current and next year"

  - name: search_documents
    description: >
      Searches the platform's document corpus using hybrid BM25 + ANN embedding search.
      Returns text excerpts from news articles, SEC filings (10-K, 10-Q, 8-K), earnings
      call transcripts, and analyst reports. Use for factual questions, news, company
      announcements, and any question requiring text evidence. This is the primary
      retrieval tool for unstructured information.
    parameters:
      - name: query
        type: string
        description: Natural language search query
        required: true
      - name: entity_tickers
        type: array
        description: List of stock tickers to constrain results (e.g. ["AAPL", "MSFT"])
        required: false
      - name: date_from
        type: date
        description: Earliest document date (YYYY-MM-DD). Optional.
        required: false
      - name: date_to
        type: date
        description: Latest document date (YYYY-MM-DD). Optional.
        required: false
      - name: source_types
        type: array
        description: "Filter by source: ['sec_filing', 'earnings', 'news', 'analyst_report']"
        required: false
    source_type: "mixed"
    since: "v1"
    deprecated_at: null
    example_queries:
      - "What risks does AAPL mention in their latest 10-K?"
      - "What did analysts say about NVDA's data centre revenue?"

  - name: get_entity_graph
    description: >
      Visualises 1-2 hops around a single entity — the entity's immediate
      neighbours, edges, and their summaries. Returns nodes + edges with
      confidence scores. (PLAN-0093 E-3 T-E-3-02 tool selection guide.)
      USE WHEN: the question is "show me X's neighbourhood" / "what's around X" /
      "what is X connected to" with no specific target entity.
      DO NOT USE WHEN: you need a directed path between two known entities
      (use get_entity_paths instead), filtering by relation_type only (use
      search_entity_relations), or aggregating intelligence about a single
      entity (use get_entity_intelligence — preferred for "tell me about X").
    parameters:
      - name: entity_name
        type: string
        description: Name of the entity (company, person, fund) to build the graph around
        required: true
      - name: depth
        type: integer
        description: Graph hop depth (1 or 2). Default 1. Use 2 for broader connectivity.
        required: false
      - name: relation_types
        type: array
        description: "Filter by relation type: ['subsidiary_of', 'board_member_of', 'partnership', 'competitor_of']"
        required: false
    source_type: "knowledge_graph"
    since: "v1"
    deprecated_at: null
    example_queries:
      - "What companies is Elon Musk connected to?"
      - "Who are AAPL's main subsidiaries?"

  - name: traverse_graph
    description: >
      Advanced Cypher-style path traversal — multi-hop paths constrained by an
      optional cypher_pattern (e.g. "[:INVESTS_IN|:BOARD_MEMBER_OF]").
      (PLAN-0093 E-3 T-E-3-02 tool selection guide.)
      USE WHEN: the user provides a specific relation pattern OR you need
      paths of depth 3-4 with a directed filter.
      DO NOT USE WHEN: you just need 1-2 hops around an entity (use
      get_entity_graph), or you have BOTH a known start AND target entity —
      prefer get_entity_paths which is purpose-built for that case.
    parameters:
      - name: start_entity
        type: string
        description: Starting entity name
        required: true
      - name: target_entity
        type: string
        description: Target entity name to find paths to. Optional.
        required: false
      - name: depth
        type: integer
        description: Maximum path depth (2-4). Default 3.
        required: false
      - name: cypher_pattern
        type: string
        description: Optional Cypher relationship filter (e.g. "[:INVESTS_IN|:BOARD_MEMBER_OF]")
        required: false
    source_type: "knowledge_graph"
    since: "v1"
    deprecated_at: null
    example_queries:
      - "How is Sam Altman connected to Microsoft?"
      - "Are AAPL and MSFT connected through any shared board members?"

  - name: search_entity_relations
    description: >
      Searches relation triplets (subject, relation_type, object) for an entity,
      optionally filtered by relation_type. Returns ranked triples with confidence
      scores. (PLAN-0093 E-3 T-E-3-02 tool selection guide.)
      USE WHEN: you need the FILTERED-BY-RELATION-TYPE slice of an entity's edges
      (e.g. "all M&A by Microsoft" → relation_type="acquired").
      DO NOT USE WHEN: the user wants a free-form summary of an entity (use
      get_entity_intelligence), or wants to visualise neighbours (use
      get_entity_graph).
      If no scoped entity context is set, provide entity_name explicitly.
    parameters:
      - name: entity_name
        type: string
        description: >
          Entity to find relations for. REQUIRED — if no entity context is
          scoped, provide the canonical name here (the handler resolves it
          via S7 alias search).
        required: true
      - name: relation_type
        type: string
        description: "Specific relation type to filter: 'invests_in', 'competes_with', 'acquired', etc."
        required: false
      - name: min_confidence
        type: number
        description: Minimum confidence threshold (0.0-1.0). Default 0.6.
        required: false
      - name: limit
        type: integer
        description: Maximum number of relations to return. Default 15.
        required: false
    source_type: "knowledge_graph"
    since: "v1"
    deprecated_at: null
    example_queries:
      - "List all companies that Microsoft has acquired"
      - "What companies compete with NVIDIA in the GPU market?"

  - name: search_claims
    description: >
      Searches LLM-extracted analyst claims and assertions about an entity (e.g.,
      "AAPL will expand into India", target prices, revenue forecasts, risk factors).
      (PLAN-0093 E-3 T-E-3-02 tool selection guide.)
      USE WHEN: the question is opinion-driven ("what are analysts saying about X"),
      target prices, or strategic moves — claims surface qualitative analyst views.
      DO NOT USE WHEN: the question is about price/fundamentals numbers
      (use get_fundamentals_history or get_price_history), corporate events
      (use search_events), or relationships (use search_entity_relations).
      If no scoped entity context is set, provide entity_name explicitly.
    parameters:
      - name: entity_name
        type: string
        description: >
          Entity the claims are about. REQUIRED — if no entity context is
          scoped, provide the canonical name here (the handler resolves it
          via S7 alias search).
        required: true
      - name: claim_type
        type: string
        description: "Type of claim: 'price_target', 'revenue_forecast', 'risk_factor', 'strategic_move'"
        required: false
      - name: date_from
        type: date
        description: Earliest claim extraction date (YYYY-MM-DD)
        required: false
      - name: date_to
        type: date
        description: Latest claim extraction date (YYYY-MM-DD)
        required: false
    source_type: "knowledge_graph"
    since: "v1"
    deprecated_at: null
    example_queries:
      - "What are analysts saying about AAPL's AI strategy?"
      - "What are analysts forecasting for MSFT's revenue next quarter?"

  - name: search_events
    description: >
      Retrieves structured corporate events for an entity — earnings releases,
      M&A activity, leadership changes, product launches, regulatory filings.
      (PLAN-0093 E-3 T-E-3-02 tool selection guide.)
      USE WHEN: the question is timeline-driven ("when did X last announce…"),
      event-typed ("any acquisitions by X"), or about a specific event class.
      DO NOT USE WHEN: the question is about analyst claims (use search_claims)
      or about price data (use get_price_history).
      If no scoped entity context is set, provide entity_name explicitly.
    parameters:
      - name: entity_name
        type: string
        description: >
          Entity involved in the events. REQUIRED — if no entity context is
          scoped, provide the canonical name here (the handler resolves it
          via S7 alias search).
        required: true
      - name: event_type
        type: string
        description: "Event type: 'earnings', 'merger', 'acquisition', 'ipo', 'leadership_change', 'product_launch'"
        required: false
      - name: date_from
        type: date
        description: Earliest event date
        required: false
      - name: date_to
        type: date
        description: Latest event date
        required: false
    source_type: "knowledge_graph"
    since: "v1"
    deprecated_at: null
    example_queries:
      - "When did AAPL last announce a major acquisition?"
      - "What leadership changes happened at Tesla in 2025?"

  - name: get_contradictions
    description: >
      Retrieves cross-source contradictions detected in analyst claims about an
      entity. Returns PAIRS of conflicting statements with strength + sources.
      (PLAN-0093 E-3 T-E-3-02 tool selection guide.)
      USE WHEN: the question explicitly asks about disagreement, conflicting views,
      or uncertainty between sources.
      DO NOT USE WHEN: you just want a list of analyst views (use search_claims).
      If no scoped entity context is set, provide entity_name explicitly.
    parameters:
      - name: entity_name
        type: string
        description: >
          Entity to find contradictions for. REQUIRED — if no entity context is
          scoped, provide the canonical name here (the handler resolves it
          via S7 alias search).
        required: true
      - name: confidence_threshold
        type: number
        description: Minimum contradiction strength (0.0-1.0). Default 0.5.
        required: false
    source_type: "knowledge_graph"
    since: "v1"
    deprecated_at: null
    example_queries:
      - "Are there conflicting analyst views on TSLA's profitability?"
      - "Are there contradictions between analysts about Amazon's profitability?"

  - name: get_portfolio_context
    description: >
      Retrieves the current user's portfolio holdings and watchlist. Use when the
      question references the user's own positions, portfolio P&L, or watchlisted stocks.
      Do NOT call this tool unless the question explicitly references "my portfolio",
      "my holdings", "my watchlist", or similar personal context.
    parameters: []
    source_type: "portfolio"
    since: "v1"
    deprecated_at: null
    example_queries:
      - "How is my portfolio performing today?"
      - "Which of my holdings have the highest exposure to AI?"

  - name: get_entity_narrative
    description: >
      Retrieves the current LLM-generated narrative for an entity — a curated markdown
      summary of the entity's recent developments, strategic position, and key signals.
      Use when the user asks for an overview, summary, or what's been happening with an entity.
      Returns the latest narrative version. High-authority source (platform-curated).
    parameters:
      - name: entity_id
        type: string
        description: UUID of the entity to retrieve the narrative for. Auto-injected from entity scope when available.
        required: false
    source_type: "narrative"
    since: "v2"
    deprecated_at: null
    example_queries:
      - "Give me a summary of what's been happening with Apple"
      - "What's the latest narrative on NVDA?"

  - name: get_entity_paths
    description: >
      Retrieves top-N pre-computed multi-hop relationship paths anchored on an entity,
      ranked by composite_score. Use when the user asks about indirect connections,
      how entities are linked through intermediaries, or wants to explore the entity's
      broader network relationships.
    parameters:
      - name: entity_id
        type: string
        description: UUID of the entity to retrieve paths for. Auto-injected from entity scope when available.
        required: false
      - name: top_n
        type: integer
        description: Number of top paths to return (1-20). Default 5.
        required: false
    source_type: "knowledge_graph"
    since: "v2"
    deprecated_at: null
    example_queries:
      - "What are the most significant connections in AAPL's network?"
      - "Show me the top relationship paths for Microsoft"

  - name: get_entity_health
    description: >
      Retrieves the entity health score, key metrics, source distribution, and 90-day
      confidence trend. Use when the user asks about data quality, confidence in the
      entity's information, how well-covered the entity is, or signal health.
    parameters:
      - name: entity_id
        type: string
        description: UUID of the entity to retrieve health data for. Auto-injected from entity scope when available.
        required: false
    source_type: "narrative"
    since: "v2"
    deprecated_at: null
    example_queries:
      - "How confident are we in the data on Apple?"
      - "What is TSLA's data health score?"

  - name: get_entity_intelligence
    description: >
      Retrieves the full intelligence bundle for an entity — combining narrative,
      relationship paths, health score, and relations summary in a single call.
      Use when the user asks for a comprehensive overview or says "tell me everything
      about X". Prefer this over calling individual intelligence tools separately.
    parameters:
      - name: entity_id
        type: string
        description: UUID of the entity to retrieve intelligence for. Auto-injected from entity scope when available.
        required: false
    source_type: "narrative"
    since: "v2"
    deprecated_at: null
    example_queries:
      - "Tell me everything about Apple"
      - "Give me the full intelligence report on NVDA"

  - name: get_morning_brief
    description: >
      Retrieves the user's latest morning brief — a curated daily summary of
      portfolio-relevant news, earnings, and macro events. Use when the user asks
      for their brief, today's brief, morning brief, or "what's happening today".
      Returns the brief headline, lead, and all sections.
    parameters: []
    source_type: "narrative"
    since: "v3"
    deprecated_at: null
    example_queries:
      - "Show me my morning brief"
      - "What's in my brief today?"

  - name: compare_entities
    description: >
      Side-by-side comparison of 2-4 financial entities: fundamentals highlights
      (market cap, P/E, revenue, EPS) and latest price quote. Use when the user
      asks to compare multiple stocks or companies against each other.
    parameters:
      - name: entity_tickers
        type: array
        description: List of 2-4 stock tickers to compare (e.g. ["AAPL", "MSFT"])
        required: true
    source_type: "fundamentals"
    since: "v3"
    deprecated_at: null
    example_queries:
      - "Compare AAPL and MSFT side by side"
      - "Show me a comparison of NVDA, AMD, and INTC"

  - name: screen_universe
    description: >
      Quantitative screener — filters the instrument universe by market cap, P/E ratio,
      sector, industry, and region. Use when the user asks to screen, filter, or find
      stocks that meet specific fundamental criteria. For AI-chip / semiconductor
      queries, set sector='Technology' AND industry='Semiconductors' (GICS taxonomy).
    parameters:
      - name: market_cap_min
        type: number
        description: Minimum market cap in USD (e.g. 1000000000 for $1B)
        required: false
      - name: market_cap_max
        type: number
        description: Maximum market cap in USD
        required: false
      - name: pe_ratio_max
        type: number
        description: Maximum P/E ratio (e.g. 25.0)
        required: false
      - name: sector
        type: string
        description: "Sector filter (e.g. 'Technology', 'Healthcare')"
        required: false
      # FIX-LIVE-M (2026-05-24): GICS industry filter. NVDA/AMD/AVGO are
      # sector=Technology, industry=Semiconductors — industry is required to
      # narrow "AI chip" or "semiconductor" queries from the LLM.
      - name: industry
        type: string
        description: "Industry filter (e.g. 'Semiconductors', 'Cloud Computing')"
        required: false
      - name: region
        type: string
        description: "Region filter (e.g. 'US', 'EU')"
        required: false
      - name: limit
        type: integer
        description: Maximum number of results (1-100). Default 20.
        required: false
      # PLAN-0103 W1 (BP-622): fundamentals-grade metric filters. These map
      # directly to columns in the market-data ``metric_extractor`` whitelist
      # so the LLM can ask for "AI semis with positive YoY revenue growth"
      # without the kwarg being silently dropped.
      - name: revenue_growth_yoy_min
        type: number
        description: "Minimum quarter-over-year-ago revenue growth, e.g. 0.0 for any positive growth, 0.10 for >=10%."
        required: false
      - name: revenue_growth_yoy_max
        type: number
        description: "Maximum quarter-over-year-ago revenue growth."
        required: false
      - name: gross_margin_min
        type: number
        description: "Minimum gross margin as a decimal (e.g. 0.40 for >=40%)."
        required: false
      - name: gross_margin_max
        type: number
        description: "Maximum gross margin as a decimal."
        required: false
      - name: roe_min
        type: number
        description: "Minimum return on equity as a decimal (e.g. 0.15 for >=15%)."
        required: false
      - name: dividend_yield_min
        type: number
        description: "Minimum dividend yield as a decimal (e.g. 0.02 for >=2%)."
        required: false
      - name: dividend_yield_max
        type: number
        description: "Maximum dividend yield as a decimal."
        required: false
    source_type: "fundamentals"
    since: "v3"
    deprecated_at: null
    example_queries:
      - "Screen for tech stocks with P/E under 20 and market cap over $10B"
      - "Find large-cap US healthcare companies"
      - "AI semiconductor companies with market cap > $50B and positive YoY revenue growth"

  # PLAN-0103 W2 — entity-anchored news feed. Closes the catalogue gap
  # surfaced by the 2026-05-29 real-user audit (Q1: "latest news on MSTR"
  # routed to broad search_documents and returned weak hits).
  - name: get_entity_news
    description: >
      Latest news articles mentioning a specific entity (by entity_id OR ticker),
      filtered by date range. Use this for "what's the latest on X" questions
      where the user names a single entity. Returns up to 20 articles with title,
      source, published_at, url, and citation metadata. PREFER over
      search_documents when the user asks about ONE specific company / ticker —
      this routes through the entity-anchored briefing-articles endpoint which
      already applies per-entity relevance scoring.
    parameters:
      - name: entity_id
        type: string
        description: "Canonical entity UUID. Provide this OR ticker (entity_id wins if both given)."
        required: false
      - name: ticker
        type: string
        description: "Ticker symbol (e.g. 'MSTR'). Resolved server-side via S6 alias lookup."
        required: false
      - name: days_back
        type: integer
        description: "Look back N days (1-90). Default 14."
        required: false
      - name: max_results
        type: integer
        description: "Max articles to return (1-20). Default 10."
        required: false
    source_type: "news_article"
    since: "v5"
    deprecated_at: null
    example_queries:
      - "Show me the latest news on MSTR"
      - "What's happening with NVDA this week?"
      - "Any recent news about Tesla?"

  - name: get_market_movers
    description: >
      Returns the top gainers, losers, or most-active stocks over a time period.
      Use when the user asks about market movers, top performers, biggest gainers/losers,
      or most-active stocks.
    parameters:
      - name: mover_type
        type: string
        enum: [gainers, losers]
        description: "Type of movers: 'gainers' or 'losers'. Default 'gainers'."
        required: false
      - name: limit
        type: integer
        description: Number of results (1-50). Default 10.
        required: false
      - name: period
        type: string
        description: "Time period: '1D', '1W', '1M'. Default '1D'."
        required: false
    source_type: "market_data"
    since: "v3"
    deprecated_at: null
    example_queries:
      - "What are the top market movers today?"
      - "Show me the biggest losers this week"

  - name: get_economic_calendar
    description: >
      Retrieves upcoming and past macro economic events (CPI, FOMC, GDP releases,
      PMI data) with actual vs. forecast vs. prior values. Use when the user asks about
      economic events, macro calendar, upcoming data releases, or central bank decisions.
    parameters:
      - name: from_date
        type: date
        description: Start of date range (YYYY-MM-DD). Optional.
        required: false
      - name: to_date
        type: date
        description: End of date range (YYYY-MM-DD). Optional.
        required: false
      - name: region
        type: string
        description: "Region filter: 'US', 'EU', 'global'. Optional."
        required: false
    source_type: "market_data"
    since: "v3"
    deprecated_at: null
    example_queries:
      - "What economic events are coming up this week?"
      - "When is the next FOMC meeting?"

  - name: get_earnings_calendar
    description: >
