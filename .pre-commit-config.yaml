repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: "infra/compose/docker-compose\\.prod\\.yml"
      - id: check-toml
      - id: check-json
        exclude: ".*\\.jsonl$"
      - id: check-added-large-files
        args: ["--maxkb=500"]
        # PLAN-0063 W5-1-05: query_embeddings.parquet is a 748KB CI fixture
        # holding 120 precomputed query embeddings x 1024-dim float32. Enables
        # deterministic $0/run CI; regenerated only when the embedding model changes.
        # tests/eval/corpus/documents.jsonl is the 536-chunk corpus source-of-truth
        # (~600KB); committed as the canonical re-seed artifact for the golden set.
        exclude: "^tests/eval/golden/query_embeddings\\.parquet$|^tests/eval/corpus/documents\\.jsonl$"
      - id: check-merge-conflict
      - id: detect-private-key
      - id: no-commit-to-branch
        args: ["--branch", "main"]

  # Pin to same version as CI (ci.yml line 49) to prevent format drift.
  # If you bump this, also bump ci.yml.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.0
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # Pin to same version as CI (ci.yml line 49).
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.5
          - pydantic-settings>=2.1
        pass_filenames: false
        args: ["--config-file=mypy.ini", "--ignore-missing-imports", "libs", "services"]

  - repo: local
    hooks:
      - id: check-avro-schemas
        name: Validate Avro schemas (JSON syntax)
        entry: python -c "import json, sys, pathlib; files=[pathlib.Path(f) for f in sys.argv[1:] if f.endswith('.avsc')]; [json.loads(f.read_text()) for f in files]; print(f'Validated {len(files)} schemas')"
        language: python
        files: '\.avsc$'
        pass_filenames: true
