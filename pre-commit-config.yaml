repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
        exclude: ".*\\.jsonl$"
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: no-commit-to-branch
        args: ["--branch", "main"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.4
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.5
          - pydantic-settings>=2.1
        pass_filenames: false
        args: ["--config-file=mypy.ini"]

  - repo: local
    hooks:
      - id: check-avro-schemas
        name: Validate Avro schemas (JSON syntax)
        entry: python -c "import json, sys, pathlib; files=[pathlib.Path(f) for f in sys.argv[1:] if f.endswith('.avsc')]; [json.loads(f.read_text()) for f in files]; print(f'Validated {len(files)} schemas')"
        language: python
        files: '\.avsc$'
        pass_filenames: true
