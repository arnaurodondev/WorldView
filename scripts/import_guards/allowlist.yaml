# Import Guard Allowlist
#
# Files and patterns listed here are exempt from specific import guard rules.
# Each entry must include a rule_id, a path pattern, and a justification.
#
# Path patterns are matched against the file path relative to the repo root.
# Supports glob patterns (fnmatch-style).
#
# Fields per entry:
#   rule_id     — rule ID being exempted (or "*" for all rules)
#   path        — glob pattern relative to repo root
#   reason      — justification for the exemption

allowlist:
  # ─── Alembic migrations ───────────────────────────────────────────────────
  # Migrations use raw SQL uuid generation (gen_random_uuid) and may import
  # sqlalchemy constructs directly. uuid/datetime imports are also common.
  - rule_id: IG-COMMON-001
    path: "services/*/alembic/versions/*.py"
    reason: Alembic migrations may reference raw uuid generation for column defaults.

  - rule_id: IG-COMMON-002
    path: "services/*/alembic/versions/*.py"
    reason: Alembic migrations may use datetime for default values in column definitions.

  # ─── Test fixtures ────────────────────────────────────────────────────────
  # Test code may use raw uuid/datetime/print for test data generation,
  # benchmarks, and integration test fixtures. Rules target service src/ code.
  # NOTE: fnmatch does not support recursive ** like pathlib — we need both
  # services/*/tests/*.py (direct children) and services/*/tests/**/*.py (nested).
  - rule_id: IG-COMMON-001
    path: "services/*/tests/*.py"
    reason: Test code may use uuid4() directly for fixture data generation.

  - rule_id: IG-COMMON-001
    path: "services/*/tests/**/*.py"
    reason: Test code may use uuid4() directly for fixture data generation.

  - rule_id: IG-COMMON-002
    path: "services/*/tests/*.py"
    reason: Test code may use naive datetime for fixture data setup.

  - rule_id: IG-COMMON-002
    path: "services/*/tests/**/*.py"
    reason: Test code may use naive datetime for fixture data setup.

  - rule_id: IG-OBS-001
    path: "services/*/tests/*.py"
    reason: Test code may use print() for benchmark output and test diagnostics.

  - rule_id: IG-OBS-001
    path: "services/*/tests/**/*.py"
    reason: Test code may use print() for benchmark output and test diagnostics.

  - rule_id: IG-MSG-001
    path: "services/*/tests/*.py"
    reason: Test fixtures may mock aiokafka directly for unit test isolation.

  - rule_id: IG-MSG-001
    path: "services/*/tests/**/*.py"
    reason: Test fixtures may mock aiokafka directly for unit test isolation.

  - rule_id: IG-MSG-002
    path: "services/*/tests/*.py"
    reason: Test fixtures may use redis.asyncio directly to set up test state.

  - rule_id: IG-MSG-002
    path: "services/*/tests/**/*.py"
    reason: Test fixtures may use redis.asyncio directly to set up test state.

  - rule_id: IG-STORAGE-001
    path: "services/*/tests/*.py"
    reason: Test fixtures may instantiate minio.Minio directly for integration tests.

  - rule_id: IG-STORAGE-001
    path: "services/*/tests/**/*.py"
    reason: Test fixtures may instantiate minio.Minio directly for integration tests.

  - rule_id: IG-STORAGE-002
    path: "services/*/tests/*.py"
    reason: Test fixtures may use boto3 directly for integration tests.

  - rule_id: IG-STORAGE-002
    path: "services/*/tests/**/*.py"
    reason: Test fixtures may use boto3 directly for integration tests.

  # ─── Shared library internals ─────────────────────────────────────────────
  # The messaging/storage/observability libraries are themselves permitted to
  # import aiokafka, minio, redis, etc. — they ARE the adapter boundary.
  - rule_id: IG-MSG-001
    path: "libs/messaging/**/*.py"
    reason: The messaging library is the adapter boundary for Kafka.

  - rule_id: IG-MSG-002
    path: "libs/messaging/**/*.py"
    reason: The messaging library is the adapter boundary for Valkey/Redis.

  - rule_id: IG-STORAGE-001
    path: "libs/storage/**/*.py"
    reason: The storage library is the adapter boundary for MinIO.

  - rule_id: IG-STORAGE-002
    path: "libs/storage/**/*.py"
    reason: The storage library is the adapter boundary for S3/MinIO.

  - rule_id: IG-OBS-001
    path: "libs/observability/**/*.py"
    reason: The observability library sets up structlog and may reference stdlib logging for bridge config.

  # ─── Architecture test utilities ──────────────────────────────────────────
  - rule_id: "*"
    path: "tests/architecture/**/*.py"
    reason: Architecture test utilities introspect imports directly — all rules exempt.

  # ─── Scripts ──────────────────────────────────────────────────────────────
  - rule_id: "*"
    path: "scripts/**/*.py"
    reason: CI scripts are infrastructure tooling, not service code.

  - rule_id: "*"
    path: "scripts/*.py"
    reason: CI scripts are infrastructure tooling, not service code.

  # ─── Approved API-layer infrastructure imports ────────────────────────────
  # The quotes router imports QuoteCache directly because the cache-aside
  # pattern stores QuoteResponse API schema objects (a serialisation concern
  # that belongs in the API layer).  QuoteCache is a thin Valkey wrapper; no
  # business logic is imported — only the cache client type for DI annotation.
  # Tracked in: QA-013 Wave 3 decision (cache-aside stays in router).
  - rule_id: IG-LAYER-002
    path: "services/market-data/src/market_data/api/routers/quotes.py"
    reason: >
      QuoteCache stores serialised QuoteResponse API objects, making it an API-layer
      concern.  The import is the cache client type for dependency injection annotation
      only — no infrastructure query logic is used in the router.

  # The SSE chat route creates a fresh UoW scoped to the generator lifetime.
  # The import is a local import inside a nested async generator function (not
  # module-level), following the same pattern as api/dependencies.py.  Moving
  # this into an application-layer factory would require passing the session
  # factory through multiple layers for a single SSE endpoint — disproportionate
  # complexity.  Tracked in: F-508 (PLAN-0070 QA iter-2, pre-existing pattern).
  - rule_id: IG-LAYER-002
    path: "services/rag-chat/src/rag_chat/api/routes/chat.py"
    reason: >
      Local import inside a nested async generator to scope RagUnitOfWork to the
      SSE stream lifetime.  Not a module-level import.  Same pattern as
      api/dependencies.py which is correctly not flagged.

  # The documents router wires infrastructure adapters (OutboxRepository,
  # TenantDocumentUploadRepository, TenantDedupHashRepository, UploadRateLimitAdapter)
  # inside route-handler function bodies — not at module scope. Each handler opens
  # a single shared session and passes the repos/adapters directly to the use case
  # constructor, keeping the transaction atomic. Moving this wiring into separate
  # Depends() factories would require exposing session-factory internals outside the
  # route (disproportionate complexity for four handlers). All business logic remains
  # in the use cases; the router contains only DI assembly code.
  # Tracked in: PLAN-0086 Wave E-2 (content-ingestion tenant upload pipeline).
  - rule_id: IG-LAYER-002
    path: "services/content-ingestion/src/content_ingestion/api/routes/documents.py"
    reason: >
      All infrastructure imports are local (inside route handler bodies), used solely
      for DI assembly within a shared SQLAlchemy session. No business logic lives in
      the router — it delegates entirely to UploadTenantDocumentUseCase,
      GetTenantDocumentUseCase, ListTenantDocumentsUseCase, and DeleteTenantDocumentUseCase.

  # The search_documents route imports three Prometheus metric objects from
  # infrastructure.metrics.prometheus inside the route handler body (not at module
  # scope) to record latency and result counts. Prometheus metrics are cross-cutting
  # observability concerns — they contain no business logic, no DB access, and no
  # mutable state. Moving them to application/ would be architecturally misleading
  # (observability infrastructure does not belong in the application layer).
  # The handler comment explicitly documents WHY the import is inside the body.
  # Tracked in: PLAN-0064 W6 (nlp-pipeline FTS search endpoint).
  - rule_id: IG-LAYER-002
    path: "services/nlp-pipeline/src/nlp_pipeline/api/routes/search_documents.py"
    reason: >
      Prometheus counter/histogram imports are local (inside handler body) and are
      cross-cutting observability concerns — no business logic. Moving them to
      application/ would misplace infrastructure telemetry. Pattern mirrors the
      rag-chat/chat.py precedent already in this allowlist.

  # The public_briefings router imports BriefFeedbackRepository inside two POST
  # route handler bodies (submit_bullet_feedback and submit_brief_feedback) to
  # wire it into BriefFeedbackUseCase. The use case owns all business logic; the
  # router only assembles the dependency. The UoW session is provided via UoWDep
  # (FastAPI dependency injection) and is passed through to the repository
  # constructor so all writes share a single transaction (R5 outbox pattern).
  # Tracked in: PLAN-0066 Wave C (rag-chat brief feedback endpoints).
  - rule_id: IG-LAYER-002
    path: "services/rag-chat/src/rag_chat/api/routes/public_briefings.py"
    reason: >
      BriefFeedbackRepository is imported locally inside two route handler bodies
      for DI wiring only. Business logic lives in BriefFeedbackUseCase. The pattern
      matches the existing chat.py allowlist entry in this file.

  # ─── Service-level utility scripts ─────────────────────────────────────
  # Standalone scripts in services/*/scripts/ are init-container or CLI
  # utilities — they may use stdlib patterns for minimal dependencies.
  - rule_id: IG-COMMON-001
    path: "services/*/scripts/*.py"
    reason: Service utility scripts may use uuid4() for one-off operations.

  - rule_id: IG-COMMON-001
    path: "services/*/scripts/**/*.py"
    reason: Service utility scripts may use uuid4() for one-off operations.

  - rule_id: IG-COMMON-002
    path: "services/*/scripts/*.py"
    reason: Service utility scripts may use naive datetime for one-off operations.

  - rule_id: IG-COMMON-002
    path: "services/*/scripts/**/*.py"
    reason: Service utility scripts may use naive datetime for one-off operations.
