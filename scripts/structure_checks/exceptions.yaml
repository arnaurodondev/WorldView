# Service Structure Exceptions Registry
#
# Fields per exception:
#   service      — service directory name under services/
#   rule_id      — rule ID from RULE_DEFINITIONS in check_service_structure.py
#   reason       — why the exception is needed
#   owner        — team/person responsible for resolving
#   expires_on   — ISO-8601 date after which the exception is treated as expired (CI fails)
#
# Example structure exception:
#   STR-013 can be used temporarily if a service still has
#   src/<pkg>/infrastructure/messaging/kafka/ before flattening mapper/serialization
#   modules to src/<pkg>/infrastructure/messaging/.
#
# Policy:
#   - Expired exceptions cause CI to fail, forcing resolution or renewal.
#   - Remove an exception once the violation is resolved.
#   - "never" is not valid — every exception must have an expiry.
#
# Run `python scripts/structure_checks/check_service_structure.py --strict` locally
# to verify all exceptions are valid before pushing.

exceptions:
  # ─────────────────────────────────────────────────────────────────────────
  # intelligence-migrations: not a FastAPI service — pure Alembic runner.
  # It has no src/ directory and will never have an app.py or package layers.
  # ─────────────────────────────────────────────────────────────────────────
  - service: intelligence-migrations
    rule_id: STR-001
    reason: >
      intelligence-migrations is a dedicated Alembic migration container, not a
      FastAPI microservice. It has no src/ Python package by design.
    owner: platform
    expires_on: "2027-01-01"

  # ─────────────────────────────────────────────────────────────────────────
  # market-ingestion: legacy kafka/ subdirectory predates STR-013.
  # The mapper.py and serialization.py files inside kafka/ are dead code —
  # the canonical copies live at infrastructure/messaging/mapper.py and
  # infrastructure/messaging/serialization.py respectively. No service code
  # imports from the kafka/ subdirectory. Flattening is tracked as a
  # follow-up cleanup task.
  # ─────────────────────────────────────────────────────────────────────────
  - service: market-ingestion
    rule_id: STR-013
    reason: >
      Legacy subdirectory organisation predates STR-013. The kafka/ subtree
      contains dead-code duplicates of mapper.py and serialization.py that are
      not imported anywhere; the canonical copies live at
      infrastructure/messaging/{mapper,serialization}.py. Removal is a
      follow-up cleanup task outside the current wave scope.
    owner: platform
    expires_on: "2026-12-31"

  # ─────────────────────────────────────────────────────────────────────────
  # api-gateway: BFF proxy service — hexagonal domain layers do not apply.
  # The service has no domain entities, no infrastructure adapters (stateless
  # HTTP proxy), and uses routes/ instead of api/. PLAN-0089 B-1/B-2 added
  # application/ (use cases + http_utils) which un-flagged it as "scaffolded",
  # but domain/, api/, and infrastructure/ are intentionally absent by design.
  # ─────────────────────────────────────────────────────────────────────────
  - service: api-gateway
    rule_id: STR-004
    reason: >
      api-gateway is a stateless BFF proxy. It has no domain entities and
      domain.py is a flat module (not a package). Hexagonal domain/ layer
      does not apply to a pure API gateway.
    owner: platform
    expires_on: "2027-12-31"

  - service: api-gateway
    rule_id: STR-006
    reason: >
      api-gateway uses routes/ instead of api/ by historical convention.
      The layer contains the same FastAPI routers; renaming is cosmetic and
      deferred to a future housekeeping wave.
    owner: platform
    expires_on: "2027-12-31"

  - service: api-gateway
    rule_id: STR-007
    reason: >
      api-gateway is stateless — it owns no database, no Kafka producers, and
      no external-storage adapters. There is no infrastructure layer by design.
    owner: platform
    expires_on: "2027-12-31"
